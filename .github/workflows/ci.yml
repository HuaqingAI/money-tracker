name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      NEXT_PUBLIC_API_URL: http://localhost:3000
      SUPABASE_URL: http://localhost:54321
      SUPABASE_ANON_KEY: ci-placeholder-anon-key
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test

      - name: Run build
        run: pnpm build

  advisory-gates:
    name: Advisory quality gates
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - name: Explain advisory gates
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Advisory gates

          - Blocking: `lint`, `test`, and `build` in the `quality` job must pass before merge.
          - Execution model: the root scripts still call Turbo, but this workflow runs them sequentially for fail-fast behavior and lower CI waste.
          - Pre-release fix: integration tests should run before release and may warn without blocking PR merge.
          - Post-release iteration: performance baselines and E2E tracking should be recorded continuously without blocking delivery.

          This repository does not yet include integration or E2E suites, so this job documents the policy and keeps room for follow-up stories.
          EOF
