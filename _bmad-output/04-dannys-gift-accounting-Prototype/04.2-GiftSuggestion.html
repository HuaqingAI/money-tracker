<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>04.2 Gift Suggestion - 了然</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            colors: { 'liaoran': { 50:'#E8F5F1',100:'#D1EBE3',200:'#A3D7C7',300:'#75C3AB',400:'#47AF8F',500:'#1A6B5A',600:'#165A4B',700:'#0F4F42',800:'#0A3A31',900:'#052520' } },
            fontFamily: { sans: ['-apple-system','PingFang SC','Noto Sans CJK SC','sans-serif'] }
        }}}
    </script>
    <style>
        html,body{overscroll-behavior:none}
        .safe-bottom{padding-bottom:calc(env(safe-area-inset-bottom,0px)+16px)}
        .chip{transition:all .15s}.chip.selected{background:#1A6B5A;color:#fff;border-color:#1A6B5A;transform:scale(1.05)}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .fade-in{animation:fadeInUp .4s ease-out forwards}
        .pulse{animation:pulse 1.5s ease-in-out infinite}
        .state-hidden{display:none}
    </style>
</head>
<body class="font-sans bg-gray-50">
<div class="h-[100dvh] flex flex-col">

    <!-- HEADER -->
    <div class="bg-white sticky top-0 z-20 px-4 py-3 flex items-center">
        <button onclick="handleBack()" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100 -ml-1">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 class="flex-1 text-center text-base font-semibold text-gray-900 -ml-9">AI 随礼建议</h1>
    </div>

    <!-- LOADING STATE -->
    <div id="state-loading" class="flex-1 flex flex-col items-center justify-center px-8">
        <div class="w-16 h-16 bg-liaoran-50 rounded-2xl flex items-center justify-center mb-4">
            <span class="text-3xl pulse">🤖</span>
        </div>
        <p class="text-base font-semibold text-gray-900">AI 正在分析...</p>
        <p class="text-sm text-gray-400 mt-1">综合历史往来、关系和场合</p>
    </div>

    <!-- RESULT STATE -->
    <div id="state-result" class="state-hidden flex-1 overflow-y-auto pb-32">

        <!-- Event Info Card -->
        <div id="gift-suggest-event" class="mx-4 mt-3 bg-white rounded-2xl shadow-sm p-4 fade-in" style="animation-delay:0s;opacity:0">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full bg-liaoran-100 flex items-center justify-center text-xl font-bold text-liaoran-700">张</div>
                <div class="flex-1">
                    <div class="flex items-center gap-2">
                        <span class="text-base font-bold text-gray-900">张三</span>
                        <span class="text-[10px] text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded">同事</span>
                    </div>
                    <p class="text-sm text-gray-500 mt-0.5">婚礼 · 4月18日（下周六）</p>
                </div>
            </div>
        </div>

        <!-- AI Suggestion Card -->
        <div id="gift-suggest-ai" class="mx-4 mt-4 rounded-2xl p-5 text-white relative overflow-hidden fade-in" style="background:linear-gradient(135deg,#0F4F42 0%,#1A6B5A 50%,#47AF8F 100%);animation-delay:.15s;opacity:0">
            <div class="absolute inset-0 opacity-10" style="background-image:radial-gradient(circle at 80% 20%,white 1px,transparent 1px);background-size:20px 20px"></div>
            <div class="relative text-center">
                <div class="flex items-center justify-center gap-2 mb-1">
                    <span class="bg-white/20 text-white text-[9px] font-bold w-5 h-5 rounded-full flex items-center justify-center">AI</span>
                    <span class="text-sm text-white/70">建议区间</span>
                </div>
                <p class="text-3xl font-bold mt-1">¥600 — ¥800</p>
                <p class="text-sm text-white/70 mt-2">推荐 <span class="text-white font-bold">¥800</span></p>
            </div>
        </div>

        <!-- Reasoning -->
        <div id="gift-suggest-reasoning" class="mx-4 mt-4 bg-white rounded-2xl shadow-sm p-4 fade-in" style="animation-delay:.25s;opacity:0">
            <h3 class="text-sm font-semibold text-gray-900 mb-3 flex items-center gap-2">
                <span class="bg-liaoran-50 text-liaoran-600 text-[9px] font-bold w-5 h-5 rounded-full flex items-center justify-center">AI</span>
                分析依据
            </h3>
            <div class="space-y-2.5">
                <div class="flex items-start gap-2.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-liaoran-400 mt-1.5 flex-shrink-0"></span>
                    <p class="text-sm text-gray-600">上次张三宝宝满月送了你 ¥600，婚礼通常高于满月</p>
                </div>
                <div class="flex items-start gap-2.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-liaoran-400 mt-1.5 flex-shrink-0"></span>
                    <p class="text-sm text-gray-600">你们是同事关系，婚礼属于高规格事件</p>
                </div>
                <div class="flex items-start gap-2.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-liaoran-400 mt-1.5 flex-shrink-0"></span>
                    <p class="text-sm text-gray-600">你近期随礼均值 ¥650，¥800 略高但合理</p>
                </div>
            </div>
        </div>

        <!-- Reference -->
        <div id="gift-suggest-reference" class="mx-4 mt-3 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 fade-in" style="animation-delay:.3s;opacity:0">
            <p class="text-xs text-gray-500">📊 参考：同事婚礼常见区间 ¥500 — ¥1,000</p>
        </div>

        <!-- Amount Selection -->
        <div id="gift-suggest-amount" class="mx-4 mt-5 fade-in" style="animation-delay:.35s;opacity:0">
            <h3 class="text-sm font-semibold text-gray-900 mb-3">选择金额</h3>
            <div class="grid grid-cols-3 gap-2" id="amount-chips">
                <button onclick="selectAmount(this,600)" class="chip h-11 border border-gray-200 rounded-xl text-sm font-medium text-gray-700">¥600</button>
                <button onclick="selectAmount(this,800)" class="chip selected h-11 border border-gray-200 rounded-xl text-sm font-medium text-gray-700">¥800</button>
                <button onclick="selectAmount(this,1000)" class="chip h-11 border border-gray-200 rounded-xl text-sm font-medium text-gray-700">¥1,000</button>
            </div>
            <div class="mt-3">
                <input id="custom-amount" type="number" placeholder="自定义金额" class="w-full h-11 bg-white border border-gray-200 rounded-xl px-4 text-sm focus:outline-none focus:ring-2 focus:ring-liaoran-200" oninput="customAmount(this.value)">
            </div>
        </div>
    </div>

    <!-- SUCCESS STATE -->
    <div id="state-success" class="state-hidden flex-1 flex flex-col items-center justify-center px-8">
        <div class="w-20 h-20 bg-liaoran-50 rounded-full flex items-center justify-center mb-5">
            <svg class="w-10 h-10 text-liaoran-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <h2 class="text-xl font-bold text-gray-900 mb-2">已记录</h2>
        <p class="text-sm text-gray-500">张三 · 婚礼 · <span id="success-amount">¥800</span></p>
        <p class="text-xs text-gray-400 mt-1">4月18日（下周六）</p>
    </div>

    <!-- BOTTOM CTA -->
    <div id="cta-bar" class="state-hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t border-gray-100 px-5 pt-3 safe-bottom z-20">
        <button id="confirm-btn" onclick="confirmRecord()" class="w-full h-12 bg-liaoran-500 hover:bg-liaoran-600 active:bg-liaoran-700 text-white font-semibold rounded-xl shadow-lg shadow-liaoran-500/25 transition-all">
            确认并记录 ¥800
        </button>
    </div>

    <!-- SUCCESS CTAs (hidden initially) -->
    <div id="success-cta" class="state-hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t border-gray-100 px-5 pt-3 safe-bottom z-20 space-y-2">
        <button onclick="window.location.href='04.1-GiftManagement.html'" class="w-full h-12 bg-liaoran-500 hover:bg-liaoran-600 text-white font-semibold rounded-xl shadow-lg shadow-liaoran-500/25">查看人情账</button>
        <button onclick="window.location.href='../01-dannys-zero-input-first-experience-Prototype/01.7-Dashboard.html'" class="w-full h-11 border border-gray-200 text-gray-600 font-medium rounded-xl">返回首页</button>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed top-16 left-4 right-4 z-50 bg-liaoran-50 border border-liaoran-200 text-liaoran-800 text-sm rounded-xl px-4 py-3 shadow-lg opacity-0 -translate-y-2 transition-all duration-300 pointer-events-none text-center"><span id="toast-text"></span></div>
</div>

<script>
let selectedAmount = 800;

// Simulate AI loading
setTimeout(() => {
    document.getElementById('state-loading').classList.add('state-hidden');
    document.getElementById('state-result').classList.remove('state-hidden');
    document.getElementById('cta-bar').classList.remove('state-hidden');
}, 1500);

function selectAmount(btn, amount) {
    selectedAmount = amount;
    document.querySelectorAll('#amount-chips .chip').forEach(c => c.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('custom-amount').value = '';
    updateConfirmBtn();
}

function customAmount(val) {
    if (val) {
        selectedAmount = parseInt(val);
        document.querySelectorAll('#amount-chips .chip').forEach(c => c.classList.remove('selected'));
    }
    updateConfirmBtn();
}

function updateConfirmBtn() {
    document.getElementById('confirm-btn').textContent = '确认并记录 ¥' + selectedAmount.toLocaleString();
}

function confirmRecord() {
    document.getElementById('state-result').classList.add('state-hidden');
    document.getElementById('state-success').classList.remove('state-hidden');
    document.getElementById('cta-bar').classList.add('state-hidden');
    document.getElementById('success-cta').classList.remove('state-hidden');
    document.getElementById('success-amount').textContent = '¥' + selectedAmount.toLocaleString();
}

function handleBack() {
    if (!document.getElementById('state-success').classList.contains('state-hidden')) {
        window.location.href = '04.1-GiftManagement.html';
    } else {
        history.back();
    }
}
</script>
</body>
</html>
