<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>01.7 Dashboard - 了然</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'liaoran': {
                            50: '#E8F5F1', 100: '#D1EBE3', 200: '#A3D7C7',
                            300: '#75C3AB', 400: '#47AF8F', 500: '#1A6B5A',
                            600: '#165A4B', 700: '#0F4F42', 800: '#0A3A31', 900: '#052520',
                        }
                    },
                    fontFamily: { sans: ['-apple-system', 'PingFang SC', 'Noto Sans CJK SC', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        html, body { overscroll-behavior: none; }
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom, 0px)); }
        .cat-bar { transition: width 0.6s ease-out; }
        .tab-bar { box-shadow: 0 -1px 0 rgba(0,0,0,0.06); }
    </style>
</head>
<body class="font-sans bg-gray-50">

    <div class="h-[100dvh] flex flex-col">

        <!-- MONTH HEADER (sticky) -->
        <div id="dash-month-header" class="bg-white sticky top-0 z-20 px-6 py-4 flex items-center justify-between">
            <button id="dash-month-header-nav-left" onclick="switchMonth(-1)" class="w-8 h-8 flex items-center justify-center text-gray-400">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <h1 id="dash-month-header-label" class="text-lg font-bold text-gray-900"><span id="month-text">3</span>月消费</h1>
            <button id="dash-month-header-nav-right" class="w-8 h-8 flex items-center justify-center text-gray-300 opacity-30" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
            </button>
        </div>

        <!-- SCROLLABLE CONTENT -->
        <div id="dash-content-full" class="flex-1 overflow-y-auto pb-24">

            <!-- HERO SUMMARY (brand gradient) -->
            <div id="dash-summary" class="mx-4 mt-2 rounded-2xl p-5 shadow-lg text-white relative overflow-hidden"
                 style="background: linear-gradient(135deg, #0F4F42 0%, #1A6B5A 50%, #47AF8F 100%);">
                <!-- Subtle pattern overlay -->
                <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 80% 20%, white 1px, transparent 1px); background-size: 24px 24px;"></div>
                <div class="relative">
                    <p class="text-sm text-white/70">本月总支出</p>
                    <p id="dash-summary-total" class="text-4xl font-bold mt-1 tracking-tight">¥14,568</p>
                    <div class="flex gap-4 mt-4">
                        <div class="flex-1 bg-white/10 backdrop-blur rounded-xl p-3">
                            <p class="text-xs text-white/60">收入</p>
                            <p class="text-base font-semibold">¥20,000</p>
                        </div>
                        <div class="flex-1 bg-white/10 backdrop-blur rounded-xl p-3">
                            <p class="text-xs text-white/60">结余</p>
                            <p class="text-base font-semibold">¥5,432</p>
                        </div>
                    </div>
                    <!-- AI coverage integrated -->
                    <div class="mt-4 flex items-center gap-2">
                        <div class="w-5 h-5 rounded-full bg-white/20 flex items-center justify-center flex-shrink-0">
                            <span class="text-[9px] font-bold">AI</span>
                        </div>
                        <div class="flex-1">
                            <div class="w-full h-1 bg-white/20 rounded-full overflow-hidden">
                                <div class="h-full bg-white/80 rounded-full" style="width:96.2%"></div>
                            </div>
                        </div>
                        <span class="text-xs text-white/70">96.2% 自动识别</span>
                    </div>
                </div>
            </div>

            <!-- CATEGORY BREAKDOWN -->
            <div class="mx-4 mt-5">
                <h2 class="text-base font-semibold text-gray-900 mb-3">分类消费</h2>
                <div class="space-y-2" id="dash-categories">
                    <!-- Filled by JS -->
                </div>
            </div>

            <!-- REPORT CTA -->
            <div class="mx-4 mt-5">
                <button onclick="window.location.href='01.8-MonthlyReport.html'"
                        class="w-full rounded-2xl p-4 shadow-sm flex items-center justify-between active:opacity-90 border-2 border-liaoran-500/20 bg-liaoran-50/50">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-liaoran-500 flex items-center justify-center">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/><path d="M18 12a2 2 0 000 4h4v-4h-4z"/></svg>
                        </div>
                        <div>
                            <span class="text-sm font-semibold text-liaoran-700">查看完整报表</span>
                            <p class="text-xs text-liaoran-500/70">饼图 · 趋势 · AI洞察 · 分享</p>
                        </div>
                    </div>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1A6B5A" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>

            <!-- IMPORT MORE -->
            <div class="mx-4 mt-3">
                <button onclick="window.location.href='01.5-BillImport.html'"
                        class="w-full bg-white rounded-2xl p-4 shadow-sm flex items-center justify-between active:bg-gray-50">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                        </div>
                        <div>
                            <span class="text-sm font-medium text-gray-900">补充更多账单数据</span>
                            <p class="text-xs text-gray-400">导入其他月份的支付宝账单</p>
                        </div>
                    </div>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>

            <div class="h-6"></div>
        </div>

        <!-- EMPTY STATE (hidden by default) -->
        <div id="dash-content-empty" class="hidden flex-1 overflow-y-auto pb-24 px-4">
            <div class="flex flex-col items-center pt-12 pb-8">
                <div class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center mb-4">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" stroke-width="1.5"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/></svg>
                </div>
                <p class="text-base font-semibold text-gray-900">还没有消费数据</p>
                <p class="text-sm text-gray-400 mt-1 text-center leading-relaxed">"不动手就知道钱去哪了"<br>开启下面任一方式即可开始</p>
            </div>

            <!-- Guide Card 1: Notification -->
            <button onclick="window.location.href='01.4-Permission.html'"
                    class="w-full bg-white rounded-2xl p-4 shadow-sm flex items-center gap-3 mb-3 active:bg-gray-50">
                <div class="w-11 h-11 rounded-xl bg-liaoran-50 flex items-center justify-center flex-shrink-0">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1A6B5A" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-medium text-gray-900">开启通知读取</p>
                    <p class="text-xs text-gray-400 mt-0.5">消费到账自动识别，零操作掌握每笔开支</p>
                </div>
                <span class="text-xs font-medium text-liaoran-500">去开启</span>
            </button>

            <!-- Guide Card 2: Import -->
            <button onclick="window.location.href='01.5-BillImport.html'"
                    class="w-full bg-white rounded-2xl p-4 shadow-sm flex items-center gap-3 mb-3 active:bg-gray-50">
                <div class="w-11 h-11 rounded-xl bg-blue-50 flex items-center justify-center flex-shrink-0">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-medium text-gray-900">导入支付宝账单</p>
                    <p class="text-xs text-gray-400 mt-0.5">3个月消费 5 分钟到手，AI 自动分类每一笔</p>
                </div>
                <span class="text-xs font-medium text-blue-500">去导入</span>
            </button>

            <!-- Guide Card 3: Manual -->
            <button class="w-full bg-white rounded-2xl p-4 shadow-sm flex items-center gap-3 active:bg-gray-50">
                <div class="w-11 h-11 rounded-xl bg-amber-50 flex items-center justify-center flex-shrink-0">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-medium text-gray-900">先手动记一笔试试</p>
                    <p class="text-xs text-gray-400 mt-0.5">快速体验记账功能</p>
                </div>
                <span class="text-xs font-medium text-amber-500">记一笔</span>
            </button>
        </div>

        <!-- FAB -->
        <button class="fixed right-5 z-30 w-14 h-14 rounded-full bg-liaoran-500 text-white shadow-xl shadow-liaoran-500/30 flex items-center justify-center active:bg-liaoran-700" style="bottom: calc(72px + env(safe-area-inset-bottom, 0px));">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>

        <!-- BOTTOM TAB BAR -->
        <div class="tab-bar bg-white flex items-center justify-around px-2 safe-bottom sticky bottom-0 z-20" style="padding-top:8px;padding-bottom:8px;">
            <button class="flex flex-col items-center gap-0.5 w-16">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="#1A6B5A" stroke="#1A6B5A" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                <span class="text-[10px] font-medium text-liaoran-600">首页</span>
            </button>
            <button class="flex flex-col items-center gap-0.5 w-16">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="2" y1="9" x2="22" y2="9"/><line x1="8" y1="3" x2="8" y2="9"/></svg>
                <span class="text-[10px] text-gray-400">交易</span>
            </button>
            <div class="w-16"></div>
            <button class="flex flex-col items-center gap-0.5 w-16">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                <span class="text-[10px] text-gray-400">AI</span>
            </button>
            <button class="flex flex-col items-center gap-0.5 w-16">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="text-[10px] text-gray-400">我的</span>
            </button>
        </div>
    </div>

    <!-- STATE TOGGLE (prototype only) -->
    <button onclick="toggleState()" class="fixed top-3 right-3 bg-gray-100 text-xs text-gray-500 px-3 py-1.5 rounded-full z-40">
        <span id="state-label">Full</span> ↔
    </button>

    <script>
        const CATS = [
            { name:'居住', icon:'🏠', amount:850000, color:'#8B5CF6', fixed:true },
            { name:'餐饮', icon:'🍜', amount:285000, color:'#F59E0B' },
            { name:'购物', icon:'🛒', amount:125800, color:'#EC4899' },
            { name:'交通', icon:'🚗', amount:98000, color:'#3B82F6' },
            { name:'娱乐', icon:'🎮', amount:56000, color:'#10B981' },
            { name:'健康', icon:'💊', amount:42000, color:'#EF4444' },
        ];
        const totalAmount = CATS.reduce((s,c) => s+c.amount, 0);

        // Month switching (prototype: toggle between months)
        const months = [1, 2, 3];
        let monthIdx = 2;
        function switchMonth(dir) {
            monthIdx = Math.max(0, Math.min(months.length - 1, monthIdx + dir));
            document.getElementById('month-text').textContent = months[monthIdx];
            document.getElementById('dash-month-header-nav-right').disabled = monthIdx >= months.length - 1;
            document.getElementById('dash-month-header-nav-right').style.opacity = monthIdx >= months.length - 1 ? '0.3' : '1';
            document.getElementById('dash-month-header-nav-left').disabled = monthIdx <= 0;
            document.getElementById('dash-month-header-nav-left').style.opacity = monthIdx <= 0 ? '0.3' : '1';
        }

        function renderCategories() {
            const container = document.getElementById('dash-categories');
            container.innerHTML = CATS.map(cat => {
                const pct = (cat.amount / totalAmount * 100).toFixed(1);
                const amt = '¥' + (cat.amount/100).toLocaleString();
                const fixedTag = cat.fixed ? '<span class="text-[10px] text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded ml-1.5">固定</span>' : '';
                return `<button class="w-full bg-white rounded-xl shadow-sm flex items-center gap-3 active:bg-gray-50 overflow-hidden">
                    <div class="w-1 self-stretch rounded-l-xl" style="background:${cat.color}"></div>
                    <span class="text-xl py-4 pl-1">${cat.icon}</span>
                    <div class="flex-1 py-4">
                        <div class="flex justify-between items-center mb-1.5">
                            <span class="text-sm font-medium text-gray-900">${cat.name}${fixedTag}</span>
                            <span class="text-sm font-semibold text-gray-900">${amt}</span>
                        </div>
                        <div class="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden">
                            <div class="cat-bar h-full rounded-full" style="width:${pct}%;background:${cat.color}"></div>
                        </div>
                    </div>
                    <span class="text-xs text-gray-400 w-10 text-right pr-4">${pct}%</span>
                </button>`;
            }).join('');
        }

        let showFull = true;
        function toggleState() {
            showFull = !showFull;
            document.getElementById('state-label').textContent = showFull ? 'Full' : 'Empty';
            document.getElementById('dash-content-full').classList.toggle('hidden', !showFull);
            document.getElementById('dash-content-empty').classList.toggle('hidden', showFull);
        }

        renderCategories();
    </script>

</body>
</html>
