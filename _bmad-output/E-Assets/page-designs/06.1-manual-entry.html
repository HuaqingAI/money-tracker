<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>了然 - 记一笔</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#F0F9F6',
                            500: '#1A6B5A',
                            600: '#155648',
                        },
                        neutral: {
                            50: '#F9FAFB',
                            100: '#F3F4F6',
                            200: '#E5E7EB',
                            400: '#9CA3AF',
                            500: '#6B7280',
                            800: '#1F2937',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .mode-tab-active {
            color: #1A6B5A;
            font-weight: 700;
        }
        .mode-tab-active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background-color: #1A6B5A;
            border-radius: 50%;
        }
        .voice-pulse {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(26, 107, 90, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(26, 107, 90, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(26, 107, 90, 0); }
        }
        .numpad-key:active { background-color: #F3F4F6; }
        .success-toast {
            animation: slideDownOut 3s forwards;
        }
        @keyframes slideDownOut {
            0% { transform: translateY(-100%); opacity: 0; }
            10% { transform: translateY(0); opacity: 1; }
            90% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100%); opacity: 0; }
        }
    </style>
</head>
<body class="bg-white font-sans text-neutral-800 antialiased h-screen flex flex-col overflow-hidden">

    <!-- Success Toast (Hidden) -->
    <div id="successToast" class="hidden fixed top-4 left-4 right-4 z-[100] bg-neutral-800 text-white p-4 rounded-2xl flex justify-between items-center shadow-2xl success-toast">
        <div class="flex items-center gap-3">
            <span class="text-success text-xl">✅</span>
            <p class="text-sm font-medium" id="successMsg">已记录 ¥50.00 食品·生鲜</p>
        </div>
        <button onclick="window.location.href='06.2-category-management.html'" class="text-xs font-bold text-brand-500 bg-white/10 px-3 py-1.5 rounded-full ml-4">调整分类</button>
    </div>

    <!-- Header -->
    <header class="p-6 flex items-center justify-between">
        <button onclick="window.history.back()" class="p-2 -ml-2 text-neutral-400">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <h1 class="text-lg font-bold">记一笔</h1>
        <div class="w-10"></div>
    </header>

    <!-- Mode Switcher -->
    <nav class="flex justify-center gap-12 pb-6 border-b border-neutral-50 relative">
        <button onclick="switchMode('voice')" id="tab-voice" class="relative text-sm font-bold text-neutral-400 transition-colors">语音</button>
        <button onclick="switchMode('keyboard')" id="tab-keyboard" class="relative text-sm font-bold mode-tab-active transition-colors">键盘</button>
        <button onclick="switchMode('screenshot')" id="tab-screenshot" class="relative text-sm font-bold text-neutral-400 transition-colors">截图</button>
    </nav>

    <!-- Content Area -->
    <main class="flex-grow overflow-y-auto px-8 pt-8">
        
        <!-- Mode: Keyboard (Default) -->
        <div id="mode-keyboard" class="space-y-10">
            <div class="space-y-2">
                <p class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest">金额</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-2xl font-bold text-neutral-300">¥</span>
                    <span id="displayAmount" class="text-5xl font-bold tracking-tight">0</span>
                    <span class="w-1 h-10 bg-brand-500 animate-pulse ml-1"></span>
                </div>
            </div>

            <div class="space-y-6">
                <!-- Category Row -->
                <button class="w-full flex justify-between items-center py-4 border-b border-neutral-50 group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-neutral-50 rounded-full flex items-center justify-center text-xl group-active:scale-90 transition-all">🍽️</div>
                        <div class="text-left">
                            <div class="flex items-center gap-2">
                                <span class="font-bold">食品 · 生鲜</span>
                                <span class="px-1.5 py-0.5 bg-brand-50 text-brand-500 text-[8px] font-bold rounded border border-brand-100">AI</span>
                            </div>
                            <p class="text-[10px] text-neutral-400 font-medium mt-0.5">根据历史偏好推荐</p>
                        </div>
                    </div>
                    <svg class="text-neutral-200" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
                </button>

                <!-- Date Row -->
                <button class="w-full flex justify-between items-center py-4 border-b border-neutral-50 group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-neutral-50 rounded-full flex items-center justify-center text-xl group-active:scale-90 transition-all">📅</div>
                        <span class="font-bold text-sm">今天 4月13日</span>
                    </div>
                    <svg class="text-neutral-200" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
                </button>

                <!-- Note Row -->
                <div class="flex items-center gap-4 py-4 border-b border-neutral-50">
                    <div class="w-10 h-10 bg-neutral-50 rounded-full flex items-center justify-center text-xl">📝</div>
                    <input type="text" placeholder="备注 (选填)" class="flex-grow bg-transparent outline-none font-medium text-sm">
                </div>
            </div>
        </div>

        <!-- Mode: Voice (Hidden) -->
        <div id="mode-voice" class="hidden h-full flex flex-col items-center justify-center space-y-12">
            <div id="voice-idle" class="flex flex-col items-center space-y-12">
                <button onmousedown="startRecording()" onmouseup="stopRecording()" class="w-32 h-32 bg-brand-500 text-white rounded-full flex flex-col items-center justify-center shadow-xl active:scale-95 transition-all">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
                    <span class="text-[10px] font-bold uppercase tracking-widest mt-2">按住说话</span>
                </button>
                <p class="text-sm font-bold text-neutral-400">试试说：菜市场50块</p>
            </div>

            <!-- Voice Result (Hidden initially) -->
            <div id="voice-result" class="hidden w-full space-y-6">
                <div class="bg-neutral-50 rounded-3xl p-8 space-y-6 border border-neutral-100 relative">
                    <p class="text-xs font-bold text-neutral-400 absolute top-4 left-6">识别结果</p>
                    <p class="text-lg font-bold text-neutral-500 pt-2 italic">“菜市场50块”</p>
                    <div class="space-y-1">
                        <p class="text-4xl font-bold tracking-tight">¥ 50.00</p>
                        <p class="text-sm font-bold text-brand-500">🍽️ 食品·生鲜</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button onclick="switchMode('keyboard')" class="flex-1 h-14 bg-neutral-100 text-neutral-500 font-bold rounded-2xl active:scale-95 transition-all">修改</button>
                    <button onclick="handleSave(50, '食品·生鲜')" class="flex-[2] h-14 bg-brand-500 text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-all">保存</button>
                </div>
            </div>
        </div>

        <!-- Mode: Screenshot (Hidden) -->
        <div id="mode-screenshot" class="hidden h-full flex flex-col items-center">
            <div id="screenshot-idle" class="w-full aspect-square border-2 border-dashed border-neutral-200 rounded-[2rem] flex flex-col items-center justify-center space-y-4 bg-neutral-50 active:bg-neutral-100 transition-colors cursor-pointer" onclick="simulateOcr()">
                <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1A6B5A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                </div>
                <p class="text-sm font-bold text-neutral-500">拍照或选择截图</p>
            </div>

            <!-- OCR Results (Hidden) -->
            <div id="ocr-results" class="hidden w-full space-y-6 pt-4">
                <div class="flex justify-between items-end">
                    <p class="text-sm font-bold text-neutral-400">识别到 2 笔消费：</p>
                    <button class="text-[10px] font-bold text-brand-500">全选</button>
                </div>
                <div class="bg-white border border-neutral-100 rounded-3xl overflow-hidden divide-y divide-neutral-50 shadow-sm">
                    <div class="p-5 flex items-center justify-between active:bg-neutral-50">
                        <div class="flex items-center gap-4">
                            <input type="checkbox" checked class="w-5 h-5 accent-brand-500 rounded">
                            <div>
                                <p class="font-bold text-sm">瑞幸咖啡</p>
                                <p class="text-[10px] text-neutral-400 font-medium">4月13日 10:32</p>
                            </div>
                        </div>
                        <span class="font-bold">¥18.00</span>
                    </div>
                    <div class="p-5 flex items-center justify-between active:bg-neutral-50">
                        <div class="flex items-center gap-4">
                            <input type="checkbox" checked class="w-5 h-5 accent-brand-500 rounded">
                            <div>
                                <p class="font-bold text-sm">美团外卖</p>
                                <p class="text-[10px] text-neutral-400 font-medium">4月12日 12:05</p>
                            </div>
                        </div>
                        <span class="font-bold">¥38.00</span>
                    </div>
                </div>
                <button onclick="handleSave(56, '多笔消费')" class="w-full h-14 bg-brand-500 text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-all">保存 2 笔</button>
            </div>
        </div>

    </main>

    <!-- Custom Numeric Keypad (Only for Keyboard mode) -->
    <footer id="keypad" class="bg-neutral-50 p-4 pb-8 transition-transform duration-300">
        <div class="w-full max-w-sm mx-auto space-y-4">
            <div class="grid grid-cols-4 gap-2">
                <button onclick="appendNum('1')" class="numpad-key h-14 bg-white rounded-xl font-bold text-lg shadow-sm">1</button>
                <button onclick="appendNum('2')" class="numpad-key h-14 bg-white rounded-xl font-bold text-lg shadow-sm">2</button>
                <button onclick="appendNum('3')" class="numpad-key h-14 bg-white rounded-xl font-bold text-lg shadow-sm">3</button>
                <button onclick="deleteNum()" class="h-14 bg-neutral-200 rounded-xl flex items-center justify-center">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
                </button>
                
                <button onclick="appendNum('4')" class="numpad-key h-14 bg-white rounded-xl font-bold text-lg shadow-sm">4</button>
                <button onclick="appendNum('5')" class="numpad-key h-14 bg-white rounded-xl font-bold text-lg shadow-sm">5</button>
                <button onclick="appendNum('6')" class="numpad-key h-14 bg-white rounded-xl font-bold text-lg shadow-sm">6</button>
                <button onclick="appendNum('.')" class="numpad-key h-14 bg-white rounded-xl font-bold text-lg shadow-sm">.</button>
                
                <button onclick="appendNum('7')" class="numpad-key h-14 bg-white rounded-xl font-bold text-lg shadow-sm">7</button>
                <button onclick="appendNum('8')" class="numpad-key h-14 bg-white rounded-xl font-bold text-lg shadow-sm">8</button>
                <button onclick="appendNum('9')" class="numpad-key h-14 bg-white rounded-xl font-bold text-lg shadow-sm">9</button>
                <button onclick="appendNum('0')" class="numpad-key h-14 bg-white rounded-xl font-bold text-lg shadow-sm">0</button>
            </div>
            <button id="saveBtn" onclick="handleSave()" disabled class="w-full h-16 bg-neutral-200 text-neutral-400 font-bold rounded-2xl transition-all shadow-sm">保存</button>
        </div>
    </footer>

    <script>
        let currentAmount = "0";
        let activeMode = 'keyboard';

        function switchMode(mode) {
            activeMode = mode;
            ['voice', 'keyboard', 'screenshot'].forEach(m => {
                document.getElementById(`mode-${m}`).classList.add('hidden');
                document.getElementById(`tab-${m}`).classList.remove('mode-tab-active', 'text-brand-500');
                document.getElementById(`tab-${m}`).classList.add('text-neutral-400');
            });

            document.getElementById(`mode-${mode}`).classList.remove('hidden');
            document.getElementById(`tab-${mode}`).classList.add('mode-tab-active');
            document.getElementById(`tab-${mode}`).classList.remove('text-neutral-400');

            if (mode === 'keyboard') {
                document.getElementById('keypad').style.transform = 'translateY(0)';
            } else {
                document.getElementById('keypad').style.transform = 'translateY(100%)';
            }
        }

        function appendNum(num) {
            if (currentAmount === "0" && num !== ".") currentAmount = num;
            else if (num === "." && currentAmount.includes(".")) return;
            else currentAmount += num;
            updateDisplay();
        }

        function deleteNum() {
            currentAmount = currentAmount.slice(0, -1);
            if (currentAmount === "") currentAmount = "0";
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('displayAmount').innerText = currentAmount;
            const btn = document.getElementById('saveBtn');
            if (parseFloat(currentAmount) > 0) {
                btn.disabled = false;
                btn.classList.replace('bg-neutral-200', 'bg-brand-500');
                btn.classList.replace('text-neutral-400', 'text-white');
            } else {
                btn.disabled = true;
                btn.classList.replace('bg-brand-500', 'bg-neutral-200');
                btn.classList.replace('text-white', 'text-neutral-400');
            }
        }

        function handleSave(amt, cat) {
            const amount = amt || currentAmount;
            const category = cat || "食品·生鲜";
            
            document.getElementById('successMsg').innerText = `已记录 ¥${amount} ${category}`;
            const toast = document.getElementById('successToast');
            toast.classList.remove('hidden');
            
            setTimeout(() => {
                window.history.back();
            }, 2500);
        }

        function startRecording() {
            const btn = document.querySelector('#mode-voice button');
            btn.classList.add('voice-pulse');
        }

        function stopRecording() {
            const btn = document.querySelector('#mode-voice button');
            btn.classList.remove('voice-pulse');
            document.getElementById('voice-idle').classList.add('hidden');
            document.getElementById('voice-result').classList.remove('hidden');
        }

        function simulateOcr() {
            document.getElementById('screenshot-idle').innerHTML = '<div class="flex flex-col items-center gap-4"><div class="w-8 h-8 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div><p class="text-sm font-bold text-neutral-500">正在识别消费信息...</p></div>';
            setTimeout(() => {
                document.getElementById('screenshot-idle').classList.add('hidden');
                document.getElementById('ocr-results').classList.remove('hidden');
            }, 1500);
        }
    </script>
</body>
</html>
