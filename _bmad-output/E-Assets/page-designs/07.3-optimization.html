<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>了然 - 优化建议</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#F0F9F6',
                            100: '#E1F2ED',
                            500: '#1A6B5A',
                            600: '#155648',
                        },
                        neutral: {
                            50: '#F9FAFB',
                            100: '#F3F4F6',
                            200: '#E5E7EB',
                            400: '#9CA3AF',
                            500: '#6B7280',
                            800: '#1F2937',
                        },
                        success: '#22C55E'
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .potential-card { background: linear-gradient(135deg, #F0F9F6 0%, #E1F2ED 100%); }
        .suggestion-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .detail-panel { max-height: 0; overflow: hidden; transition: all 0.4s ease; opacity: 0; }
        .suggestion-card.expanded .detail-panel { max-height: 400px; opacity: 1; margin-top: 1rem; }
        .tracking-bar { transition: width 1s ease-out; }
        .cta-gradient { background: linear-gradient(135deg, #1A6B5A 0%, #155648 100%); }
    </style>
</head>
<body class="bg-neutral-50 font-sans text-neutral-800 antialiased min-h-screen pb-32">

    <!-- Header -->
    <header class="p-6 flex items-center justify-between sticky top-0 bg-neutral-50/90 backdrop-blur-md z-40">
        <button onclick="window.history.back()" class="p-1"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
        <h1 class="text-lg font-bold">优化建议</h1>
        <div class="w-8"></div>
    </header>

    <main class="px-6 space-y-8">
        
        <!-- Savings Potential Overview -->
        <section class="potential-card rounded-[2.5rem] p-8 border border-brand-100 shadow-sm text-center space-y-4">
            <p class="text-xs font-bold text-brand-600 uppercase tracking-widest">本月省钱潜力</p>
            <div class="space-y-1">
                <h2 class="text-5xl font-bold tracking-tight text-brand-500">¥1,860<span class="text-lg font-medium opacity-60">/月</span></h2>
                <p class="text-xl font-semibold text-brand-600/70">¥22,320<span class="text-sm font-medium opacity-60">/年</span></p>
            </div>
            <p class="text-[10px] text-brand-600/50 font-bold uppercase tracking-tighter">基于你近 3 个月的真实消费</p>
        </section>

        <!-- Suggestions List -->
        <section class="space-y-4">
            <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-widest px-1">AI 为你找到的建议</h3>
            
            <!-- Suggestion 1: Delivery -->
            <div class="suggestion-card bg-white border border-neutral-100 rounded-3xl p-6 shadow-sm group" id="sug-1">
                <div onclick="toggleExpand('sug-1')" class="flex justify-between items-center cursor-pointer">
                    <div class="space-y-1">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">🍜</span>
                            <h4 class="font-bold">减少外卖频率</h4>
                        </div>
                        <p class="text-sm font-bold text-success">每月可省 ¥680</p>
                    </div>
                    <svg class="text-neutral-300 transition-transform group-[.expanded]:rotate-180" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m6 9 6 6 6-6"/></svg>
                </div>
                
                <div class="detail-panel space-y-6">
                    <div class="grid grid-cols-2 gap-4 bg-neutral-50 rounded-2xl p-4">
                        <div class="space-y-1">
                            <p class="text-[10px] text-neutral-400 font-bold uppercase">当前</p>
                            <p class="text-sm font-bold">月均 12 次</p>
                        </div>
                        <div class="space-y-1 border-l border-neutral-100 pl-4">
                            <p class="text-[10px] text-brand-500 font-bold uppercase">建议</p>
                            <p class="text-sm font-bold text-brand-500">月均 8 次</p>
                        </div>
                    </div>
                    
                    <div class="space-y-1">
                        <p class="text-xs text-neutral-500 leading-relaxed">
                            你的外卖均价 ¥57，月均 12 次。减少 4 次相当于每周少点一次，不影响工作日午餐安排。周末可以尝试自己做，既健康又省钱。
                        </p>
                    </div>

                    <div class="flex gap-3">
                        <button onclick="adoptSuggestion('sug-1', '减少外卖频率', 680)" class="flex-1 h-12 border-2 border-brand-500 text-brand-500 font-bold rounded-xl active:scale-95 transition-all">采纳</button>
                        <button class="px-4 text-xs font-bold text-neutral-400">暂不考虑</button>
                    </div>
                </div>
            </div>

            <!-- Suggestion 2: Coffee -->
            <div class="suggestion-card bg-white border border-neutral-100 rounded-3xl p-6 shadow-sm group" id="sug-2">
                <div onclick="toggleExpand('sug-2')" class="flex justify-between items-center cursor-pointer">
                    <div class="space-y-1">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">☕</span>
                            <h4 class="font-bold">饮品消费优化</h4>
                        </div>
                        <p class="text-sm font-bold text-success">每月可省 ¥320</p>
                    </div>
                    <svg class="text-neutral-300 transition-transform group-[.expanded]:rotate-180" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m6 9 6 6 6-6"/></svg>
                </div>
                <div class="detail-panel">
                    <p class="text-xs text-neutral-500">详细分析加载中...</p>
                </div>
            </div>
        </section>

        <!-- Execution Tracking -->
        <section id="trackingSection" class="hidden space-y-4">
            <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-widest px-1">执行追踪</h3>
            <div id="trackingContainer" class="space-y-3"></div>
        </section>

        <!-- Final CTA -->
        <section class="pt-4">
            <div onclick="window.location.href='07.4-simulation.html'" class="cta-gradient rounded-3xl p-6 text-white flex justify-between items-center shadow-xl shadow-brand-500/30 active:scale-[0.98] transition-all cursor-pointer relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-12 -mt-12 blur-2xl"></div>
                <div class="space-y-1 relative z-10">
                    <h4 class="text-lg font-bold">模拟省钱效果</h4>
                    <p class="text-white/70 text-xs">看看一年能多攒多少钱</p>
                </div>
                <svg class="relative z-10" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </div>
        </section>

    </main>

    <script>
        function toggleExpand(id) {
            const el = document.getElementById(id);
            const isExpanded = el.classList.contains('expanded');
            
            // Close all others
            document.querySelectorAll('.suggestion-card').forEach(card => card.classList.remove('expanded'));
            
            if (!isExpanded) {
                el.classList.add('expanded');
                // Scroll into view
                setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
            }
        }

        function adoptSuggestion(id, name, amount) {
            const card = document.getElementById(id);
            card.style.transform = 'scale(0.95)';
            card.style.opacity = '0';
            
            setTimeout(() => {
                card.classList.add('hidden');
                showTracking(name, amount);
            }, 300);
        }

        function showTracking(name, amount) {
            const section = document.getElementById('trackingSection');
            const container = document.getElementById('trackingContainer');
            section.classList.remove('hidden');
            
            const trackingCard = `
                <div class="bg-white border-l-4 border-l-success rounded-2xl p-5 shadow-sm space-y-4">
                    <div class="flex justify-between items-start">
                        <h4 class="text-sm font-bold">${name}（已采纳）</h4>
                        <span class="text-xs font-bold text-success">本月已省 ¥340</span>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between text-[10px] font-bold text-neutral-400">
                            <span>本月进度：已减少 2 次</span>
                            <span>50%</span>
                        </div>
                        <div class="h-2 w-full bg-neutral-100 rounded-full overflow-hidden">
                            <div class="h-full bg-success tracking-bar" style="width: 50%"></div>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += trackingCard;
        }
    </script>
</body>
</html>
