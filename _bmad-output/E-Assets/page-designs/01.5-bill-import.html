<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>了然 - 导入账单</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#EEF2FF',
                            500: '#1A6B5A',
                            600: '#155648',
                        },
                        neutral: {
                            50: '#F9FAFB',
                            100: '#F3F4F6',
                            200: '#E5E7EB',
                            300: '#D1D5DB',
                            400: '#9CA3AF',
                            500: '#6B7280',
                            800: '#1F2937',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-neutral-50 font-sans text-neutral-800 antialiased h-screen overflow-y-auto">

    <!-- Top Bar -->
    <header class="p-6 flex items-center gap-4 bg-neutral-50 sticky top-0 z-50">
        <button onclick="window.location.href='01.4-permission.html'" class="p-2 -ml-2">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h1 class="text-lg font-bold">导入账单</h1>
    </header>

    <!-- Header Section -->
    <div class="px-8 py-6 space-y-2">
        <h2 class="text-2xl font-bold leading-tight">导入历史账单，看看<br>过去几个月的消费全貌</h2>
        <p class="text-neutral-500">从支付宝导出账单文件，AI 自动分类每一笔消费</p>
    </div>

    <!-- Source Selector -->
    <section class="px-8 mb-8 overflow-x-auto">
        <div class="flex gap-3 pb-2">
            <div class="flex-shrink-0 w-28 h-24 bg-white border-2 border-brand-500 rounded-xl flex flex-col items-center justify-center gap-2">
                <div class="w-10 h-10 bg-[#12AAEB] rounded-lg flex items-center justify-center text-white">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12.002 4.148c-4.47 0-8.093 3.32-8.093 7.412 0 2.27 1.112 4.312 2.87 5.672l-.726 2.147 2.454-1.22c.473.13 1.01.213 1.495.213 4.47 0 8.093-3.32 8.093-7.412s-3.623-7.412-8.093-7.412z"/></svg>
                </div>
                <span class="text-sm font-bold">支付宝</span>
            </div>
            <div class="flex-shrink-0 w-28 h-24 bg-white border border-neutral-100 rounded-xl flex flex-col items-center justify-center gap-2 opacity-50 relative overflow-hidden">
                <div class="absolute top-0 right-0 bg-neutral-200 text-neutral-500 text-[9px] px-1.5 py-0.5 rounded-bl-lg">即将支持</div>
                <div class="w-10 h-10 bg-[#07C160] rounded-lg flex items-center justify-center text-white">
                     <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12.002 4.148c-4.47 0-8.093 3.32-8.093 7.412 0 2.27 1.112 4.312 2.87 5.672l-.726 2.147 2.454-1.22c.473.13 1.01.213 1.495.213 4.47 0 8.093-3.32 8.093-7.412s-3.623-7.412-8.093-7.412z"/></svg>
                </div>
                <span class="text-sm font-bold">微信支付</span>
            </div>
        </div>
    </section>

    <!-- Tutorial Section -->
    <section class="px-8 space-y-6 mb-12">
        <h3 class="font-bold flex items-center gap-2">
            <span class="w-1 h-5 bg-brand-500 rounded-full"></span>
            如何从支付宝导出账单
        </h3>

        <!-- Step 1 -->
        <div class="bg-white rounded-2xl p-5 border border-neutral-100 space-y-4">
            <div class="flex gap-4">
                <div class="w-6 h-6 rounded-full bg-neutral-800 text-white text-xs flex items-center justify-center flex-shrink-0">1</div>
                <div class="space-y-1">
                    <h4 class="font-bold">打开支付宝，进入账单</h4>
                    <p class="text-xs text-neutral-500">点击底部「我的」，然后点击「账单」</p>
                </div>
            </div>
            <div class="h-32 bg-neutral-50 rounded-xl flex items-center justify-center">
                <div class="w-24 h-24 bg-white rounded shadow-sm relative overflow-hidden flex flex-col justify-end p-2 border border-neutral-100">
                    <div class="flex justify-around mb-1">
                        <div class="w-4 h-4 bg-neutral-100 rounded"></div>
                        <div class="w-4 h-4 bg-brand-500 rounded-lg ring-2 ring-brand-50 ring-offset-1"></div>
                        <div class="w-4 h-4 bg-neutral-100 rounded"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Step 2 -->
        <div class="bg-white rounded-2xl p-5 border border-neutral-100 space-y-4">
            <div class="flex gap-4">
                <div class="w-6 h-6 rounded-full bg-neutral-800 text-white text-xs flex items-center justify-center flex-shrink-0">2</div>
                <div class="space-y-1">
                    <h4 class="font-bold">申请导出账单</h4>
                    <p class="text-xs text-neutral-500">点击右上角「...」，选择「开具交易流水证明」</p>
                </div>
            </div>
        </div>

        <!-- Step 3 -->
        <div class="bg-white rounded-2xl p-5 border border-neutral-100 space-y-4">
            <div class="flex gap-4">
                <div class="w-6 h-6 rounded-full bg-neutral-800 text-white text-xs flex items-center justify-center flex-shrink-0">3</div>
                <div class="space-y-1">
                    <h4 class="font-bold">选择时间范围并申请</h4>
                    <p class="text-xs text-neutral-500">建议选择近 3 个月，填写你的邮箱接收文件</p>
                </div>
            </div>
        </div>

        <!-- Step 4 -->
        <div class="bg-white rounded-2xl p-5 border border-neutral-100 space-y-4">
            <div class="flex gap-4">
                <div class="w-6 h-6 rounded-full bg-neutral-800 text-white text-xs flex items-center justify-center flex-shrink-0">4</div>
                <div class="space-y-1">
                    <h4 class="font-bold">下载账单文件</h4>
                    <p class="text-xs text-neutral-500">在邮箱中下载 CSV 附件到手机</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Upload & Skip -->
    <footer class="px-8 pb-12 flex flex-col items-center gap-6">
        <div id="uploadZone" class="w-full space-y-4">
            <button id="uploadBtn" onclick="handleUpload()" class="w-full h-14 bg-brand-500 text-white font-bold rounded-lg shadow-lg shadow-brand-500/20 flex items-center justify-center gap-3 active:scale-[0.98] transition-all">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                选择文件并上传
            </button>
            <div id="progressArea" class="hidden space-y-2">
                <div class="flex justify-between text-xs font-medium">
                    <span id="fileName">alipay_record_2026.csv</span>
                    <span id="percent">0%</span>
                </div>
                <div class="h-1.5 w-full bg-neutral-200 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-brand-500 w-0 transition-all"></div>
                </div>
            </div>
        </div>

        <div class="text-center">
            <button onclick="window.location.href='01.7-dashboard.html'" class="text-neutral-400 font-bold">跳过，先看看</button>
            <p class="text-[11px] text-neutral-400 mt-1">随时回来导入</p>
        </div>
    </footer>

    <script>
        function handleUpload() {
            const btn = document.getElementById('uploadBtn');
            const area = document.getElementById('progressArea');
            const bar = document.getElementById('progressBar');
            const percent = document.getElementById('percent');

            btn.disabled = true;
            btn.innerHTML = '正在上传...';
            area.classList.remove('hidden');

            let p = 0;
            const interval = setInterval(() => {
                p += Math.random() * 30;
                if (p >= 100) {
                    p = 100;
                    clearInterval(interval);
                    btn.innerHTML = '上传成功，正在解析...';
                    btn.classList.add('bg-green-500', 'shadow-green-500/20');
                    setTimeout(() => {
                        window.location.href = '01.6-import-processing.html';
                    }, 1500);
                }
                bar.style.width = p + '%';
                percent.innerHTML = Math.floor(p) + '%';
            }, 300);
        }
    </script>
</body>
</html>
