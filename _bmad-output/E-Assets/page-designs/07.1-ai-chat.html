<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>了然 - AI管家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#F0F9F6',
                            100: '#E1F2ED',
                            500: '#1A6B5A',
                            600: '#155648',
                        },
                        neutral: {
                            50: '#F9FAFB',
                            100: '#F3F4F6',
                            200: '#E5E7EB',
                            400: '#9CA3AF',
                            500: '#6B7280',
                            800: '#1F2937',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .top-tab-active { color: #1A6B5A; border-bottom: 3px solid #1A6B5A; }
        .chat-bubble-ai { border-top-left-radius: 4px; }
        .chat-bubble-user { border-bottom-right-radius: 4px; }
        .typing-dot { animation: bounce 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        .stream-text { display: inline; }
        .stream-text::after {
            content: '';
            width: 2px;
            height: 1.2em;
            background-color: #1A6B5A;
            display: inline-block;
            vertical-align: middle;
            margin-left: 2px;
            animation: blink 0.7s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-neutral-50 font-sans text-neutral-800 antialiased h-screen flex flex-col overflow-hidden">

    <!-- Header & Top Tabs -->
    <header class="bg-white pt-2 border-b border-neutral-100 z-50">
        <div class="flex justify-between items-center px-6 py-4">
            <div class="flex bg-neutral-100 p-1 rounded-xl">
                <button onclick="switchTopTab('chat')" id="tab-chat" class="px-6 py-1.5 rounded-lg text-sm font-bold bg-white shadow-sm text-brand-500">对话</button>
                <button onclick="window.location.href='07.2-insights-feed.html'" id="tab-insights" class="px-6 py-1.5 rounded-lg text-sm font-bold text-neutral-400">洞察</button>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest bg-neutral-100 px-2 py-1 rounded">免费体验 2/3</span>
                <button class="p-1 text-neutral-400"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></button>
            </div>
        </div>
    </header>

    <!-- Chat Message Area -->
    <main id="messageArea" class="flex-grow overflow-y-auto p-6 space-y-8 pb-32">
        
        <!-- AI Initial Greeting -->
        <div class="flex gap-3">
            <div class="w-10 h-10 bg-brand-500 rounded-2xl flex items-center justify-center text-white shadow-sm flex-shrink-0">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/><circle cx="12" cy="12" r="3"/></svg>
            </div>
            <div class="space-y-2">
                <p class="text-[11px] font-bold text-neutral-400 uppercase tracking-widest">AI管家</p>
                <div class="bg-white border border-neutral-100 p-4 rounded-2xl shadow-sm chat-bubble-ai max-w-[85%] space-y-4">
                    <p class="text-sm leading-relaxed">你好大强！我已经分析了你 3 个月的消费，共 386 笔。想知道什么？</p>
                    <div class="space-y-2 pt-2 border-t border-neutral-50">
                        <p class="text-[10px] font-bold text-neutral-400 uppercase">💡 试试问我</p>
                        <div class="flex flex-col gap-2">
                            <button onclick="askQuestion('这个月花最多的是什么')" class="text-left p-3 bg-neutral-50 rounded-xl text-xs font-bold active:scale-[0.98] transition-all">“这个月花最多的是什么”</button>
                            <button onclick="askQuestion('帮我跟上个月对比')" class="text-left p-3 bg-neutral-50 rounded-xl text-xs font-bold active:scale-[0.98] transition-all">“帮我跟上个月对比”</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- History Content Placeholder -->
        <div id="newMessages" class="space-y-8"></div>

        <!-- AI Typing State (Hidden by default) -->
        <div id="typingIndicator" class="hidden flex gap-3">
            <div class="w-10 h-10 bg-brand-500 rounded-2xl flex items-center justify-center text-white shadow-sm flex-shrink-0">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/><circle cx="12" cy="12" r="3"/></svg>
            </div>
            <div class="bg-white border border-neutral-100 p-4 rounded-2xl shadow-sm chat-bubble-ai flex flex-col gap-2">
                <p id="typingHint" class="text-xs font-bold text-neutral-400 uppercase tracking-widest">正在看你的消费</p>
                <div class="flex gap-1 pt-1">
                    <div class="w-2 h-2 bg-brand-500 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-brand-500 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-brand-500 rounded-full typing-dot"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Paywall Modal (Hidden) -->
    <div id="paywall" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-8 bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-sm flex flex-col items-center text-center space-y-6 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-brand-500 opacity-5 rounded-full -mr-16 -mt-16 blur-2xl"></div>
            <span class="text-5xl">🎁</span>
            <div class="space-y-2">
                <h3 class="text-2xl font-bold">解锁AI管家</h3>
                <p class="text-neutral-500 text-sm leading-relaxed">你已体验了 3 次AI对话，升级后可无限提问，还能获得主动洞察和优化建议</p>
            </div>
            <button onclick="window.location.href='../02-dannys-family-shared-ledger-Prototype/02.1-Subscription.html'" class="w-full h-14 bg-brand-500 text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-all">免费领取7天体验</button>
            <button onclick="document.getElementById('paywall').classList.add('hidden')" class="text-neutral-400 text-xs font-bold uppercase tracking-widest">以后再说</button>
        </div>
    </div>

    <!-- Input Bar -->
    <footer class="fixed bottom-24 left-0 right-0 bg-white border-t border-neutral-100 p-4 pb-8 flex items-center gap-3">
        <button class="p-2 text-neutral-400"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></button>
        <div class="flex-grow bg-neutral-100 rounded-3xl px-5 py-3 flex items-center">
            <input id="chatInput" type="text" placeholder="问问AI管家..." class="flex-grow bg-transparent outline-none font-medium text-sm">
        </div>
        <button onclick="handleSend()" id="sendBtn" class="w-11 h-11 bg-neutral-200 text-white rounded-full flex items-center justify-center transition-all">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
        </button>
    </footer>

    <!-- Bottom Tab Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-neutral-100 px-6 pt-3 pb-8 flex justify-between items-center z-40">
        <div onclick="window.location.href='01.7-dashboard.html'" class="flex flex-col items-center gap-1 text-neutral-400">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span class="text-[10px] font-bold">首页</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-neutral-400">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>
            <span class="text-[10px] font-bold">消费</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-brand-500">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
            <span class="text-[10px] font-bold">AI</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-neutral-400">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="text-[10px] font-bold">我的</span>
        </div>
    </nav>

    <script>
        const input = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const messageArea = document.getElementById('messageArea');
        const newMsgContainer = document.getElementById('newMessages');
        let chatCount = 0;

        input.addEventListener('input', () => {
            if (input.value.trim().length > 0) {
                sendBtn.classList.replace('bg-neutral-200', 'bg-brand-500');
            } else {
                sendBtn.classList.replace('bg-brand-500', 'bg-neutral-200');
            }
        });

        function askQuestion(q) {
            input.value = q;
            handleSend();
        }

        function handleSend() {
            const q = input.value.trim();
            if (!q) return;
            
            input.value = '';
            sendBtn.classList.replace('bg-brand-500', 'bg-neutral-200');
            chatCount++;

            // User Message
            const userMsg = `
                <div class="flex flex-col items-end gap-2">
                    <p class="text-[11px] font-bold text-neutral-400 uppercase tracking-widest">你</p>
                    <div class="bg-brand-500 text-white p-4 rounded-2xl shadow-sm chat-bubble-user max-w-[75%]">
                        <p class="text-sm">${q}</p>
                    </div>
                </div>
            `;
            newMsgContainer.innerHTML += userMsg;
            messageArea.scrollTop = messageArea.scrollHeight;

            // AI Response Simulation
            if (chatCount > 2) {
                setTimeout(() => {
                    document.getElementById('paywall').classList.remove('hidden');
                }, 500);
                return;
            }

            simulateAIResponse(q);
        }

        function simulateAIResponse(q) {
            const indicator = document.getElementById('typingIndicator');
            indicator.classList.remove('hidden');
            messageArea.scrollTop = messageArea.scrollHeight;

            setTimeout(() => {
                indicator.classList.add('hidden');
                
                const aiMsgId = 'ai-' + Date.now();
                const aiMsg = `
                    <div class="flex gap-3">
                        <div class="w-10 h-10 bg-brand-500 rounded-2xl flex items-center justify-center text-white shadow-sm flex-shrink-0">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </div>
                        <div class="space-y-2">
                            <p class="text-[11px] font-bold text-neutral-400 uppercase tracking-widest">AI管家</p>
                            <div class="bg-white border border-neutral-100 p-4 rounded-2xl shadow-sm chat-bubble-ai max-w-[85%] space-y-4">
                                <p class="text-sm leading-relaxed" id="${aiMsgId}-text"></p>
                                <div id="${aiMsgId}-card" class="hidden bg-neutral-50 rounded-xl p-4 space-y-3 border border-neutral-100">
                                    <p class="text-[10px] font-bold text-neutral-400 uppercase">📊 你的外卖消费</p>
                                    <div class="flex justify-between text-xs">
                                        <span class="text-neutral-500">3月</span>
                                        <span class="font-bold">¥1,280 (40次)</span>
                                    </div>
                                    <div class="flex justify-between text-xs">
                                        <span class="text-neutral-500">2月</span>
                                        <span class="font-bold">¥1,150 (36次)</span>
                                    </div>
                                    <div class="pt-2 border-t border-neutral-100 text-[10px] font-bold text-neutral-400">平均: ¥32/次</div>
                                </div>
                                <div id="${aiMsgId}-actions" class="hidden flex gap-2 overflow-x-auto pb-1 no-scrollbar">
                                    <button class="px-3 py-1.5 border border-brand-500 text-brand-500 rounded-full text-[10px] font-bold whitespace-nowrap">查看外卖明细</button>
                                    <button class="px-3 py-1.5 border border-brand-500 text-brand-500 rounded-full text-[10px] font-bold whitespace-nowrap">模拟省钱效果</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                newMsgContainer.innerHTML += aiMsg;
                messageArea.scrollTop = messageArea.scrollHeight;

                // Streaming Text Simulation
                const textEl = document.getElementById(`${aiMsgId}-text`);
                const fullText = "根据你过去 3 个月的数据，你平均每次外卖消费 32 元。如果每月能减少 4 次，一年可以多存 1,536 元喔！要不要看看详细建议？";
                let i = 0;
                textEl.classList.add('stream-text');
                
                const interval = setInterval(() => {
                    textEl.innerText = fullText.slice(0, i);
                    i++;
                    messageArea.scrollTop = messageArea.scrollHeight;
                    if (i > fullText.length) {
                        clearInterval(interval);
                        textEl.classList.remove('stream-text');
                        document.getElementById(`${aiMsgId}-card`).classList.remove('hidden');
                        document.getElementById(`${aiMsgId}-actions`).classList.remove('hidden');
                        messageArea.scrollTop = messageArea.scrollHeight;
                    }
                }, 30);

            }, 1000);
        }
    </script>
</body>
</html>
