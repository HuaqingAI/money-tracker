<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>了然 - 首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#F0F9F6',
                            100: '#E1F2ED',
                            200: '#B2DFD4',
                            400: '#4DAF94',
                            500: '#1A6B5A', // 了然绿
                            600: '#155648',
                            800: '#0C342C',
                        },
                        neutral: {
                            50: '#F9FAFB',
                            100: '#F3F4F6',
                            200: '#E5E7EB',
                            400: '#9CA3AF',
                            500: '#6B7280',
                            800: '#1F2937',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .hero-gradient {
            background: linear-gradient(135deg, #1A6B5A 0%, #155648 100%);
        }
        .bottom-tab-active {
            color: #1A6B5A;
        }
        .snapshot-card {
            border-left: 4px solid #1A6B5A;
        }
    </style>
</head>
<body class="bg-neutral-50 font-sans text-neutral-800 antialiased min-h-screen pb-24">

    <!-- Month Header -->
    <header class="p-6 flex items-center justify-between sticky top-0 bg-neutral-50/80 backdrop-blur-md z-40">
        <div class="flex items-center gap-2">
            <button class="p-1"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
            <h1 class="text-xl font-bold">4月消费</h1>
            <button class="p-1 opacity-20"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg></button>
        </div>
        <div class="w-10 h-10 rounded-full bg-brand-100 flex items-center justify-center text-brand-600 font-bold border-2 border-white shadow-sm">
            大
        </div>
    </header>

    <main class="px-6 space-y-6">
        
        <!-- Section: Spending Summary Card -->
        <section class="hero-gradient rounded-[2rem] p-8 text-white shadow-xl shadow-brand-500/20 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-16 -mt-16 blur-2xl"></div>
            <div class="relative z-10 space-y-1">
                <p class="text-white/70 text-sm font-medium">本月总支出</p>
                <h2 class="text-4xl font-bold tracking-tight">¥ 12,847.00</h2>
                
                <div class="flex gap-6 pt-6">
                    <div class="space-y-1">
                        <p class="text-white/60 text-[11px] uppercase tracking-wider">收入</p>
                        <p class="text-lg font-bold">¥ 20,000</p>
                    </div>
                    <div class="w-px h-10 bg-white/20"></div>
                    <div class="space-y-1">
                        <p class="text-white/60 text-[11px] uppercase tracking-wider">结余</p>
                        <p class="text-lg font-bold text-green-300">¥ 7,153</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section: AI Spotlight -->
        <section class="bg-brand-50 border border-brand-100 rounded-2xl p-4 flex items-center gap-4 active:scale-[0.98] transition-all cursor-pointer">
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm text-lg">🤖</div>
            <div class="flex-grow">
                <p class="text-[10px] font-bold text-brand-500 uppercase tracking-widest mb-0.5">管家说</p>
                <p class="text-sm font-bold text-neutral-800">本月奶茶已花¥380，超过上月全月了喔~</p>
            </div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1A6B5A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </section>

        <!-- Section: AI Coverage -->
        <section class="space-y-2">
            <div class="flex justify-between items-end px-1">
                <p class="text-xs font-bold text-neutral-500">AI 已自动识别 97% 的消费</p>
                <p class="text-[10px] text-brand-500 font-bold">128/132 笔</p>
            </div>
            <div class="h-1.5 w-full bg-neutral-200/50 rounded-full overflow-hidden">
                <div class="h-full bg-brand-500 w-[97%] rounded-full shadow-[0_0_8px_rgba(26,107,90,0.4)]"></div>
            </div>
        </section>

        <!-- Section: Category Breakdown -->
        <section class="space-y-4 pt-2">
            <div class="flex justify-between items-center px-1">
                <h3 class="font-bold text-lg">分类消费</h3>
                <button class="text-xs font-bold text-brand-500">查看明细</button>
            </div>
            
            <div class="bg-white rounded-3xl p-2 border border-neutral-100 shadow-sm space-y-1">
                <!-- Dining -->
                <div class="flex items-center gap-4 p-4 active:bg-neutral-50 rounded-2xl transition-colors">
                    <div class="w-12 h-12 bg-orange-50 text-2xl flex items-center justify-center rounded-2xl">🍽️</div>
                    <div class="flex-grow space-y-1.5">
                        <div class="flex justify-between items-center">
                            <span class="font-bold">餐饮</span>
                            <span class="font-bold">¥3,200</span>
                        </div>
                        <div class="h-1.5 w-full bg-neutral-100 rounded-full overflow-hidden">
                            <div class="h-full bg-orange-400 w-[25%] rounded-full"></div>
                        </div>
                    </div>
                </div>
                <!-- Housing -->
                <div class="flex items-center gap-4 p-4 active:bg-neutral-50 rounded-2xl transition-colors">
                    <div class="w-12 h-12 bg-blue-50 text-2xl flex items-center justify-center rounded-2xl">🏠</div>
                    <div class="flex-grow space-y-1.5">
                        <div class="flex justify-between items-center">
                            <span class="font-bold">居住</span>
                            <span class="font-bold">¥6,500</span>
                        </div>
                        <div class="h-1.5 w-full bg-neutral-100 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-400 w-[51%] rounded-full"></div>
                        </div>
                    </div>
                </div>
                <!-- Transport -->
                <div class="flex items-center gap-4 p-4 active:bg-neutral-50 rounded-2xl transition-colors">
                    <div class="w-12 h-12 bg-teal-50 text-2xl flex items-center justify-center rounded-2xl">🚗</div>
                    <div class="flex-grow space-y-1.5">
                        <div class="flex justify-between items-center">
                            <span class="font-bold">交通</span>
                            <span class="font-bold">¥1,800</span>
                        </div>
                        <div class="h-1.5 w-full bg-neutral-100 rounded-full overflow-hidden">
                            <div class="h-full bg-teal-500 w-[14%] rounded-full"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section: Report CTA -->
        <button onclick="window.location.href='01.8-monthly-report.html'" class="w-full py-4 bg-white border-2 border-brand-500 text-brand-500 font-bold rounded-2xl shadow-sm active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            查看完整报表
        </button>

        <!-- Section: Import More -->
        <div class="bg-white border border-neutral-100 rounded-2xl p-5 flex items-center gap-4">
            <div class="w-10 h-10 bg-neutral-100 rounded-full flex items-center justify-center text-neutral-400">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </div>
            <div class="flex-grow">
                <h4 class="text-sm font-bold">补充更多账单数据</h4>
                <p class="text-xs text-neutral-400">导入更多月份，看得更清楚</p>
            </div>
            <button onclick="window.location.href='01.5-bill-import.html'" class="text-sm font-bold text-brand-500">去导入</button>
        </div>

    </main>

    <!-- FAB -->
    <button class="fixed bottom-28 right-6 w-14 h-14 bg-brand-500 text-white rounded-full shadow-lg shadow-brand-500/40 flex items-center justify-center active:scale-90 transition-all z-50">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <!-- Bottom Tab Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-neutral-100 px-6 pt-3 pb-8 flex justify-between items-center z-40">
        <div class="flex flex-col items-center gap-1 bottom-tab-active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span class="text-[10px] font-bold">首页</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-neutral-400">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>
            <span class="text-[10px] font-bold">消费</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-neutral-400 relative">
            <div class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></div>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
            <span class="text-[10px] font-bold">AI</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-neutral-400">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="text-[10px] font-bold">我的</span>
        </div>
    </nav>

</body>
</html>
