<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>了然 - 分类管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#F0F9F6',
                            100: '#E1F2ED',
                            500: '#1A6B5A',
                            600: '#155648',
                        },
                        neutral: {
                            50: '#F9FAFB',
                            100: '#F3F4F6',
                            200: '#E5E7EB',
                            400: '#9CA3AF',
                            500: '#6B7280',
                            800: '#1F2937',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .accuracy-card {
            background: linear-gradient(135deg, #F0F9F6 0%, #E1F2ED 100%);
        }
        .rule-item:active { background-color: #F9FAFB; }
        .sheet-enter {
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-neutral-50 font-sans text-neutral-800 antialiased min-h-screen pb-32">

    <!-- Header -->
    <header class="p-6 flex items-center justify-between sticky top-0 bg-neutral-50/90 backdrop-blur-md z-40">
        <button onclick="window.history.back()" class="p-1"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
        <h1 class="text-lg font-bold">分类管理</h1>
        <div class="w-8"></div>
    </header>

    <main class="px-6 space-y-8">
        
        <!-- Accuracy Summary Card -->
        <section class="accuracy-card rounded-3xl p-8 border border-brand-100 shadow-sm flex items-center gap-6">
            <div class="flex flex-col items-center">
                <span class="text-3xl font-bold text-brand-500">96.2%</span>
                <span class="text-[10px] font-bold text-brand-600/60 uppercase tracking-widest mt-1">准确率</span>
            </div>
            <div class="flex-grow space-y-1">
                <h3 class="text-sm font-bold text-brand-600">AI 分类表现出色</h3>
                <p class="text-xs text-brand-600/80">本月 487 笔自动分类</p>
                <p class="text-xs text-brand-600/80">其中 <span class="font-bold border-b border-brand-200">18 笔</span> 被你调整过</p>
            </div>
        </section>

        <!-- Rules List -->
        <section class="space-y-6">
            <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-widest px-1">分类规则</h3>
            
            <div class="space-y-4">
                <!-- Category Section: Dining -->
                <div class="space-y-2">
                    <button onclick="toggleSection('dining')" class="w-full flex items-center justify-between px-1">
                        <div class="flex items-center gap-2">
                            <span class="text-lg">🍽️</span>
                            <span class="font-bold text-sm">餐饮 (12)</span>
                        </div>
                        <svg id="arrow-dining" class="text-neutral-300 transition-transform" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m18 15-6-6-6 6"/></svg>
                    </button>
                    <div id="section-dining" class="bg-white border border-neutral-100 rounded-3xl overflow-hidden divide-y divide-neutral-50 shadow-sm">
                        <div onclick="openEditRule('瑞幸咖啡', '餐饮·饮品')" class="rule-item p-4 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="text-sm font-medium">瑞幸咖啡</span>
                                <span class="text-neutral-300 text-xs">→</span>
                                <span class="text-sm font-bold text-neutral-500">饮品</span>
                            </div>
                            <svg class="text-neutral-200" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
                        </div>
                        <div onclick="openEditRule('美团外卖', '餐饮·外卖')" class="rule-item p-4 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="text-sm font-medium">美团外卖</span>
                                <span class="text-neutral-300 text-xs">→</span>
                                <span class="text-sm font-bold text-neutral-500">外卖</span>
                            </div>
                            <svg class="text-neutral-200" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
                        </div>
                    </div>
                </div>

                <!-- Category Section: Shopping -->
                <div class="space-y-2">
                    <button onclick="toggleSection('shopping')" class="w-full flex items-center justify-between px-1">
                        <div class="flex items-center gap-2">
                            <span class="text-lg">🛒</span>
                            <span class="font-bold text-sm">购物 (8)</span>
                        </div>
                        <svg id="arrow-shopping" class="text-neutral-300 transition-transform rotate-180" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m18 15-6-6-6 6"/></svg>
                    </button>
                    <div id="section-shopping" class="hidden bg-white border border-neutral-100 rounded-3xl overflow-hidden divide-y divide-neutral-50 shadow-sm">
                        <div onclick="openEditRule('拼多多', '购物·综合')" class="rule-item p-4 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="text-sm font-medium text-brand-500">拼多多</span>
                                <span class="text-neutral-300 text-xs">→</span>
                                <span class="text-sm font-bold text-neutral-500">综合</span>
                            </div>
                            <svg class="text-neutral-200" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Action Buttons -->
        <section class="space-y-3 pt-4">
            <button onclick="openCreateCategory()" class="w-full h-14 bg-white border border-neutral-100 rounded-2xl flex items-center px-6 gap-3 active:scale-[0.98] transition-all text-brand-500 font-bold shadow-sm">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                创建自定义分类
            </button>
            <!-- iOS Only Link Mockup -->
            <button onclick="window.location.href='06.3-ios-shortcuts.html'" class="w-full h-14 bg-white border border-neutral-100 rounded-2xl flex items-center px-6 justify-between active:scale-[0.98] transition-all shadow-sm">
                <div class="flex items-center gap-3">
                    <span class="text-xl">📲</span>
                    <span class="font-bold text-sm">iOS 快捷指令配置</span>
                </div>
                <svg class="text-neutral-200" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </section>

    </main>

    <!-- Rule Edit Sheet -->
    <div id="editSheet" class="hidden fixed inset-0 z-[100] flex flex-col justify-end bg-black/40 backdrop-blur-sm">
        <div class="absolute inset-0" onclick="closeSheet('editSheet')"></div>
        <div class="relative bg-white w-full rounded-t-[2.5rem] p-8 space-y-8 shadow-2xl sheet-enter">
            <div class="w-12 h-1.5 bg-neutral-100 rounded-full mx-auto"></div>
            <h2 class="text-xl font-bold">编辑规则</h2>
            
            <div class="space-y-6">
                <div class="flex justify-between items-center border-b border-neutral-50 pb-4">
                    <span class="text-xs font-bold text-neutral-400 uppercase">商户</span>
                    <span id="editMerchant" class="font-bold">拼多多</span>
                </div>
                <div class="flex justify-between items-center border-b border-neutral-50 pb-4">
                    <span class="text-xs font-bold text-neutral-400 uppercase">当前分类</span>
                    <span id="editCurrent" class="text-neutral-500 font-medium">购物 · 综合</span>
                </div>
                <div class="space-y-3">
                    <label class="text-xs font-bold text-neutral-400 uppercase">修改为</label>
                    <button class="w-full h-14 bg-neutral-50 rounded-2xl flex items-center justify-between px-5 font-bold">
                        <span>🛒 购物 · 日用品</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m6 9 6 6 6-6"/></svg>
                    </button>
                </div>
                <div class="flex items-start gap-3 bg-brand-50 p-4 rounded-2xl border border-brand-100">
                    <input type="checkbox" checked class="mt-1 w-5 h-5 accent-brand-500 rounded">
                    <div class="space-y-1">
                        <p class="text-sm font-bold text-brand-600">同时修改历史记录</p>
                        <p class="text-[10px] text-brand-500">(将修改 23 笔记录)</p>
                    </div>
                </div>
            </div>

            <div class="flex gap-4">
                <button onclick="closeSheet('editSheet')" class="flex-1 h-14 bg-neutral-100 text-neutral-500 font-bold rounded-2xl active:scale-95 transition-all">取消</button>
                <button onclick="closeSheet('editSheet')" class="flex-[2] h-14 bg-brand-500 text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-all">确认修改</button>
            </div>
        </div>
    </div>

    <!-- Create Category Sheet -->
    <div id="createSheet" class="hidden fixed inset-0 z-[100] flex flex-col justify-end bg-black/40 backdrop-blur-sm">
        <div class="absolute inset-0" onclick="closeSheet('createSheet')"></div>
        <div class="relative bg-white w-full rounded-t-[2.5rem] p-8 space-y-8 shadow-2xl sheet-enter">
            <div class="w-12 h-1.5 bg-neutral-100 rounded-full mx-auto"></div>
            <h2 class="text-xl font-bold">创建自定义分类</h2>
            
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-neutral-400 uppercase">分类名称</label>
                    <input type="text" placeholder="如：宠物" class="w-full h-14 bg-neutral-50 rounded-2xl px-5 outline-none font-bold focus:ring-2 focus:ring-brand-500">
                </div>
                <div class="space-y-3">
                    <label class="text-xs font-bold text-neutral-400 uppercase">选择图标</label>
                    <div class="grid grid-cols-6 gap-3">
                        <button class="w-10 h-10 bg-neutral-100 rounded-full flex items-center justify-center text-xl">🐱</button>
                        <button class="w-10 h-10 bg-neutral-100 rounded-full flex items-center justify-center text-xl">🎮</button>
                        <button class="w-10 h-10 bg-neutral-100 rounded-full flex items-center justify-center text-xl">💊</button>
                        <button class="w-10 h-10 bg-neutral-100 rounded-full flex items-center justify-center text-xl">📚</button>
                        <button class="w-10 h-10 bg-neutral-100 rounded-full flex items-center justify-center text-xl">🏋️</button>
                        <button class="w-10 h-10 bg-neutral-100 rounded-full flex items-center justify-center text-xl">✨</button>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-neutral-400 uppercase">归属大类</label>
                    <button class="w-full h-14 bg-neutral-50 rounded-2xl flex items-center justify-between px-5 font-bold">
                        <span>🏠 生活 · 自定义</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m6 9 6 6 6-6"/></svg>
                    </button>
                </div>
            </div>

            <div class="flex gap-4">
                <button onclick="closeSheet('createSheet')" class="flex-1 h-14 bg-neutral-100 text-neutral-500 font-bold rounded-2xl">取消</button>
                <button onclick="closeSheet('createSheet')" class="flex-[2] h-14 bg-brand-500 text-white font-bold rounded-2xl shadow-lg">创建</button>
            </div>
        </div>
    </div>

    <script>
        function toggleSection(id) {
            const section = document.getElementById(`section-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            if (section.classList.contains('hidden')) {
                section.classList.remove('hidden');
                arrow.classList.remove('rotate-180');
            } else {
                section.classList.add('hidden');
                arrow.classList.add('rotate-180');
            }
        }

        function openEditRule(merchant, category) {
            document.getElementById('editMerchant').innerText = merchant;
            document.getElementById('editCurrent').innerText = category;
            document.getElementById('editSheet').classList.remove('hidden');
        }

        function openCreateCategory() {
            document.getElementById('createSheet').classList.remove('hidden');
        }

        function closeSheet(id) {
            document.getElementById(id).classList.add('hidden');
        }
    </script>
</body>
</html>
