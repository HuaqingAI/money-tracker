<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>img-ai-avatar (Placeholder)</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #FFFFFF; }
        .placeholder {
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .avatar-sphere {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #D1FAE5, #1A6B5A 80%);
            box-shadow: 0 30px 60px rgba(26, 107, 90, 0.3), inset 0 5px 20px rgba(255,255,255,0.8);
            position: relative;
            animation: float 4s ease-in-out infinite;
        }
        .pedestal {
            position: absolute;
            bottom: 20px;
            width: 180px;
            height: 20px;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: shadow 4s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        @keyframes shadow {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(0.8); opacity: 0.3; }
            100% { transform: scale(1); opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="placeholder">
        <div class="avatar-sphere"></div>
        <div class="pedestal"></div>
    </div>
</body>
</html>
