<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>img-splash-logo (Placeholder)</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #F9FAFB; }
        .placeholder {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #1A6B5A 0%, #0F4036 100%);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(26, 107, 90, 0.2), inset 0 2px 0 rgba(255,255,255,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        /* Frosted glass effect simulation */
        .placeholder::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            transform: rotate(45deg);
        }
        .shape {
            width: 160px;
            height: 160px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="placeholder">
        <div class="shape"></div>
    </div>
</body>
</html>
