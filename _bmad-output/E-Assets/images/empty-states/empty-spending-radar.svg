<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- Background -->
  <rect width="240" height="240" fill="#F9FAFB"/>

  <!-- Soft background circle -->
  <circle cx="118" cy="118" r="80" fill="#EEF9F6" opacity="0.55"/>

  <!-- Radar web - 6 axes, 3 rings -->
  <!-- Center point -->
  <!-- Outer hexagon (ring 3) -->
  <polygon points="118,42 180,78 180,150 118,186 56,150 56,78"
           fill="none" stroke="#E5E7EB" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Middle hexagon (ring 2) -->
  <polygon points="118,66 160,90 160,138 118,162 76,138 76,90"
           fill="none" stroke="#E5E7EB" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Inner hexagon (ring 1) -->
  <polygon points="118,90 142,104 142,130 118,144 94,130 94,104"
           fill="none" stroke="#E5E7EB" stroke-width="1.3" stroke-linejoin="round"/>

  <!-- 6 axis lines from center to outer hexagon vertices -->
  <line x1="118" y1="114" x2="118" y2="42" stroke="#E5E7EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="118" y1="114" x2="180" y2="78" stroke="#E5E7EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="118" y1="114" x2="180" y2="150" stroke="#E5E7EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="118" y1="114" x2="118" y2="186" stroke="#E5E7EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="118" y1="114" x2="56" y2="150" stroke="#E5E7EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="118" y1="114" x2="56" y2="78" stroke="#E5E7EB" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="118" cy="114" r="3.5" fill="#E5E7EB"/>

  <!-- Axis endpoint dots (outer ring) -->
  <circle cx="118" cy="42" r="3" fill="#E5E7EB"/>
  <circle cx="180" cy="78" r="3" fill="#E5E7EB"/>
  <circle cx="180" cy="150" r="3" fill="#E5E7EB"/>
  <circle cx="118" cy="186" r="3" fill="#E5E7EB"/>
  <circle cx="56" cy="150" r="3" fill="#E5E7EB"/>
  <circle cx="56" cy="78" r="3" fill="#E5E7EB"/>

  <!-- Axis label placeholder pills -->
  <rect x="108" y="33" width="20" height="6" rx="3" fill="#E5E7EB"/>
  <rect x="184" y="74" width="20" height="6" rx="3" fill="#E5E7EB"/>
  <rect x="184" y="148" width="20" height="6" rx="3" fill="#E5E7EB"/>
  <rect x="108" y="191" width="20" height="6" rx="3" fill="#E5E7EB"/>
  <rect x="32" y="148" width="20" height="6" rx="3" fill="#E5E7EB"/>
  <rect x="32" y="74" width="20" height="6" rx="3" fill="#E5E7EB"/>

  <!-- Magnifying glass - bottom right corner -->
  <g transform="translate(175, 172)">
    <!-- Glass circle -->
    <circle cx="0" cy="0" r="18" fill="#EEF9F6" stroke="#1A6B5A" stroke-width="2.5"/>
    <!-- Inner glass shine -->
    <circle cx="-5" cy="-5" r="5" fill="none" stroke="#A8DDD6" stroke-width="1.5" opacity="0.7"/>
    <!-- Handle -->
    <line x1="13" y1="13" x2="26" y2="26" stroke="#1A6B5A" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Handle grip end -->
    <circle cx="26" cy="26" r="3" fill="#0D4437"/>
  </g>

  <!-- Small sparkle near magnifying glass -->
  <g transform="translate(157, 158)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#A8DDD6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#A8DDD6" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
