<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- Background -->
  <rect width="240" height="240" fill="#F9FAFB"/>

  <!-- Soft background glow -->
  <circle cx="112" cy="118" r="78" fill="#EEF9F6" opacity="0.65"/>

  <!-- Magnifying glass (large, centered-left) -->
  <g transform="translate(104, 108)">
    <!-- Glass outer ring -->
    <circle cx="0" cy="0" r="52" fill="#EEF9F6" stroke="#1A6B5A" stroke-width="3"/>
    <!-- Glass inner shine arc -->
    <circle cx="-14" cy="-14" r="14" fill="none" stroke="#A8DDD6" stroke-width="2" opacity="0.6"/>
    <!-- Handle -->
    <line x1="37" y1="37" x2="60" y2="60" stroke="#1A6B5A" stroke-width="5" stroke-linecap="round"/>
    <!-- Handle grip end knob -->
    <circle cx="60" cy="60" r="6" fill="#0D4437"/>

    <!-- Data elements floating inside the glass -->
    <!-- Flowing dots line 1 (orange - food/lifestyle) -->
    <circle cx="-28" cy="-18" r="5" fill="#F97316"/>
    <circle cx="-14" cy="-22" r="5" fill="#F97316" opacity="0.7"/>
    <circle cx="0" cy="-16" r="5" fill="#F97316" opacity="0.5"/>
    <circle cx="14" cy="-20" r="5" fill="#F97316" opacity="0.3"/>

    <!-- Flowing dots line 2 (blue - transport) -->
    <circle cx="-24" cy="0" r="4.5" fill="#3B82F6"/>
    <circle cx="-10" cy="4" r="4.5" fill="#3B82F6" opacity="0.7"/>
    <circle cx="4" cy="-2" r="4.5" fill="#3B82F6" opacity="0.5"/>
    <circle cx="18" cy="2" r="4.5" fill="#3B82F6" opacity="0.3"/>

    <!-- Flowing dots line 3 (purple - entertainment) -->
    <circle cx="-20" cy="18" r="4" fill="#8B5CF6"/>
    <circle cx="-6" cy="22" r="4" fill="#8B5CF6" opacity="0.7"/>
    <circle cx="8" cy="16" r="4" fill="#8B5CF6" opacity="0.5"/>

    <!-- Flowing dots line 4 (cyan - utilities) -->
    <circle cx="-16" cy="34" r="3.5" fill="#06B6D4"/>
    <circle cx="-2" cy="38" r="3.5" fill="#06B6D4" opacity="0.7"/>
    <circle cx="12" cy="34" r="3.5" fill="#06B6D4" opacity="0.5"/>

    <!-- Connecting flow line (subtle) through dots -->
    <path d="M-28,-18 Q-14,-22 0,-16 Q14,-20 18,-20" fill="none" stroke="#F97316" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <path d="M-24,0 Q-10,4 4,-2 Q18,2 18,2" fill="none" stroke="#3B82F6" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <path d="M-20,18 Q-6,22 8,16" fill="none" stroke="#8B5CF6" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <path d="M-16,34 Q-2,38 12,34" fill="none" stroke="#06B6D4" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Dots floating outside the glass (being drawn in) -->
  <!-- Top area -->
  <circle cx="62" cy="52" r="5" fill="#F97316" opacity="0.35"/>
  <circle cx="50" cy="68" r="4" fill="#3B82F6" opacity="0.3"/>
  <circle cx="78" cy="44" r="3.5" fill="#8B5CF6" opacity="0.3"/>

  <!-- Right area outside glass -->
  <circle cx="186" cy="80" r="5" fill="#06B6D4" opacity="0.35"/>
  <circle cx="196" cy="96" r="4" fill="#F97316" opacity="0.28"/>
  <circle cx="192" cy="116" r="3.5" fill="#3B82F6" opacity="0.28"/>

  <!-- Motion trail lines suggesting data flowing toward glass -->
  <path d="M62,52 Q80,60 66,78" fill="none" stroke="#F97316" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="3 4" opacity="0.35"/>
  <path d="M186,80 Q178,90 172,100" fill="none" stroke="#06B6D4" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="3 4" opacity="0.3"/>

  <!-- Small sparkle near glass top -->
  <g transform="translate(76, 56)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#A8DDD6" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#A8DDD6" stroke-width="2" stroke-linecap="round"/>
    <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5" stroke="#A8DDD6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="3.5" y1="-3.5" x2="-3.5" y2="3.5" stroke="#A8DDD6" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <circle cx="175" cy="58" r="2.5" fill="#A8DDD6" opacity="0.7"/>
  <circle cx="185" cy="148" r="2" fill="#1A6B5A" opacity="0.3"/>
</svg>
