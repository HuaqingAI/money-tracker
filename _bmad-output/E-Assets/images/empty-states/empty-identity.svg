<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- Background -->
  <rect width="240" height="240" fill="#F9FAFB"/>

  <!-- Soft background circle -->
  <circle cx="120" cy="120" r="80" fill="#EEF9F6" opacity="0.5"/>

  <!-- Secondary (purple) mask - right, slightly behind -->
  <g transform="translate(138, 118) rotate(12)">
    <!-- Mask face shape -->
    <path d="M0,-52 C30,-52 48,-30 48,0 C48,28 30,54 0,60 C-30,54 -48,28 -48,0 C-48,-30 -30,-52 0,-52 Z"
          fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2.5"/>
    <!-- Left eye hole -->
    <ellipse cx="-16" cy="-8" rx="9" ry="7" fill="#8B5CF6" opacity="0.3"/>
    <ellipse cx="-16" cy="-8" rx="6" ry="4.5" fill="#F9FAFB"/>
    <!-- Right eye hole -->
    <ellipse cx="16" cy="-8" rx="9" ry="7" fill="#8B5CF6" opacity="0.3"/>
    <ellipse cx="16" cy="-8" rx="6" ry="4.5" fill="#F9FAFB"/>
    <!-- Neutral/professional mouth - straight line -->
    <line x1="-14" y1="22" x2="14" y2="22" stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Eyebrow lines (composed, professional) -->
    <path d="M-24,-22 Q-16,-28 -8,-22" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round"/>
    <path d="M8,-22 Q16,-28 24,-22" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round"/>
    <!-- Mask ribbon left -->
    <path d="M-48,0 Q-64,4 -62,16 Q-58,12 -52,16 Q-44,8 -48,0 Z" fill="#C4B5FD" stroke="#8B5CF6" stroke-width="1.5"/>
    <!-- Mask ribbon right -->
    <path d="M48,0 Q64,4 62,16 Q58,12 52,16 Q44,8 48,0 Z" fill="#C4B5FD" stroke="#8B5CF6" stroke-width="1.5"/>
  </g>

  <!-- Primary (teal/green) mask - left, in front -->
  <g transform="translate(100, 114) rotate(-8)">
    <!-- Mask face shape -->
    <path d="M0,-52 C30,-52 48,-30 48,0 C48,28 30,54 0,60 C-30,54 -48,28 -48,0 C-48,-30 -30,-52 0,-52 Z"
          fill="#EEF9F6" stroke="#1A6B5A" stroke-width="2.5"/>
    <!-- Left eye hole -->
    <ellipse cx="-16" cy="-8" rx="9" ry="7" fill="#1A6B5A" opacity="0.25"/>
    <ellipse cx="-16" cy="-8" rx="6" ry="4.5" fill="#F9FAFB"/>
    <!-- Right eye hole -->
    <ellipse cx="16" cy="-8" rx="9" ry="7" fill="#1A6B5A" opacity="0.25"/>
    <ellipse cx="16" cy="-8" rx="6" ry="4.5" fill="#F9FAFB"/>
    <!-- Smiling mouth -->
    <path d="M-16,22 Q0,36 16,22" fill="none" stroke="#1A6B5A" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Cheek blush dots -->
    <circle cx="-26" cy="12" r="5" fill="#A8DDD6" opacity="0.5"/>
    <circle cx="26" cy="12" r="5" fill="#A8DDD6" opacity="0.5"/>
    <!-- Eyebrow arches (warm, slightly raised) -->
    <path d="M-24,-22 Q-16,-30 -8,-24" fill="none" stroke="#1A6B5A" stroke-width="2" stroke-linecap="round"/>
    <path d="M8,-24 Q16,-30 24,-22" fill="none" stroke="#1A6B5A" stroke-width="2" stroke-linecap="round"/>
    <!-- Mask ribbon left -->
    <path d="M-48,0 Q-64,4 -62,16 Q-58,12 -52,16 Q-44,8 -48,0 Z" fill="#A8DDD6" stroke="#1A6B5A" stroke-width="1.5"/>
    <!-- Mask ribbon right -->
    <path d="M48,0 Q64,4 62,16 Q58,12 52,16 Q44,8 48,0 Z" fill="#A8DDD6" stroke="#1A6B5A" stroke-width="1.5"/>
  </g>

  <!-- Small sparkle decorations -->
  <g transform="translate(68, 68)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#A8DDD6" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#A8DDD6" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <g transform="translate(178, 62)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-3" y1="-3" x2="3" y2="3" stroke="#8B5CF6" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="3" y1="-3" x2="-3" y2="3" stroke="#8B5CF6" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  </g>
  <circle cx="160" cy="184" r="2.5" fill="#A8DDD6"/>
  <circle cx="82" cy="180" r="2" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="172" cy="175" r="1.8" fill="#1A6B5A" opacity="0.35"/>
</svg>
