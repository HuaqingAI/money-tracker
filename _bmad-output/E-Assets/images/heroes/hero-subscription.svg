<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Background radial glow -->
    <radialGradient id="subBgGlow" cx="50%" cy="58%" r="45%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#EEF9F6" stop-opacity="0"/>
    </radialGradient>
    <!-- Box body gradient -->
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#219E87"/>
      <stop offset="100%" stop-color="#1A6B5A"/>
    </linearGradient>
    <!-- Box lid gradient -->
    <linearGradient id="lidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2AB898"/>
      <stop offset="100%" stop-color="#1A6B5A"/>
    </linearGradient>
    <!-- Inner glow gradient (warm light from inside box) -->
    <radialGradient id="innerGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#F59E0B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow light beam filter -->
    <filter id="glowBeam" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Box drop shadow -->
    <filter id="boxShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#1A6B5A" flood-opacity="0.22"/>
    </filter>
    <!-- Sparkle glow filter -->
    <filter id="sparkleGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Warm glow blur behind box opening -->
    <filter id="warmGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <!-- Lid shadow to look 3D -->
    <filter id="lidShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0D4437" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="160" height="160" fill="#F9FAFB"/>

  <!-- Background warm glow -->
  <circle cx="80" cy="88" r="52" fill="url(#subBgGlow)"/>

  <!-- ── Inner glow escaping from open box ── -->
  <!-- Warm glow blob above box opening -->
  <ellipse cx="80" cy="68" rx="28" ry="18" fill="#FDE68A" opacity="0.55" filter="url(#warmGlow)"/>
  <ellipse cx="80" cy="60" rx="18" ry="12" fill="#F59E0B" opacity="0.35" filter="url(#warmGlow)"/>

  <!-- Glow rays / light streaks from opening -->
  <g filter="url(#glowBeam)" opacity="0.6">
    <line x1="80" y1="68" x2="80" y2="32" stroke="#FDE68A" stroke-width="4" stroke-linecap="round"/>
    <line x1="80" y1="68" x2="64" y2="38" stroke="#FDE68A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="80" y1="68" x2="96" y2="38" stroke="#FDE68A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="80" y1="68" x2="52" y2="50" stroke="#FDE68A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="80" y1="68" x2="108" y2="50" stroke="#FDE68A" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ── Gift box body ── -->
  <g filter="url(#boxShadow)">
    <!-- Box base -->
    <rect x="44" y="86" width="72" height="52" rx="5" fill="url(#boxGrad)" stroke="#0D4437" stroke-width="1.5"/>
    <!-- Box base highlight (left face suggestion) -->
    <rect x="44" y="86" width="18" height="52" rx="0" fill="white" opacity="0.06"/>
    <!-- Vertical ribbon stripe on box body -->
    <rect x="76" y="86" width="8" height="52" rx="0" fill="#0D4437" opacity="0.45"/>
    <!-- Horizontal ribbon stripe on box body -->
    <rect x="44" y="108" width="72" height="7" rx="0" fill="#0D4437" opacity="0.45"/>
    <!-- Ribbon intersection highlight -->
    <rect x="76" y="108" width="8" height="7" rx="0" fill="#0D4437" opacity="0.3"/>
  </g>

  <!-- ── Gift box lid ── -->
  <g filter="url(#lidShadow)">
    <!-- Lid base shape - slightly open/tilted -->
    <rect x="40" y="76" width="80" height="18" rx="5" fill="url(#lidGrad)" stroke="#0D4437" stroke-width="1.5"/>
    <!-- Lid ribbon stripe -->
    <rect x="76" y="76" width="8" height="18" rx="0" fill="#0D4437" opacity="0.4"/>
    <!-- Lid highlight -->
    <rect x="40" y="76" width="80" height="6" rx="5" fill="white" opacity="0.12"/>
  </g>

  <!-- ── Bow on top of lid ── -->
  <!-- Left bow loop -->
  <path d="M68 76 C58 68 52 62 60 60 C66 58 72 64 80 72"
        stroke="#0D4437" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M68 76 C64 66 60 58 66 56 C72 54 76 64 80 72"
        stroke="#0D4437" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- Right bow loop -->
  <path d="M92 76 C102 68 108 62 100 60 C94 58 88 64 80 72"
        stroke="#0D4437" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M92 76 C96 66 100 58 94 56 C88 54 84 64 80 72"
        stroke="#0D4437" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- Bow center knot -->
  <circle cx="80" cy="74" r="5" fill="#0D4437" stroke="#1A6B5A" stroke-width="1.5"/>
  <circle cx="80" cy="74" r="2.5" fill="#A8DDD6" opacity="0.8"/>

  <!-- ── Sparkles / stars emerging upward ── -->
  <!-- Large sparkle left -->
  <g filter="url(#sparkleGlow)" opacity="0.9">
    <line x1="52" y1="46" x2="52" y2="54" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="48" y1="50" x2="56" y2="50" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Diagonal arms -->
    <line x1="49.4" y1="47.4" x2="54.6" y2="52.6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="54.6" y1="47.4" x2="49.4" y2="52.6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Large sparkle right -->
  <g filter="url(#sparkleGlow)" opacity="0.9">
    <line x1="108" y1="44" x2="108" y2="52" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="104" y1="48" x2="112" y2="48" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="105.4" y1="45.4" x2="110.6" y2="50.6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="110.6" y1="45.4" x2="105.4" y2="50.6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Small sparkle top center -->
  <g filter="url(#sparkleGlow)" opacity="0.8">
    <line x1="80" y1="20" x2="80" y2="26" stroke="#A8DDD6" stroke-width="2" stroke-linecap="round"/>
    <line x1="77" y1="23" x2="83" y2="23" stroke="#A8DDD6" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Dot sparkles scattered -->
  <circle cx="62" cy="34" r="3" fill="#FDE68A" opacity="0.85" filter="url(#sparkleGlow)"/>
  <circle cx="98" cy="30" r="2.5" fill="#FDE68A" opacity="0.8" filter="url(#sparkleGlow)"/>
  <circle cx="44" cy="62" r="2" fill="#A8DDD6" opacity="0.7"/>
  <circle cx="116" cy="64" r="2.2" fill="#A8DDD6" opacity="0.7"/>
  <circle cx="70" cy="24" r="1.8" fill="white" opacity="0.9"/>
  <circle cx="90" cy="22" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="38" cy="78" r="1.5" fill="#A8DDD6" opacity="0.5"/>
  <circle cx="122" cy="76" r="1.5" fill="#A8DDD6" opacity="0.5"/>

  <!-- Label -->
  <text x="80" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1A6B5A" font-weight="600">限时赠礼</text>
  <text x="80" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="0" fill="#6B7280">占位</text>
</svg>
