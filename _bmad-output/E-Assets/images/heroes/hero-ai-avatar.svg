<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Face gradient - slightly lighter at top for dimension -->
    <radialGradient id="faceGrad" cx="42%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#2AB898"/>
      <stop offset="100%" stop-color="#1A6B5A"/>
    </radialGradient>
    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8DDD6"/>
      <stop offset="100%" stop-color="#1A6B5A"/>
    </linearGradient>
    <!-- Face glow -->
    <radialGradient id="faceGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A8DDD6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#EEF9F6" stop-opacity="0"/>
    </radialGradient>
    <!-- Antenna spark gradient -->
    <radialGradient id="antennaSpark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#A8DDD6"/>
    </radialGradient>
    <!-- Drop shadow for face -->
    <filter id="faceShadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0D4437" flood-opacity="0.3"/>
    </filter>
    <!-- Soft glow filter -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Antenna spark glow -->
    <filter id="sparkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background - subtle circle bg -->
  <rect width="120" height="120" fill="#F9FAFB"/>

  <!-- Outermost subtle ring / aura -->
  <circle cx="60" cy="62" r="52" fill="#EEF9F6"/>
  <circle cx="60" cy="62" r="52" stroke="#A8DDD6" stroke-width="1" opacity="0.5"/>
  <!-- Secondary ring -->
  <circle cx="60" cy="62" r="45" stroke="#A8DDD6" stroke-width="0.8" opacity="0.3" stroke-dasharray="4 6"/>

  <!-- ── Antenna ── -->
  <!-- Antenna stem -->
  <line x1="60" y1="17" x2="60" y2="8" stroke="#1A6B5A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Antenna horizontal bar -->
  <line x1="52" y1="13" x2="68" y2="13" stroke="#1A6B5A" stroke-width="2" stroke-linecap="round"/>
  <!-- Left branch -->
  <line x1="52" y1="13" x2="46" y2="7" stroke="#1A6B5A" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Right branch -->
  <line x1="68" y1="13" x2="74" y2="7" stroke="#1A6B5A" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Left spark dot -->
  <circle cx="44" cy="6" r="4" fill="url(#antennaSpark)" filter="url(#sparkGlow)"/>
  <circle cx="44" cy="6" r="2" fill="white"/>
  <!-- Right spark dot -->
  <circle cx="76" cy="6" r="4" fill="url(#antennaSpark)" filter="url(#sparkGlow)"/>
  <circle cx="76" cy="6" r="2" fill="white"/>
  <!-- Center top spark -->
  <circle cx="60" cy="8" r="3" fill="url(#antennaSpark)" filter="url(#sparkGlow)"/>
  <circle cx="60" cy="8" r="1.5" fill="white"/>

  <!-- ── Face circle ── -->
  <g filter="url(#faceShadow)">
    <circle cx="60" cy="66" r="42" fill="url(#faceGrad)"/>
    <!-- Subtle inner highlight (top-left quarter shine) -->
    <circle cx="60" cy="66" r="42" fill="url(#faceGlow)"/>
    <!-- Specular highlight -->
    <ellipse cx="46" cy="52" rx="10" ry="7" fill="white" opacity="0.1" transform="rotate(-15 46 52)"/>
  </g>

  <!-- ── Eyes ── -->
  <!-- Left eye -->
  <circle cx="46" cy="62" r="8" fill="white"/>
  <!-- Left pupil -->
  <circle cx="47.5" cy="63" r="4.5" fill="#0D4437"/>
  <!-- Left eye shine -->
  <circle cx="49" cy="61" r="1.5" fill="white"/>
  <!-- Left pupil micro-highlight -->
  <circle cx="46" cy="64" r="0.8" fill="white" opacity="0.6"/>

  <!-- Right eye -->
  <circle cx="74" cy="62" r="8" fill="white"/>
  <!-- Right pupil -->
  <circle cx="75.5" cy="63" r="4.5" fill="#0D4437"/>
  <!-- Right eye shine -->
  <circle cx="77" cy="61" r="1.5" fill="white"/>
  <!-- Right pupil micro-highlight -->
  <circle cx="74" cy="64" r="0.8" fill="white" opacity="0.6"/>

  <!-- ── Smile ── -->
  <!-- Smile arc - slightly curved, friendly not goofy -->
  <path d="M47 77 Q60 88 73 77" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Subtle smile fill for depth -->
  <path d="M47 77 Q60 88 73 77 Q60 82 47 77 Z" fill="white" opacity="0.12"/>

  <!-- ── Cheek blush ── -->
  <ellipse cx="34" cy="74" rx="9" ry="6" fill="#F97316" opacity="0.14"/>
  <ellipse cx="86" cy="74" rx="9" ry="6" fill="#F97316" opacity="0.14"/>

  <!-- ── Eyebrows (subtle, friendly arc) ── -->
  <path d="M38 54 Q46 50 54 53" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M66 53 Q74 50 82 54" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- ── Small decorative dots on face (tech feel) ── -->
  <circle cx="60" cy="90" r="2" fill="white" opacity="0.25"/>
  <circle cx="54" cy="90" r="1.3" fill="white" opacity="0.18"/>
  <circle cx="66" cy="90" r="1.3" fill="white" opacity="0.18"/>
</svg>
