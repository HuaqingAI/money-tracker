<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 24" width="60" height="24">
  <!-- Three bouncing dots, staggered vertical positions to suggest mid-animation -->
  <!-- Dot 1: low opacity, near baseline (start of bounce) -->
  <circle cx="14" cy="16" r="5" fill="#1A6B5A" opacity="0.4"/>

  <!-- Dot 2: mid opacity, mid height (middle of bounce) -->
  <circle cx="30" cy="10" r="5" fill="#1A6B5A" opacity="0.7"/>

  <!-- Dot 3: full opacity, near top (peak of bounce) -->
  <circle cx="46" cy="6" r="5" fill="#1A6B5A" opacity="1.0"/>
</svg>
