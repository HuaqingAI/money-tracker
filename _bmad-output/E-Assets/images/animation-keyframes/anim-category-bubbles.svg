<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Origin glow point -->
  <circle cx="100" cy="130" r="8" fill="#1A6B5A" opacity="0.3"/>
  <circle cx="100" cy="130" r="4" fill="#1A6B5A" opacity="0.6"/>

  <!-- Category bubble: Dining (#F97316) - left, mid height -->
  <g transform="translate(38, 88)">
    <circle r="22" fill="#F97316"/>
    <!-- Fork icon hint: simple lines -->
    <line x1="-5" y1="-8" x2="-5" y2="8" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="-8" x2="5" y2="8" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="-1" x2="5" y2="-1" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Category bubble: Transport (#3B82F6) - right, mid height -->
  <g transform="translate(162, 92)">
    <circle r="20" fill="#3B82F6"/>
    <!-- Car icon hint: simple rect + wheels -->
    <rect x="-8" y="-4" width="16" height="8" rx="2" fill="white" opacity="0.9"/>
    <circle cx="-4" cy="5" r="2.5" fill="white"/>
    <circle cx="4" cy="5" r="2.5" fill="white"/>
  </g>

  <!-- Category bubble: Shopping (#8B5CF6) - center-left, higher -->
  <g transform="translate(62, 52)">
    <circle r="19" fill="#8B5CF6"/>
    <!-- Bag icon hint -->
    <rect x="-7" y="-3" width="14" height="10" rx="2" fill="white" opacity="0.9"/>
    <path d="M -4,-3 Q -4,-8 0,-8 Q 4,-8 4,-3" fill="none" stroke="white" stroke-width="2"/>
  </g>

  <!-- Category bubble: Housing (#06B6D4) - center-right, higher -->
  <g transform="translate(138, 48)">
    <circle r="21" fill="#06B6D4"/>
    <!-- House icon hint -->
    <polygon points="0,-9 9,0 7,0 7,8 -7,8 -7,0 -9,0" fill="white" opacity="0.9"/>
  </g>

  <!-- Category bubble: Fun (#EC4899) - center, highest -->
  <g transform="translate(80, 22)">
    <circle r="17" fill="#EC4899"/>
    <!-- Star icon hint -->
    <polygon points="0,-7 1.7,-2.5 6.6,-2.5 2.6,0.9 4.1,6.1 0,3 -4.1,6.1 -2.6,0.9 -6.6,-2.5 -1.7,-2.5"
      fill="white" opacity="0.9"/>
  </g>

  <!-- Category bubble: Health (#22C55E) - right, highest -->
  <g transform="translate(130, 18)">
    <circle r="15" fill="#22C55E"/>
    <!-- Cross/plus icon hint -->
    <rect x="-2" y="-7" width="4" height="14" rx="1" fill="white"/>
    <rect x="-7" y="-2" width="14" height="4" rx="1" fill="white"/>
  </g>
</svg>
