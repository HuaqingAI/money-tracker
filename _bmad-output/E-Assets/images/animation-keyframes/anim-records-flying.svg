<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Central checkmark circle (destination) -->
  <circle cx="60" cy="60" r="22" fill="#1A6B5A"/>
  <polyline points="49,61 57,69 72,51" fill="none" stroke="white"
    stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 1: upper-left, tilted, approaching center -->
  <g transform="translate(20, 22) rotate(-25)">
    <rect x="0" y="0" width="30" height="22" rx="3" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
    <!-- Card content lines hint -->
    <rect x="5" y="6" width="14" height="2.5" rx="1" fill="#E5E7EB"/>
    <rect x="5" y="12" width="10" height="2" rx="1" fill="#E5E7EB"/>
  </g>

  <!-- Card 2: upper-right, tilted, approaching center -->
  <g transform="translate(78, 16) rotate(20)">
    <rect x="0" y="0" width="28" height="20" rx="3" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
    <rect x="4" y="5" width="12" height="2.5" rx="1" fill="#E5E7EB"/>
    <rect x="4" y="11" width="8" height="2" rx="1" fill="#E5E7EB"/>
  </g>

  <!-- Card 3: lower-left, tilted, approaching center -->
  <g transform="translate(12, 76) rotate(15)">
    <rect x="0" y="0" width="26" height="19" rx="3" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
    <rect x="4" y="5" width="11" height="2" rx="1" fill="#E5E7EB"/>
    <rect x="4" y="10" width="8" height="2" rx="1" fill="#E5E7EB"/>
  </g>

  <!-- Card 4: lower-right, tilted, approaching center -->
  <g transform="translate(82, 82) rotate(-18)">
    <rect x="0" y="0" width="27" height="20" rx="3" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
    <rect x="4" y="5" width="13" height="2.5" rx="1" fill="#E5E7EB"/>
    <rect x="4" y="11" width="9" height="2" rx="1" fill="#E5E7EB"/>
  </g>

  <!-- Motion trail dots from each card toward center -->
  <g fill="#A8DDD6" opacity="0.5">
    <!-- From card 1 -->
    <circle cx="42" cy="40" r="2"/>
    <circle cx="49" cy="48" r="1.5"/>
    <!-- From card 2 -->
    <circle cx="80" cy="38" r="2"/>
    <circle cx="73" cy="46" r="1.5"/>
    <!-- From card 3 -->
    <circle cx="38" cy="80" r="2"/>
    <circle cx="46" cy="73" r="1.5"/>
    <!-- From card 4 -->
    <circle cx="82" cy="80" r="2"/>
    <circle cx="75" cy="74" r="1.5"/>
  </g>
</svg>
