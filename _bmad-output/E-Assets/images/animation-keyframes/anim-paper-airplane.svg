<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Dotted trail behind the airplane (left/lower-left area) -->
  <g fill="#A8DDD6">
    <circle cx="14" cy="52" r="2.5"/>
    <circle cx="22" cy="50" r="2" opacity="0.8"/>
    <circle cx="30" cy="47" r="1.8" opacity="0.6"/>
    <circle cx="37" cy="44" r="1.5" opacity="0.4"/>
    <circle cx="43" cy="41" r="1.2" opacity="0.25"/>
  </g>

  <!-- Paper airplane body (pointing upper-right) -->
  <!-- Main airplane shape translated to center-right, tilted ~-20deg -->
  <g transform="translate(48, 36) rotate(-20)">
    <!-- Main body triangle -->
    <polygon points="20,0 -12,10 -8,0 -12,-10"
      fill="#1A6B5A"/>
    <!-- Fold line / wing crease -->
    <polygon points="20,0 -8,0 -12,10"
      fill="#0D4437"/>
    <!-- Tail fin hint -->
    <polygon points="-8,0 -12,-10 -6,-2"
      fill="#1A6B5A" opacity="0.7"/>
  </g>
</svg>
