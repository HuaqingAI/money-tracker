<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Confetti pieces scattered around -->

  <!-- Orange rectangles -->
  <rect x="6" y="14" width="8" height="4" rx="1" fill="#F97316" transform="rotate(-30 10 16)"/>
  <rect x="62" y="8" width="6" height="3" rx="1" fill="#F97316" transform="rotate(20 65 9)"/>

  <!-- Blue circles -->
  <circle cx="12" cy="52" r="3.5" fill="#3B82F6"/>
  <circle cx="71" cy="34" r="3" fill="#3B82F6"/>

  <!-- Purple rectangles -->
  <rect x="58" y="56" width="7" height="3.5" rx="1" fill="#8B5CF6" transform="rotate(40 61 57)"/>
  <rect x="14" y="24" width="5" height="2.5" rx="1" fill="#8B5CF6" transform="rotate(-15 16 25)"/>

  <!-- Pink triangles (approximated as rotated rects) -->
  <polygon points="70,52 74,60 66,60" fill="#EC4899"/>
  <polygon points="8,38 12,30 16,38" fill="#EC4899"/>

  <!-- Yellow circles -->
  <circle cx="26" cy="10" r="3" fill="#F59E0B"/>
  <circle cx="57" cy="70" r="3.5" fill="#F59E0B"/>

  <!-- Orange circle -->
  <circle cx="72" cy="22" r="2.5" fill="#F97316"/>

  <!-- Blue rectangle -->
  <rect x="10" y="64" width="7" height="3" rx="1" fill="#3B82F6" transform="rotate(25 13 65)"/>

  <!-- Purple circle -->
  <circle cx="33" cy="6" r="2.5" fill="#8B5CF6"/>

  <!-- Pink rectangle -->
  <rect x="44" y="6" width="6" height="2.5" rx="1" fill="#EC4899" transform="rotate(-10 47 7)"/>

  <!-- Yellow small rect -->
  <rect x="64" y="43" width="5" height="2.5" rx="1" fill="#F59E0B" transform="rotate(50 66 44)"/>

  <!-- Center: filled circle with checkmark -->
  <circle cx="40" cy="42" r="22" fill="#1A6B5A"/>
  <polyline points="28,43 37,52 53,33" fill="none" stroke="white"
    stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
