  <rect x="173" y="299" width="53" height="49" rx="0" fill="#E6F4FF" stroke="#EF4444" stroke-width="1.5"/>
  <circle cx="200" cy="316" r="10" fill="#1677FF" opacity="0.15"/>
  <text x="200" y="320" text-anchor="middle" fill="#1677FF" font-size="9">&#25105;</text>
  <text x="200" y="336" text-anchor="middle" fill="#1677FF" font-size="6" font-weight="600">&#25105;&#30340;</text>

