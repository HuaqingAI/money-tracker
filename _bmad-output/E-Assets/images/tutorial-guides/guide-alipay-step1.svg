  <text x="45" y="157" text-anchor="middle" fill="#52C41A" font-size="9">&#22269;</text>
  <text x="45" y="170" text-anchor="middle" fill="#555" font-size="6">&#22269;&#23545;&#22269;</text>

  <rect x="73" y="134" width="40" height="44" rx="8" fill="white"/>
  <rect x="80" y="140" width="26" height="26" rx="6" fill="#FF7A00" opacity="0.15"/>
  <text x="93" y="157" text-anchor="middle" fill="#FF7A00" font-size="9">&#20940;</text>
  <text x="93" y="170" text-anchor="middle" fill="#555" font-size="6">&#20940;&#27454;</text>

