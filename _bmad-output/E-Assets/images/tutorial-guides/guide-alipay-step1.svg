  <circle cx="218" cy="308" r="11" fill="#1A6B5A" stroke="white" stroke-width="2"/>
  <text x="218" y="312" text-anchor="middle" fill="white" font-size="9" font-weight="700">1</text>

  <!-- Annotation arrow pointing down to the Me tab -->
  <path d="M200 282 L200 294" fill="none" stroke="#1A6B5A" stroke-width="2"/>
  <polygon points="200,299 196,291 204,291" fill="#1A6B5A"/>

  <!-- Annotation label -->
  <rect x="158" y="268" width="56" height="14" rx="4" fill="#1A6B5A"/>
  <text x="186" y="278" text-anchor="middle" fill="white" font-size="6.5">&#28857;&#20987;&#25105;&#30340;</text>
