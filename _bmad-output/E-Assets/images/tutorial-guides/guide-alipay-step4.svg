<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 360" width="240" height="360">
  <defs>
    <style>
      text { font-family: Inter,-apple-system,sans-serif; }
    </style>
  </defs>

  <!-- Phone frame -->
  <rect x="10" y="8" width="220" height="344" rx="20" ry="20" fill="#F5F5F5" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Screen area -->
  <rect x="14" y="12" width="212" height="336" rx="17" ry="17" fill="#FFFFFF"/>

  <!-- Status bar -->
  <rect x="14" y="12" width="212" height="18" rx="17" ry="0" fill="#1677FF"/>
  <rect x="14" y="12" width="212" height="4" rx="17" ry="17" fill="#1677FF"/>
  <text x="120" y="24" text-anchor="middle" fill="white" font-size="7" font-weight="600">9:41</text>

  <!-- Bills page behind (dimmed) -->
  <rect x="14" y="30" width="212" height="38" fill="#1677FF" opacity="0.5"/>
  <text x="120" y="54" text-anchor="middle" fill="white" font-size="12" font-weight="700" opacity="0.7">&#36134;&#21333;</text>

  <!-- Background bill list items (dimmed) -->
  <rect x="14" y="68" width="212" height="260" fill="#F5F7FA" opacity="0.6"/>
  <rect x="24" y="82" width="140" height="8" rx="4" fill="#DDDDDD"/>
  <rect x="24" y="96" width="100" height="6" rx="3" fill="#EEEEEE"/>
  <rect x="24" y="114" width="120" height="8" rx="4" fill="#DDDDDD"/>
  <rect x="24" y="128" width="90" height="6" rx="3" fill="#EEEEEE"/>

  <!-- Dim overlay -->
  <rect x="14" y="12" width="212" height="316" rx="17" ry="17" fill="#000000" opacity="0.45"/>

  <!-- Bottom sheet / action sheet -->
  <rect x="14" y="188" width="212" height="160" rx="0" fill="white"/>
  <rect x="14" y="188" width="212" height="16" rx="0" fill="white"/>
  <!-- Handle bar -->
  <rect x="97" y="194" width="46" height="4" rx="2" fill="#DDDDDD"/>

  <!-- Sheet header -->
  <text x="120" y="218" text-anchor="middle" fill="#888" font-size="8">&#36134;&#21333;&#23548;&#20986;</text>
  <rect x="14" y="224" width="212" height="1" fill="#EEEEEE"/>

  <!-- Option 1: Download bills - HIGHLIGHTED (Step 4) -->
  <rect x="14" y="225" width="212" height="48" fill="#E6F4FF" stroke="#EF4444" stroke-width="1.5"/>
  <!-- File/CSV icon -->
  <rect x="32" y="234" width="22" height="28" rx="3" fill="#1677FF" opacity="0.15"/>
  <!-- Fold corner -->
  <polygon points="46,234 54,234 54,242" fill="#1677FF" opacity="0.25"/>
  <rect x="46" y="242" width="8" height="20" rx="0" fill="none"/>
  <!-- File lines -->
  <line x1="36" y1="243" x2="50" y2="243" stroke="#1677FF" stroke-width="1.2"/>
  <line x1="36" y1="248" x2="50" y2="248" stroke="#1677FF" stroke-width="1.2"/>
  <line x1="36" y1="253" x2="44" y2="253" stroke="#1677FF" stroke-width="1.2"/>
  <!-- CSV label on file -->
  <text x="43" y="258" text-anchor="middle" fill="#1677FF" font-size="5" font-weight="700">CSV</text>

  <text x="64" y="244" fill="#333" font-size="9" font-weight="700">&#19979;&#36733;&#36134;&#21333;</text>
  <text x="64" y="256" fill="#888" font-size="7">&#23548;&#20986;CSV&#26684;&#24335;&#25968;&#25454;</text>
  <text x="64" y="266" fill="#1677FF" font-size="6">&#36866;&#29992;&#20110;&#20102;&#28982;&#23548;&#20837;</text>
  <!-- Arrow indicator -->
  <text x="213" y="251" text-anchor="end" fill="#1677FF" font-size="14">&#8250;</text>

  <!-- Option 2: Email bills -->
  <rect x="14" y="274" width="212" height="40" fill="white"/>
  <rect x="14" y="274" width="212" height="1" fill="#EEEEEE"/>
  <!-- Email icon simplified -->
  <rect x="32" y="283" width="22" height="16" rx="2" fill="#AAAAAA" opacity="0.2"/>
  <polyline points="32,283 43,292 54,283" fill="none" stroke="#AAAAAA" stroke-width="1.2"/>
  <text x="64" y="295" fill="#888" font-size="9">&#21457;&#36865;&#37038;&#20214;</text>
  <text x="213" y="295" text-anchor="end" fill="#AAAAAA" font-size="14">&#8250;</text>
  <rect x="14" y="314" width="212" height="1" fill="#EEEEEE"/>

  <!-- Cancel button -->
  <rect x="14" y="315" width="212" height="33" rx="0" fill="white"/>
  <text x="120" y="335" text-anchor="middle" fill="#888" font-size="9">&#21462;&#28040;</text>

  <!-- Step 4 annotation circle -->
  <circle cx="218" cy="249" r="11" fill="#1A6B5A" stroke="white" stroke-width="2"/>
  <text x="218" y="253" text-anchor="middle" fill="white" font-size="9" font-weight="700">4</text>

  <!-- Arrow pointing left to download option -->
  <path d="M206 249 L200 249" fill="none" stroke="#1A6B5A" stroke-width="2"/>
  <polygon points="196,249 204,245 204,253" fill="#1A6B5A"/>

  <!-- Annotation callout label -->
  <rect x="62" y="160" width="116" height="20" rx="6" fill="#1A6B5A"/>
  <!-- Callout arrow pointing down -->
  <polygon points="120,180 115,188 125,188" fill="#1A6B5A"/>
  <text x="120" y="174" text-anchor="middle" fill="white" font-size="7">&#36873;&#25321;&#8220;&#19979;&#36733;&#36134;&#21333;&#8221;</text>
</svg>
