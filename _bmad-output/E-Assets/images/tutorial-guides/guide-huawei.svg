<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 400" width="240" height="400">
  <defs>
    <style>
      text { font-family: Inter,-apple-system,sans-serif; }
    </style>
  </defs>

  <!-- Phone frame -->
  <rect x="10" y="10" width="220" height="380" rx="20" ry="20" fill="#F5F5F5" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Screen area -->
  <rect x="14" y="14" width="212" height="372" rx="17" ry="17" fill="#FFFFFF"/>

  <!-- Status bar -->
  <rect x="14" y="14" width="212" height="18" rx="17" ry="0" fill="#C7000B"/>
  <rect x="14" y="14" width="212" height="4" rx="17" ry="17" fill="#C7000B"/>
  <text x="120" y="26" text-anchor="middle" fill="white" font-size="7" font-weight="600">9:41</text>

  <!-- Huawei EMUI Settings Header -->
  <rect x="14" y="32" width="212" height="36" fill="#C7000B"/>
  <text x="120" y="55" text-anchor="middle" fill="white" font-size="13" font-weight="700">&#35774;&#32622;</text>

  <!-- Breadcrumb path indicator -->
  <rect x="14" y="68" width="212" height="20" fill="#F8E8E8"/>
  <text x="24" y="81" fill="#C7000B" font-size="7">&#35774;&#32622; &gt; &#24212;&#29992; &gt; &#20102;&#28982; &gt; &#36890;&#30693;</text>

  <!-- Search bar -->
  <rect x="24" y="94" width="192" height="20" rx="10" fill="#F0F0F0"/>
  <circle cx="37" cy="104" r="4" fill="none" stroke="#AAAAAA" stroke-width="1.5"/>
  <line x1="40" y1="107" x2="43" y2="110" stroke="#AAAAAA" stroke-width="1.5"/>
  <text x="50" y="108" fill="#AAAAAA" font-size="7">&#25628;&#32034;</text>

  <!-- Section header: Apps -->
  <rect x="14" y="119" width="212" height="24" fill="#F5F5F5"/>
  <text x="24" y="134" fill="#888888" font-size="7" font-weight="600">&#24212;&#29992;&#31243;&#24207;</text>

  <!-- Settings list items -->
  <!-- Item 1: All Apps -->
  <rect x="14" y="143" width="212" height="36" fill="white"/>
  <rect x="24" y="155" width="16" height="16" rx="4" fill="#FF9800" opacity="0.2"/>
  <text x="32" y="166" text-anchor="middle" fill="#FF9800" font-size="8">A</text>
  <text x="48" y="166" fill="#333333" font-size="9">&#25152;&#26377;&#24212;&#29992;</text>
  <text x="208" y="166" text-anchor="end" fill="#AAAAAA" font-size="10">&#8250;</text>
  <rect x="14" y="179" width="212" height="1" fill="#F5F5F5"/>

  <!-- Item 2: LiaoRan app - HIGHLIGHTED (Step 1: find app) -->
  <rect x="14" y="180" width="212" height="40" fill="#FFF0F0" stroke="#EF4444" stroke-width="1.5"/>
  <circle cx="32" cy="200" r="11" fill="#1A6B5A"/>
  <text x="32" y="204" text-anchor="middle" fill="white" font-size="8" font-weight="700">&#20102;</text>
  <text x="50" y="197" fill="#333333" font-size="9" font-weight="600">&#20102;&#28982;</text>
  <text x="50" y="208" fill="#888888" font-size="7">&#36335;&#36884;&#36134;&#31295; v2.1</text>
  <text x="208" y="202" text-anchor="end" fill="#AAAAAA" font-size="10">&#8250;</text>

  <!-- Step 2: Notifications section header -->
  <rect x="14" y="225" width="212" height="24" fill="#F5F5F5"/>
  <text x="24" y="240" fill="#888888" font-size="7" font-weight="600">&#36890;&#30693;&#35774;&#32622;</text>

  <!-- Notification permission row - HIGHLIGHTED (Step 2) -->
  <rect x="14" y="249" width="212" height="40" fill="#FFF0F0" stroke="#EF4444" stroke-width="1.5"/>
  <text x="24" y="265" fill="#333333" font-size="9" font-weight="600">&#20801;&#35768;&#36890;&#30693;</text>
  <text x="24" y="277" fill="#888888" font-size="7">&#25509;&#25910;&#24212;&#29992;&#36890;&#30693;&#25552;&#37266;</text>
  <!-- Toggle switch ON -->
  <rect x="174" y="259" width="28" height="15" rx="7.5" fill="#1A6B5A"/>
  <circle cx="195" cy="266.5" r="5.5" fill="white"/>

  <!-- Step 3: notification types -->
  <rect x="14" y="294" width="212" height="30" fill="white"/>
  <text x="24" y="308" fill="#333333" font-size="8">&#36890;&#30693;&#26174;&#31034;&#26041;&#24335;</text>
  <text x="208" y="308" text-anchor="end" fill="#888888" font-size="7">&#38024;&#23545;&#24615;</text>
  <rect x="14" y="324" width="212" height="30" fill="white"/>
  <text x="24" y="338" fill="#333333" font-size="8">&#38382;&#25324;&#36890;&#30693;</text>
  <!-- Toggle OFF -->
  <rect x="174" y="330" width="28" height="15" rx="7.5" fill="#DDDDDD"/>
  <circle cx="180" cy="337.5" r="5.5" fill="white"/>
  <rect x="14" y="354" width="212" height="1" fill="#EEEEEE"/>

  <!-- Step 1 annotation circle -->
  <circle cx="218" cy="200" r="11" fill="#1A6B5A" stroke="white" stroke-width="2"/>
  <text x="218" y="204" text-anchor="middle" fill="white" font-size="9" font-weight="700">1</text>

  <!-- Arrow -->
  <path d="M218 212 L218 244" fill="none" stroke="#1A6B5A" stroke-width="2" stroke-dasharray="3,2"/>
  <polygon points="218,249 214,241 222,241" fill="#1A6B5A"/>

  <!-- Step 2 annotation circle -->
  <circle cx="218" cy="269" r="11" fill="#1A6B5A" stroke="white" stroke-width="2"/>
  <text x="218" y="273" text-anchor="middle" fill="white" font-size="9" font-weight="700">2</text>

  <!-- Brand label -->
  <rect x="14" y="358" width="212" height="28" fill="#FFF0F0"/>
  <text x="120" y="376" text-anchor="middle" fill="#C7000B" font-size="7">Huawei EMUI &#8226; &#24212;&#29992;&#36890;&#30693;&#35774;&#32622;</text>
</svg>
