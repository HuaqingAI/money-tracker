<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 360" width="240" height="360">
  <defs>
    <style>
      text { font-family: Inter,-apple-system,sans-serif; }
    </style>
  </defs>

  <!-- Phone frame -->
  <rect x="10" y="8" width="220" height="344" rx="20" ry="20" fill="#F5F5F5" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Screen area -->
  <rect x="14" y="12" width="212" height="336" rx="17" ry="17" fill="#FFFFFF"/>

  <!-- Status bar -->
  <rect x="14" y="12" width="212" height="18" rx="17" ry="0" fill="#1677FF"/>
  <rect x="14" y="12" width="212" height="4" rx="17" ry="17" fill="#1677FF"/>
  <text x="120" y="24" text-anchor="middle" fill="white" font-size="7" font-weight="600">9:41</text>

  <!-- Alipay "Me" page header -->
  <rect x="14" y="30" width="212" height="56" fill="#1677FF"/>
  <!-- User avatar -->
  <circle cx="42" cy="55" r="16" fill="white" opacity="0.25"/>
  <circle cx="42" cy="55" r="11" fill="white" opacity="0.4"/>
  <text x="42" y="59" text-anchor="middle" fill="white" font-size="9" font-weight="700">A</text>
  <!-- User info -->
  <text x="65" y="50" fill="white" font-size="9" font-weight="700">Alipay &#29992;&#25143;</text>
  <text x="65" y="63" fill="white" font-size="7" opacity="0.8">&#25490;&#21517; &#8226; &#32993;&#20415;&#34920;</text>
  <!-- Settings icon top right -->
  <circle cx="210" cy="42" r="10" fill="white" opacity="0.15"/>
  <text x="210" y="46" text-anchor="middle" fill="white" font-size="10">&#9881;</text>

  <!-- Stats row -->
  <rect x="14" y="86" width="212" height="44" fill="white"/>
  <rect x="14" y="86" width="212" height="1" fill="#EEEEEE"/>
  <text x="66" y="101" text-anchor="middle" fill="#333" font-size="11" font-weight="700">&#165;12,840</text>
  <text x="66" y="114" text-anchor="middle" fill="#888" font-size="6">&#20381;&#39069;</text>
  <rect x="107" y="92" width="1" height="26" fill="#EEEEEE"/>
  <text x="147" y="101" text-anchor="middle" fill="#333" font-size="11" font-weight="700">2</text>
  <text x="147" y="114" text-anchor="middle" fill="#888" font-size="6">&#21367;&#20986;</text>
  <rect x="185" y="92" width="1" height="26" fill="#EEEEEE"/>
  <text x="200" y="101" text-anchor="middle" fill="#333" font-size="11" font-weight="700">8</text>
  <text x="200" y="114" text-anchor="middle" fill="#888" font-size="6">&#20449;&#29992;&#20998;</text>
  <rect x="14" y="130" width="212" height="1" fill="#EEEEEE"/>

  <!-- Section: Financial services -->
  <rect x="14" y="131" width="212" height="22" fill="#F5F7FA"/>
  <text x="24" y="145" fill="#888888" font-size="7" font-weight="600">&#37329;&#34701;&#26381;&#21153;</text>

  <!-- Service list items -->
  <!-- Yue'ebao -->
  <rect x="14" y="153" width="212" height="32" fill="white"/>
  <rect x="24" y="161" width="16" height="16" rx="4" fill="#FF7A00" opacity="0.2"/>
  <text x="32" y="172" text-anchor="middle" fill="#FF7A00" font-size="8">&#20余;</text>
  <text x="46" y="172" fill="#333333" font-size="8">&#20余;&#39069;&#23453;</text>
  <text x="208" y="172" text-anchor="end" fill="#AAAAAA" font-size="10">&#8250;</text>
  <rect x="14" y="185" width="212" height="1" fill="#F5F5F5"/>

  <!-- Bills row - HIGHLIGHTED (Step 2) -->
  <rect x="14" y="186" width="212" height="36" fill="#E6F4FF" stroke="#EF4444" stroke-width="1.5"/>
  <rect x="24" y="196" width="18" height="18" rx="4" fill="#1677FF" opacity="0.2"/>
  <!-- Bill icon: simplified document lines -->
  <line x1="28" y1="201" x2="38" y2="201" stroke="#1677FF" stroke-width="1.5"/>
  <line x1="28" y1="205" x2="38" y2="205" stroke="#1677FF" stroke-width="1.5"/>
  <line x1="28" y1="209" x2="34" y2="209" stroke="#1677FF" stroke-width="1.5"/>
  <text x="49" y="207" fill="#333333" font-size="9" font-weight="700">&#36134;&#21333;</text>
  <text x="208" y="207" text-anchor="end" fill="#AAAAAA" font-size="10">&#8250;</text>

  <!-- Credit card -->
  <rect x="14" y="223" width="212" height="32" fill="white"/>
  <rect x="24" y="231" width="16" height="16" rx="4" fill="#722ED1" opacity="0.2"/>
  <text x="32" y="242" text-anchor="middle" fill="#722ED1" font-size="8">&#21345;</text>
  <text x="46" y="242" fill="#333333" font-size="8">&#20449;&#29992;&#21345;</text>
  <text x="208" y="242" text-anchor="end" fill="#AAAAAA" font-size="10">&#8250;</text>
  <rect x="14" y="255" width="212" height="1" fill="#F5F5F5"/>

  <!-- Huabei -->
  <rect x="14" y="256" width="212" height="32" fill="white"/>
  <rect x="24" y="264" width="16" height="16" rx="4" fill="#EB2F96" opacity="0.2"/>
  <text x="32" y="275" text-anchor="middle" fill="#EB2F96" font-size="8">&#33457;</text>
  <text x="46" y="275" fill="#333333" font-size="8">&#33457;&#20914;</text>
  <text x="208" y="275" text-anchor="end" fill="#AAAAAA" font-size="10">&#8250;</text>
  <rect x="14" y="288" width="212" height="1" fill="#F5F5F5"/>

  <!-- Bottom padding -->
  <rect x="14" y="289" width="212" height="59" fill="#F5F7FA"/>

  <!-- Step 2 annotation circle -->
  <circle cx="218" cy="204" r="11" fill="#1A6B5A" stroke="white" stroke-width="2"/>
  <text x="218" y="208" text-anchor="middle" fill="white" font-size="9" font-weight="700">2</text>

  <!-- Annotation arrow pointing left to bills row -->
  <path d="M206 204 L200 204" fill="none" stroke="#1A6B5A" stroke-width="2"/>
  <polygon points="196,204 204,200 204,208" fill="#1A6B5A"/>

  <!-- Annotation label tag -->
  <rect x="56" y="296" width="68" height="15" rx="4" fill="#1A6B5A"/>
  <text x="90" y="307" text-anchor="middle" fill="white" font-size="6.5">&#28857;&#20987;&#8220;&#36134;&#21333;&#8221;</text>
</svg>
