<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280">
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#E8F4F0"/>
    </linearGradient>
    <linearGradient id="butler03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A6B5A"/>
      <stop offset="100%" stop-color="#0D4437"/>
    </linearGradient>
    <linearGradient id="aibubble03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A6B5A"/>
      <stop offset="100%" stop-color="#145C4C"/>
    </linearGradient>
    <filter id="fshadow03" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1A6B5A" flood-opacity="0.18"/>
    </filter>
    <filter id="fcard03" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1A6B5A" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="360" height="280" fill="url(#bg03)" rx="20"/>
  <circle cx="50" cy="80" r="55" fill="#1A6B5A" opacity="0.04"/>
  <circle cx="320" cy="60" r="45" fill="#8B5CF6" opacity="0.04"/>
  <circle cx="290" cy="250" r="60" fill="#1A6B5A" opacity="0.03"/>

  <!-- ── AI Butler avatar ── -->
  <g filter="url(#fshadow03)">
    <!-- Outer glow -->
    <circle cx="88" cy="144" r="50" fill="#1A6B5A" opacity="0.07"/>
    <!-- Body -->
    <circle cx="88" cy="144" r="42" fill="url(#butler03)"/>

    <!-- Eye whites -->
    <ellipse cx="77" cy="138" rx="8.5" ry="7.5" fill="white" opacity="0.95"/>
    <ellipse cx="99" cy="138" rx="8.5" ry="7.5" fill="white" opacity="0.95"/>
    <!-- Pupils -->
    <circle cx="78.5" cy="139" r="4.5" fill="#0D4437"/>
    <circle cx="100.5" cy="139" r="4.5" fill="#0D4437"/>
    <!-- Iris -->
    <circle cx="78.5" cy="139" r="2" fill="#1A6B5A"/>
    <circle cx="100.5" cy="139" r="2" fill="#1A6B5A"/>
    <!-- Eye shine -->
    <circle cx="80" cy="137.5" r="1.6" fill="white"/>
    <circle cx="102" cy="137.5" r="1.6" fill="white"/>

    <!-- Brows -->
    <path d="M70 130 Q77 127 84 130" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>
    <path d="M92 130 Q99 127 106 130" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>

    <!-- Smile -->
    <path d="M76 152 Q88 162 100 152" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Cheek blush circles -->
    <circle cx="70" cy="152" r="4.5" fill="white" opacity="0.18"/>
    <circle cx="106" cy="152" r="4.5" fill="white" opacity="0.18"/>

    <!-- Antenna -->
    <line x1="88" y1="102" x2="88" y2="88" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="88" cy="85" r="5" fill="white"/>
    <circle cx="88" cy="85" r="2.5" fill="#1A6B5A"/>
    <circle cx="88" cy="85" r="1" fill="white" opacity="0.6"/>

    <!-- Ear panels -->
    <rect x="42" y="132" width="10" height="18" rx="5" fill="white" opacity="0.7"/>
    <rect x="124" y="132" width="10" height="18" rx="5" fill="white" opacity="0.7"/>

    <!-- Collar/bowtie -->
    <path d="M80 181 L88 186 L96 181 L88 178 Z" fill="white" opacity="0.35"/>
  </g>

  <!-- Butler name label -->
  <rect x="64" y="196" width="48" height="18" rx="9" fill="#1A6B5A"/>
  <text x="88" y="208.5" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="7.5" font-weight="700" fill="white">&#20102;&#28982;&#31649;&#23478;</text>

  <!-- ── User question bubble ── -->
  <g filter="url(#fcard03)">
    <rect x="155" y="24" width="186" height="46" rx="14" fill="white"/>
    <!-- Bubble tail -->
    <polygon points="155,42 145,47 155,53" fill="white"/>
    <!-- User avatar (SVG face, no emoji) -->
    <circle cx="173" cy="47" r="12" fill="#E5E7EB"/>
    <circle cx="173" cy="44" r="5" fill="#9CA3AF"/>
    <path d="M163 56 Q173 50 183 56" fill="#9CA3AF"/>
    <!-- Message -->
    <text x="190" y="40" font-family="Inter,-apple-system,sans-serif" font-size="8.5" font-weight="500" fill="#111827">&#25105;&#19978;&#20010;&#26376;&#39278;&#39278;</text>
    <text x="190" y="52" font-family="Inter,-apple-system,sans-serif" font-size="8.5" font-weight="500" fill="#111827">&#29615;&#20102;&#22810;&#23569;&#38065;&#65311;</text>
    <text x="325" y="62" font-family="Inter,-apple-system,sans-serif" font-size="6.5" fill="#9CA3AF">09:42</text>
  </g>

  <!-- ── AI reply bubble ── -->
  <g filter="url(#fcard03)">
    <rect x="143" y="84" width="198" height="106" rx="16" fill="url(#aibubble03)"/>
    <!-- Tail -->
    <polygon points="143,100 132,106 143,112" fill="#1A6B5A"/>

    <!-- Star badge in header -->
    <circle cx="162" cy="104" r="10" fill="white" opacity="0.18"/>
    <path d="M162 97.5 L163.5 101.8 L168 102.5 L163.5 104.2 L162 108.5 L160.5 104.2 L156 102.5 L160.5 101.8 Z" fill="white" opacity="0.9"/>
    <text x="177" y="101" font-family="Inter,-apple-system,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.75)">&#20102;&#28982;&#31649;&#23478;</text>
    <text x="177" y="113" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="800" fill="white">&#39278;&#39278; 1,243 &#20803;</text>

    <!-- Divider -->
    <line x1="150" y1="121" x2="331" y2="121" stroke="white" stroke-width="0.5" opacity="0.2"/>

    <!-- Mini bar chart (weeks) -->
    <text x="164" y="178" font-family="Inter,-apple-system,sans-serif" font-size="6" fill="rgba(255,255,255,0.5)">W1</text>
    <text x="188" y="178" font-family="Inter,-apple-system,sans-serif" font-size="6" fill="rgba(255,255,255,0.5)">W2</text>
    <text x="212" y="178" font-family="Inter,-apple-system,sans-serif" font-size="6" fill="rgba(255,255,255,0.5)">W3</text>
    <text x="236" y="178" font-family="Inter,-apple-system,sans-serif" font-size="6" fill="rgba(255,255,255,0.5)">W4</text>
    <rect x="162" y="150" width="18" height="24" rx="4" fill="white" opacity="0.38"/>
    <rect x="186" y="140" width="18" height="34" rx="4" fill="white" opacity="0.52"/>
    <rect x="210" y="131" width="18" height="43" rx="4" fill="white" opacity="0.72"/>
    <rect x="234" y="143" width="18" height="31" rx="4" fill="white" opacity="0.46"/>

    <!-- Side insight text -->
    <text x="265" y="141" font-family="Inter,-apple-system,sans-serif" font-size="7.5" font-weight="600" fill="white">W3 &#26368;&#22810;</text>
    <text x="265" y="152" font-family="Inter,-apple-system,sans-serif" font-size="7" fill="rgba(255,255,255,0.7)">&#22269;&#24509;&#26399;&#24433;&#21709;</text>
    <rect x="265" y="158" width="58" height="15" rx="7.5" fill="rgba(255,255,255,0.14)"/>
    <text x="294" y="168" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="7" font-weight="600" fill="white">+12% &#36739;&#19978;&#26376;</text>

    <text x="318" y="183" font-family="Inter,-apple-system,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.4)">09:42</text>
  </g>

  <!-- ── Suggestion card ── -->
  <g filter="url(#fcard03)">
    <rect x="143" y="202" width="198" height="46" rx="14" fill="white"/>
    <polygon points="143,215 132,219 143,225" fill="white"/>
    <!-- Lightbulb SVG (no emoji) -->
    <circle cx="163" cy="225" r="11" fill="#FFF7ED"/>
    <path d="M159 221 Q159 216 163 215 Q167 216 167 221 L166 224 L160 224 Z" fill="#F59E0B"/>
    <rect x="160.5" y="225" width="5" height="2" rx="1" fill="#F59E0B"/>
    <!-- Text -->
    <text x="179" y="219" font-family="Inter,-apple-system,sans-serif" font-size="8.5" font-weight="600" fill="#111827">&#20943;&#23569;&#22806;&#21806;&#65292;&#27599;&#26376;&#21487;&#30465; 340 &#20803;</text>
    <text x="179" y="231" font-family="Inter,-apple-system,sans-serif" font-size="7.5" fill="#6B7280">&#22522;&#20110;&#20320;&#30340;&#28040;&#36153;&#20064;&#24509;&#20998;&#26512;</text>
    <rect x="179" y="235" width="52" height="9" rx="4.5" fill="#EEF9F6"/>
    <text x="205" y="242" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="6.5" font-weight="600" fill="#1A6B5A">&#26597;&#30475;&#35814;&#24773;</text>
  </g>

  <!-- ── Bottom label ── -->
  <text x="88" y="258" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="8.5" font-weight="600" fill="#1A6B5A">&#38543;&#26102;&#38382;&#65292;&#22522;&#20110;&#30495;&#23454;&#25968;&#25454;&#20316;&#31572;</text>
  <text x="88" y="271" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="7.5" fill="#9CA3AF">&#27599;&#20010;&#25968;&#23383;&#37117;&#26377;&#36134;&#21333;&#26469;&#28304;</text>
</svg>
