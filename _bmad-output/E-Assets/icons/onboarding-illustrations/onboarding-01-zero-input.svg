<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF9F6"/>
      <stop offset="100%" style="stop-color:#D1F0E8"/>
    </linearGradient>
    <linearGradient id="phone-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A6B5A"/>
      <stop offset="100%" style="stop-color:#0F4A3E"/>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1A6B5A" flood-opacity="0.15"/>
    </filter>
    <filter id="float-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="240" fill="url(#bg1)" rx="16"/>

  <!-- Decorative circles -->
  <circle cx="280" cy="30" r="40" fill="#1A6B5A" opacity="0.06"/>
  <circle cx="40" cy="210" r="30" fill="#1A6B5A" opacity="0.06"/>

  <!-- Phone silhouette (center) -->
  <rect x="128" y="30" width="64" height="108" rx="10" fill="url(#phone-grad)" filter="url(#float-shadow)"/>
  <!-- Phone screen -->
  <rect x="132" y="38" width="56" height="86" rx="6" fill="white" opacity="0.95"/>
  <!-- Phone notch -->
  <rect x="148" y="34" width="24" height="5" rx="2.5" fill="#0F4A3E"/>
  <!-- Phone home indicator -->
  <rect x="148" y="132" width="24" height="3" rx="1.5" fill="white" opacity="0.5"/>

  <!-- App screen content on phone -->
  <!-- Amount displayed -->
  <text x="160" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#1A6B5A">¥3,482</text>
  <text x="160" y="82" text-anchor="middle" font-family="Inter, sans-serif" font-size="6" fill="#6B7280">本月支出</text>
  <!-- Mini bars -->
  <rect x="138" y="100" width="8" height="14" rx="2" fill="#1A6B5A" opacity="0.3"/>
  <rect x="149" y="94" width="8" height="20" rx="2" fill="#1A6B5A" opacity="0.5"/>
  <rect x="160" y="88" width="8" height="26" rx="2" fill="#1A6B5A" opacity="0.8"/>
  <rect x="171" y="97" width="8" height="17" rx="2" fill="#1A6B5A" opacity="0.4"/>
  <rect x="182" y="103" width="8" height="11" rx="2" fill="#1A6B5A" opacity="0.25"/>

  <!-- Floating notification cards (left) -->
  <g filter="url(#card-shadow)">
    <rect x="14" y="52" width="100" height="36" rx="8" fill="white"/>
    <circle cx="30" cy="70" r="10" fill="#F97316"/>
    <!-- Fork icon mini -->
    <line x1="27" y1="64" x2="27" y2="76" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="33" y1="64" x2="33" y2="76" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <text x="45" y="67" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#1F2937">外卖 · 美团</text>
    <text x="45" y="78" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1F2937">¥36.5</text>
    <!-- Auto tag -->
    <rect x="90" y="62" width="18" height="10" rx="3" fill="#EEF9F6"/>
    <text x="99" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="5.5" font-weight="600" fill="#1A6B5A">自动</text>
  </g>

  <!-- Floating notification cards (right) -->
  <g filter="url(#card-shadow)">
    <rect x="206" y="80" width="100" height="36" rx="8" fill="white"/>
    <circle cx="222" cy="98" r="10" fill="#3B82F6"/>
    <!-- Bus icon mini -->
    <rect x="216" y="94" width="12" height="8" rx="1.5" fill="none" stroke="white" stroke-width="1.2"/>
    <line x1="216" y1="97" x2="228" y2="97" stroke="white" stroke-width="1.2"/>
    <circle cx="219" cy="103" r="1.5" fill="none" stroke="white" stroke-width="1.2"/>
    <circle cx="225" cy="103" r="1.5" fill="none" stroke="white" stroke-width="1.2"/>
    <text x="237" y="95" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#1F2937">地铁 · 支付宝</text>
    <text x="237" y="106" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1F2937">¥5.0</text>
    <!-- Auto tag -->
    <rect x="282" y="90" width="18" height="10" rx="3" fill="#EEF9F6"/>
    <text x="291" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="5.5" font-weight="600" fill="#1A6B5A">自动</text>
  </g>

  <!-- Bottom card (center) -->
  <g filter="url(#card-shadow)">
    <rect x="60" y="158" width="200" height="52" rx="10" fill="white"/>
    <!-- Sparkle icon -->
    <circle cx="82" cy="184" r="14" fill="#EEF9F6"/>
    <path d="M82 174 L84 180 L90 182 L84 184 L82 190 L80 184 L74 182 L80 180 Z" fill="#1A6B5A"/>
    <text x="101" y="179" font-family="Inter, sans-serif" font-size="8.5" font-weight="600" fill="#1F2937">消费自动识别</text>
    <text x="101" y="192" font-family="Inter, sans-serif" font-size="7.5" fill="#6B7280">无需手动输入，打开即知道</text>
  </g>

  <!-- Connection lines (dashes) -->
  <line x1="114" y1="70" x2="128" y2="70" stroke="#1A6B5A" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="192" y1="98" x2="206" y2="98" stroke="#1A6B5A" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.4"/>
</svg>
