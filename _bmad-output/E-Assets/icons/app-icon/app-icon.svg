<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="appbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A6B5A"/>
      <stop offset="100%" stop-color="#0F4A3E"/>
    </linearGradient>
    <linearGradient id="symgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#A8DDD6"/>
    </linearGradient>
    <filter id="appshadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#appbg)"/>

  <!-- Subtle top highlight -->
  <ellipse cx="256" cy="90" rx="190" ry="60" fill="white" opacity="0.05"/>

  <!-- Main symbol group -->
  <g filter="url(#appshadow)">

    <!-- Outer arc: top curve of the "eye/lens" shape -->
    <path
      d="M 135 256
         C 135 185 190 130 256 130
         C 322 130 377 185 377 256
         C 377 280 371 303 360 323"
      fill="none"
      stroke="url(#symgrad)"
      stroke-width="26"
      stroke-linecap="round"
    />

    <!-- Lower sweep: the "了" tail -->
    <path
      d="M 360 323
         C 348 350 328 372 304 383
         C 278 395 248 392 225 378
         C 198 362 183 334 180 308"
      fill="none"
      stroke="url(#symgrad)"
      stroke-width="26"
      stroke-linecap="round"
    />

    <!-- Inner circle / pupil -->
    <circle cx="256" cy="245" r="34" fill="url(#symgrad)" opacity="0.95"/>
    <circle cx="256" cy="245" r="16" fill="#0F4A3E"/>
    <circle cx="248" cy="237" r="6" fill="white" opacity="0.5"/>

    <!-- Sparkle lines (clarity moment) -->
    <line x1="345" y1="155" x2="375" y2="125" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.65"/>
    <line x1="370" y1="175" x2="410" y2="165" stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.45"/>
    <line x1="342" y1="128" x2="352" y2="96" stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.45"/>

  </g>

  <!-- Three dots: version dots / brand mark at bottom -->
  <circle cx="226" cy="400" r="6" fill="white" opacity="0.3"/>
  <circle cx="256" cy="400" r="6" fill="white" opacity="0.3"/>
  <circle cx="286" cy="400" r="6" fill="white" opacity="0.3"/>
</svg>
