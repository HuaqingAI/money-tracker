<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>了然 - 人情账</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#FDF2F2', // 特殊温暖色调
                            100: '#FDE2E2',
                            500: '#1A6B5A',
                            600: '#155648',
                        },
                        neutral: {
                            50: '#F9FAFB',
                            100: '#F3F4F6',
                            200: '#E5E7EB',
                            400: '#9CA3AF',
                            500: '#6B7280',
                            800: '#1F2937',
                        },
                        success: '#22C55E'
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-neutral-50 font-sans text-neutral-800 antialiased min-h-screen pb-24">

    <!-- Header Bar -->
    <header class="p-6 flex items-center justify-between sticky top-0 bg-neutral-50/90 backdrop-blur-md z-40">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="p-1"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
            <h1 class="text-xl font-bold">人情账</h1>
        </div>
        <button onclick="openActionSheet()" class="w-10 h-10 bg-brand-500 text-white rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-all">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
    </header>

    <!-- Search Bar -->
    <section class="px-6 mb-6">
        <div class="bg-white border border-neutral-100 rounded-2xl px-4 h-12 flex items-center gap-3 shadow-sm">
            <svg class="text-neutral-400" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" placeholder="搜索联系人..." class="flex-grow bg-transparent outline-none font-medium text-sm">
        </div>
    </section>

    <main class="px-6 space-y-8">
        
        <!-- Section: Annual Summary Card -->
        <section class="bg-white rounded-3xl p-6 shadow-sm border border-neutral-100 space-y-6">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-1 text-sm font-bold text-neutral-400">
                    <span>2026年人情总览</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m6 9 6 6 6-6"/></svg>
                </div>
                <span class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest">往来 23 人</span>
            </div>
            
            <div class="grid grid-cols-3 gap-4">
                <div class="space-y-1">
                    <p class="text-[10px] text-neutral-400 font-bold uppercase">送出</p>
                    <p class="text-lg font-bold">¥8,600</p>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] text-neutral-400 font-bold uppercase">收到</p>
                    <p class="text-lg font-bold text-success">¥4,200</p>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] text-neutral-400 font-bold uppercase">净支出</p>
                    <p class="text-lg font-bold">¥4,400</p>
                </div>
            </div>
        </section>

        <!-- Section: Upcoming Events -->
        <section class="space-y-4">
            <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-widest">即将到来</h3>
            <div class="bg-white rounded-3xl border border-neutral-100 shadow-sm divide-y divide-neutral-50 overflow-hidden">
                <!-- Event 1 -->
                <div class="p-5 flex items-center justify-between group active:bg-neutral-50 transition-colors">
                    <div class="flex items-center gap-4">
                        <div class="text-3xl">🎊</div>
                        <div class="space-y-0.5">
                            <h4 class="font-bold text-sm">张三 · 婚礼</h4>
                            <p class="text-[10px] text-neutral-400 font-medium">下周六 4月18日</p>
                        </div>
                    </div>
                    <button onclick="window.location.href='04.2-gift-smart-suggestion.html'" class="text-xs font-bold text-brand-500 flex items-center gap-1 bg-brand-50 px-3 py-1.5 rounded-full">
                        待定 · 去看建议 <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
                    </button>
                </div>
                <!-- Event 2 -->
                <div class="p-5 flex items-center justify-between group active:bg-neutral-50 transition-colors">
                    <div class="flex items-center gap-4">
                        <div class="text-3xl">🎂</div>
                        <div class="space-y-0.5">
                            <h4 class="font-bold text-sm">表姐 · 生日</h4>
                            <p class="text-[10px] text-neutral-400 font-medium">5月3日</p>
                        </div>
                    </div>
                    <span class="text-xs font-bold text-neutral-400">¥500 · 已准备</span>
                </div>
            </div>
            <button class="text-xs font-bold text-brand-500 px-1">+ 添加即将到来的事件</button>
        </section>

        <!-- Section: Recent Contacts -->
        <section class="space-y-4">
            <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-widest">最近往来</h3>
            <div class="bg-white rounded-3xl border border-neutral-100 shadow-sm divide-y divide-neutral-50 overflow-hidden">
                <!-- Contact 1 -->
                <div class="p-5 flex items-center gap-4 active:bg-neutral-50 transition-colors">
                    <div class="w-12 h-12 bg-orange-100 text-brand-600 rounded-full flex items-center justify-center font-bold text-lg">张</div>
                    <div class="flex-grow space-y-1">
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-sm">张三</span>
                            <span class="px-1.5 py-0.5 bg-neutral-100 text-neutral-500 rounded text-[9px] font-bold">同事</span>
                        </div>
                        <p class="text-[10px] text-neutral-400 font-medium truncate max-w-[180px]">最近: 满月宴收 ¥600 (2025-08)</p>
                    </div>
                    <div class="text-right">
                        <span class="text-sm font-bold text-neutral-800">净 -¥600</span>
                    </div>
                </div>
                <!-- Contact 2 -->
                <div class="p-5 flex items-center gap-4 active:bg-neutral-50 transition-colors">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-lg">李</div>
                    <div class="flex-grow space-y-1">
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-sm">李四</span>
                            <span class="px-1.5 py-0.5 bg-neutral-100 text-neutral-500 rounded text-[9px] font-bold">表哥</span>
                        </div>
                        <p class="text-[10px] text-neutral-400 font-medium truncate max-w-[180px]">最近: 乔迁送 ¥800 (2026-01)</p>
                    </div>
                    <div class="text-right">
                        <span class="text-sm font-bold text-neutral-800">净 -¥200</span>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Bottom Tab Bar (Reuse from 01.7) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-neutral-100 px-6 pt-3 pb-8 flex justify-between items-center z-40">
        <div onclick="window.location.href='01.7-dashboard.html'" class="flex flex-col items-center gap-1 text-neutral-400">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span class="text-[10px] font-bold">首页</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-neutral-400">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>
            <span class="text-[10px] font-bold">消费</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-neutral-400">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
            <span class="text-[10px] font-bold">AI</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-brand-500">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="text-[10px] font-bold">我的</span>
        </div>
    </nav>

    <!-- Action Sheet Overlay -->
    <div id="actionSheet" class="hidden fixed inset-0 z-[100] flex flex-col justify-end bg-black/40 backdrop-blur-sm">
        <div class="absolute inset-0" onclick="closeActionSheet()"></div>
        <div class="relative bg-white w-full rounded-t-[2.5rem] p-8 flex flex-col space-y-4 shadow-2xl transition-transform">
            <div class="w-12 h-1.5 bg-neutral-100 rounded-full mx-auto mb-4"></div>
            <button class="w-full h-16 bg-neutral-50 rounded-2xl flex items-center px-6 gap-4 active:scale-95 transition-all">
                <span class="text-2xl">✏️</span>
                <span class="font-bold">记一笔</span>
            </button>
            <button onclick="window.location.href='04.1a-gift-book-import.html'" class="w-full h-16 bg-neutral-50 rounded-2xl flex items-center px-6 gap-4 active:scale-95 transition-all">
                <span class="text-2xl">📷</span>
                <span class="font-bold">拍照导入礼簿</span>
            </button>
            <button class="w-full h-16 bg-neutral-50 rounded-2xl flex items-center px-6 gap-4 opacity-40">
                <span class="text-2xl">📄</span>
                <span class="font-bold">从表格导入</span>
            </button>
            <button onclick="closeActionSheet()" class="w-full py-4 text-neutral-400 font-bold mt-4">取消</button>
        </div>
    </div>

    <script>
        function openActionSheet() {
            document.getElementById('actionSheet').classList.remove('hidden');
        }
        function closeActionSheet() {
            document.getElementById('actionSheet').classList.add('hidden');
        }
    </script>
</body>
</html>
