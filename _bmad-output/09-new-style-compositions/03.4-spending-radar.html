<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>了然 - 消费雷达</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#F0F9F6',
                            100: '#E1F2ED',
                            200: '#B2DFD4',
                            500: '#1A6B5A',
                            600: '#155648',
                        },
                        neutral: {
                            50: '#F9FAFB',
                            100: '#F3F4F6',
                            200: '#E5E7EB',
                            400: '#9CA3AF',
                            500: '#6B7280',
                            800: '#1F2937',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .radar-poly {
            animation: bloom 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform-origin: center;
        }
        @keyframes bloom {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .share-success {
            animation: slideInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideInUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-neutral-50 font-sans text-neutral-800 antialiased min-h-screen pb-32">

    <!-- Top Bar -->
    <header class="p-6 flex items-center justify-between sticky top-0 bg-neutral-50/90 backdrop-blur-md z-40">
        <button onclick="window.history.back()" class="p-1"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
        <h1 class="text-lg font-bold">消费雷达</h1>
        <button onclick="handleShare()" class="p-1 text-brand-500"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></button>
    </header>

    <!-- Month Switcher -->
    <div class="flex justify-center items-center gap-6 mb-4">
        <button class="text-neutral-400 p-2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m15 18-6-6 6-6"/></svg></button>
        <span class="text-lg font-bold">2026年3月</span>
        <button class="text-neutral-400 p-2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg></button>
    </div>

    <main class="px-6 space-y-8">
        
        <!-- Section: Radar Chart Hero -->
        <section class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-neutral-100 flex flex-col items-center space-y-6 overflow-hidden relative">
            <div class="absolute inset-0 bg-brand-50/30 opacity-50 blur-3xl rounded-full"></div>
            
            <div class="relative w-64 h-64 flex items-center justify-center">
                <!-- SVG Radar Chart -->
                <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-sm">
                    <!-- Web -->
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="2"/>
                    <circle cx="50" cy="50" r="30" fill="none" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="2"/>
                    <circle cx="50" cy="50" r="15" fill="none" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="2"/>
                    
                    <!-- Axes -->
                    <line x1="50" y1="5" x2="50" y2="95" stroke="#E5E7EB" stroke-width="0.5"/>
                    <line x1="10" y1="28" x2="90" y2="72" stroke="#E5E7EB" stroke-width="0.5"/>
                    <line x1="10" y1="72" x2="90" y2="28" stroke="#E5E7EB" stroke-width="0.5"/>

                    <!-- Data Polygon (Sample Data) -->
                    <!-- Points: 餐饮(85), 购物(40), 交通(30), 娱乐(50), 居住(90), 其他(20) -->
                    <polygon points="50,15 85,32 75,65 50,75 20,65 15,32" fill="#1A6B5A" fill-opacity="0.15" stroke="#1A6B5A" stroke-width="2" class="radar-poly"/>
                    
                    <!-- Point markers -->
                    <circle cx="50" cy="15" r="2" fill="#1A6B5A"/>
                    <circle cx="85" cy="32" r="2" fill="#1A6B5A"/>
                    <circle cx="75" cy="65" r="2" fill="#1A6B5A"/>
                    <circle cx="50" cy="75" r="2" fill="#1A6B5A"/>
                    <circle cx="20" cy="65" r="2" fill="#1A6B5A"/>
                    <circle cx="15" cy="32" r="2" fill="#1A6B5A"/>
                </svg>
                <!-- Axis Labels -->
                <span class="absolute top-0 text-[10px] font-bold">🍜 餐饮</span>
                <span class="absolute top-1/4 -right-4 text-[10px] font-bold">🛒 购物</span>
                <span class="absolute bottom-1/4 -right-4 text-[10px] font-bold">🚗 交通</span>
                <span class="absolute -bottom-4 text-[10px] font-bold">🏠 居住</span>
                <span class="absolute bottom-1/4 -left-4 text-[10px] font-bold">🎮 娱乐</span>
                <span class="absolute top-1/4 -left-4 text-[10px] font-bold">📦 其他</span>
            </div>

            <div class="pt-4 flex flex-col items-center gap-2">
                <p class="text-xs font-bold text-neutral-400 uppercase tracking-widest">你的消费标签</p>
                <div class="px-5 py-2 bg-brand-50 text-brand-600 rounded-full font-bold text-lg shadow-sm border border-brand-100">
                    「奶茶星人」
                </div>
            </div>
        </section>

        <!-- Section: Dimension Detail List -->
        <section class="space-y-4">
            <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-widest">分类详情</h3>
            <div class="space-y-3">
                <!-- Dining -->
                <div class="bg-white rounded-2xl p-5 border border-neutral-100 shadow-sm space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-sm">🍜 餐饮</span>
                        <span class="font-bold text-sm">¥3,200</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex-grow h-1.5 bg-neutral-100 rounded-full overflow-hidden">
                            <div class="h-full bg-orange-400 w-[78%]"></div>
                        </div>
                        <span class="text-xs font-bold text-neutral-400">78分</span>
                    </div>
                    <p class="text-[10px] text-neutral-400 font-medium">外卖占 68%，最爱瑞幸</p>
                </div>
                <!-- Housing -->
                <div class="bg-white rounded-2xl p-5 border border-neutral-100 shadow-sm space-y-4 opacity-70">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-sm">🏠 居住</span>
                        <span class="font-bold text-sm">¥6,500</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex-grow h-1.5 bg-neutral-100 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-500 w-[90%]"></div>
                        </div>
                        <span class="text-xs font-bold text-neutral-400">90分</span>
                    </div>
                    <p class="text-[10px] text-neutral-400 font-medium">固定支出为主</p>
                </div>
            </div>
        </section>

        <!-- Section: AI Fun Insights -->
        <section class="space-y-4">
            <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-widest">AI 发现</h3>
            <div class="grid grid-cols-1 gap-4">
                <!-- Insight 1 -->
                <div class="bg-orange-50/50 border border-orange-100 p-5 rounded-3xl flex gap-4">
                    <span class="text-3xl">☕</span>
                    <div class="space-y-1">
                        <h4 class="text-sm font-bold">你的奶茶消费</h4>
                        <p class="text-xs text-neutral-500 leading-relaxed">本月共 22 杯奶茶。如果排成一排，可以绕地球 0.3 圈（大概吧）。</p>
                    </div>
                </div>
                <!-- Insight 2 -->
                <div class="bg-blue-50/50 border border-blue-100 p-5 rounded-3xl flex gap-4">
                    <span class="text-3xl">🌙</span>
                    <div class="space-y-1">
                        <h4 class="text-sm font-bold">你的外卖消费</h4>
                        <p class="text-xs text-neutral-500 leading-relaxed">78% 的下单发生在晚上 8 点以后。你是典型的深夜觅食族。</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section: Share Card Preview Placeholder (Simulated) -->
        <footer class="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-xl border-t border-neutral-100 z-50">
            <button onclick="handleShare()" class="w-full h-14 bg-brand-500 text-white font-bold rounded-2xl shadow-lg shadow-brand-500/30 flex items-center justify-center gap-3 active:scale-[0.98] transition-all">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                分享给好友
            </button>
        </footer>

        <!-- Share Success Overlay -->
        <div id="shareSuccessOverlay" class="hidden fixed inset-0 z-[100] flex flex-col items-center justify-center p-8 bg-black/20 backdrop-blur-sm">
            <div class="bg-white rounded-[2.5rem] p-10 flex flex-col items-center text-center space-y-6 shadow-2xl share-success">
                <div class="w-20 h-20 bg-brand-100 text-brand-600 rounded-full flex items-center justify-center text-4xl">✈️</div>
                <div class="space-y-2">
                    <h3 class="text-2xl font-bold text-neutral-800">已发出，坐等评论</h3>
                    <p class="text-neutral-400 text-sm">下个月雷达图会有新变化</p>
                </div>
                <button onclick="this.closest('#shareSuccessOverlay').classList.add('hidden')" class="px-6 py-2 bg-neutral-100 rounded-full text-xs font-bold text-neutral-500 mt-4">知道了</button>
            </div>
        </div>

    </main>

    <script>
        function handleShare() {
            // Simulated share animation
            const overlay = document.getElementById('shareSuccessOverlay');
            overlay.classList.remove('hidden');
        }
    </script>
</body>
</html>
