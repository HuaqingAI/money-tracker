<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>了然 - 个人资料</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#F0F9F6',
                            500: '#1A6B5A',
                            600: '#155648',
                        },
                        neutral: {
                            50: '#F9FAFB',
                            100: '#F3F4F6',
                            200: '#E5E7EB',
                            400: '#9CA3AF',
                            500: '#6B7280',
                            800: '#1F2937',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .membership-gradient { background: linear-gradient(135deg, #F0F9F6 0%, #E1F2ED 100%); }
        .sheet-enter {
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-neutral-50 font-sans text-neutral-800 antialiased min-h-screen pb-32">

    <!-- Header -->
    <header class="p-6 flex items-center justify-between sticky top-0 bg-neutral-50/90 backdrop-blur-md z-40">
        <button onclick="window.history.back()" class="p-1"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
        <h1 class="text-lg font-bold">个人资料</h1>
        <div class="w-8"></div>
    </header>

    <main class="space-y-10">
        
        <!-- Avatar Area -->
        <section class="flex flex-col items-center py-8 space-y-4">
            <div class="relative group cursor-pointer">
                <div class="w-24 h-24 rounded-full bg-brand-100 flex items-center justify-center text-brand-600 font-bold text-3xl border-4 border-white shadow-md overflow-hidden">
                    <span>大</span>
                </div>
                <div class="absolute bottom-0 right-0 w-8 h-8 bg-white rounded-full shadow-lg border border-neutral-100 flex items-center justify-center">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                </div>
            </div>
            <div class="text-center space-y-1">
                <h2 class="text-xl font-bold">大强</h2>
                <p class="text-xs text-neutral-400 font-medium uppercase tracking-widest">点击修改头像</p>
            </div>
        </section>

        <!-- Group 1: Basic Info -->
        <section class="px-6 space-y-4">
            <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-widest px-1">基本信息</h3>
            <div class="bg-white rounded-[2rem] border border-neutral-100 shadow-sm overflow-hidden divide-y divide-neutral-50">
                <div onclick="openSheet('nicknameSheet')" class="p-5 flex justify-between items-center active:bg-neutral-50 transition-colors cursor-pointer">
                    <span class="font-bold text-sm text-neutral-600">昵称</span>
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-bold">大强</span>
                        <svg class="text-neutral-200" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
                    </div>
                </div>
                <div class="p-5 flex justify-between items-center active:bg-neutral-50 transition-colors">
                    <span class="font-bold text-sm text-neutral-600">性别</span>
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-bold">男</span>
                        <svg class="text-neutral-200" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
                    </div>
                </div>
                <div class="p-5 flex justify-between items-center active:bg-neutral-50 transition-colors">
                    <span class="font-bold text-sm text-neutral-600">生日</span>
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-bold">1995-03-15</span>
                        <svg class="text-neutral-200" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
                    </div>
                </div>
            </div>
        </section>

        <!-- Group 2: Account Security -->
        <section class="px-6 space-y-4">
            <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-widest px-1">账户安全</h3>
            <div class="bg-white rounded-[2rem] border border-neutral-100 shadow-sm overflow-hidden divide-y divide-neutral-50">
                <div class="p-5 flex justify-between items-center active:bg-neutral-50 transition-colors">
                    <span class="font-bold text-sm text-neutral-600">手机号</span>
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-bold">138****1234</span>
                        <svg class="text-neutral-200" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
                    </div>
                </div>
                <div class="p-5 flex justify-between items-center active:bg-neutral-50 transition-colors">
                    <span class="font-bold text-sm text-neutral-600">微信</span>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-bold text-brand-600 bg-brand-50 px-2 py-0.5 rounded-full">已绑定</span>
                        <svg class="text-neutral-200" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
                    </div>
                </div>
                <div class="p-5 flex justify-between items-center active:bg-neutral-50 transition-colors">
                    <span class="font-bold text-sm text-neutral-600">修改密码</span>
                    <svg class="text-neutral-200" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
                </div>
            </div>
        </section>

        <!-- Group 3: Membership -->
        <section class="px-6 space-y-4">
            <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-widest px-1">会员状态</h3>
            <div class="membership-gradient rounded-3xl p-6 border border-brand-100 shadow-sm flex justify-between items-center">
                <div class="space-y-1">
                    <h4 class="font-bold text-brand-600">全功能体验</h4>
                    <p class="text-xs text-brand-600/60 font-medium">有效期至 2026-05-11</p>
                </div>
                <button class="text-sm font-bold text-brand-500">管理方案 ></button>
            </div>
        </section>

        <!-- Group 4: Account Actions -->
        <footer class="px-6 py-10 flex flex-col items-center">
            <div class="bg-white rounded-3xl border border-neutral-100 shadow-sm overflow-hidden w-full">
                <button onclick="window.location.href='../08-account-and-settings-Prototype/08.1-Settings.html'" class="w-full p-5 flex items-center gap-4 text-red-500 active:bg-red-50 transition-colors">
                    <span class="text-xl">🗑️</span>
                    <span class="font-bold text-sm">注销账户</span>
                </button>
            </div>
        </footer>

    </main>

    <!-- Nickname Edit Sheet -->
    <div id="nicknameSheet" class="hidden fixed inset-0 z-[100] flex flex-col justify-end bg-black/40 backdrop-blur-sm">
        <div class="absolute inset-0" onclick="closeSheet('nicknameSheet')"></div>
        <div class="relative bg-white w-full rounded-t-[2.5rem] p-8 space-y-8 shadow-2xl sheet-enter">
            <div class="w-12 h-1.5 bg-neutral-100 rounded-full mx-auto"></div>
            <h2 class="text-xl font-bold">修改昵称</h2>
            <div class="space-y-2">
                <label class="text-xs font-bold text-neutral-400 uppercase tracking-widest">新昵称</label>
                <div class="bg-neutral-100 rounded-2xl p-4 flex items-center">
                    <input type="text" id="nicknameInput" value="大强" class="w-full bg-transparent outline-none font-bold text-lg focus:ring-0" maxlength="20">
                    <button onclick="document.getElementById('nicknameInput').value = ''" class="p-1 text-neutral-300">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m18 6-12 12M6 6l12 12"/></svg>
                    </button>
                </div>
                <p class="text-[10px] text-neutral-400 font-medium">昵称将展示在 Dashboard 和分享卡片中</p>
            </div>
            <div class="flex gap-4">
                <button onclick="closeSheet('nicknameSheet')" class="flex-1 h-14 bg-neutral-100 text-neutral-500 font-bold rounded-2xl active:scale-95 transition-all">取消</button>
                <button onclick="closeSheet('nicknameSheet')" class="flex-[2] h-14 bg-brand-500 text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-all">保存</button>
            </div>
        </div>
    </div>

    <script>
        function openSheet(id) {
            document.getElementById(id).classList.remove('hidden');
        }
        function closeSheet(id) {
            document.getElementById(id).classList.add('hidden');
        }
    </script>
</body>
</html>
