<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>了然 - 消费趋势</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#F0F9F6',
                            100: '#E1F2ED',
                            200: '#B2DFD4',
                            500: '#1A6B5A',
                            600: '#155648',
                        },
                        neutral: {
                            50: '#F9FAFB',
                            100: '#F3F4F6',
                            200: '#E5E7EB',
                            400: '#9CA3AF',
                            500: '#6B7280',
                            800: '#1F2937',
                        },
                        accent: {
                            orange: '#F97316',
                            teal: '#14B8A6'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .chart-line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 1.5s ease-out forwards;
        }
        @keyframes draw { to { stroke-dashoffset: 0; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .radar-gradient {
            background: linear-gradient(135deg, #1A6B5A 0%, #14B8A6 100%);
        }
    </style>
</head>
<body class="bg-neutral-50 font-sans text-neutral-800 antialiased min-h-screen pb-32">

    <!-- Top Bar -->
    <header class="p-6 flex items-center justify-between sticky top-0 bg-neutral-50/90 backdrop-blur-md z-40">
        <button onclick="window.history.back()" class="p-1"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
        <h1 class="text-lg font-bold">消费趋势</h1>
        <div class="w-8"></div>
    </header>

    <!-- Time Range Selector -->
    <section class="flex justify-center p-4">
        <div class="bg-neutral-100 p-1 rounded-xl flex gap-1">
            <button class="px-6 py-1.5 bg-white shadow-sm rounded-lg text-sm font-bold">近3月</button>
            <button class="px-6 py-1.5 text-neutral-400 text-sm font-bold">近6月</button>
            <button class="px-6 py-1.5 text-neutral-400 text-sm font-bold">近12月</button>
        </div>
    </section>

    <main class="px-6 space-y-8">
        
        <!-- Section: Total Spending Chart -->
        <section class="bg-white rounded-3xl p-6 shadow-sm border border-neutral-100 space-y-6">
            <h3 class="text-md font-bold">总消费趋势</h3>
            <div class="h-48 relative">
                <svg viewBox="0 0 300 120" class="w-full h-full">
                    <!-- Grid Lines -->
                    <line x1="0" y1="20" x2="300" y2="20" stroke="#F3F4F6" stroke-width="1" stroke-dasharray="4"/>
                    <line x1="0" y1="60" x2="300" y2="60" stroke="#F3F4F6" stroke-width="1" stroke-dasharray="4"/>
                    <line x1="0" y1="100" x2="300" y2="100" stroke="#F3F4F6" stroke-width="1" stroke-dasharray="4"/>
                    
                    <!-- Line -->
                    <path d="M 0 100 L 100 20 L 200 40 L 300 60" fill="none" stroke="#1A6B5A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="chart-line"/>
                    <path d="M 0 100 L 100 20 L 200 40 L 300 60 V 120 H 0 Z" fill="url(#grad1)" opacity="0.1"/>
                    
                    <!-- Points -->
                    <circle cx="100" cy="20" r="4" fill="white" stroke="#1A6B5A" stroke-width="3"/>
                    <circle cx="200" cy="40" r="4" fill="white" stroke="#1A6B5A" stroke-width="3"/>
                    <circle cx="300" cy="60" r="4" fill="white" stroke="#1A6B5A" stroke-width="3"/>

                    <defs>
                        <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#1A6B5A;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#1A6B5A;stop-opacity:0" />
                        </linearGradient>
                    </defs>
                </svg>
                <!-- Labels -->
                <div class="flex justify-between mt-4 text-[10px] font-bold text-neutral-400">
                    <span>1月</span>
                    <span>2月</span>
                    <span>3月</span>
                    <span class="text-brand-500">4月(至今)</span>
                </div>
            </div>
        </section>

        <!-- Section: Category Filter Chips -->
        <section class="overflow-x-auto no-scrollbar -mx-6 px-6 flex gap-3">
            <button class="flex-shrink-0 px-5 py-2 bg-brand-500 text-white rounded-full text-sm font-bold shadow-sm">全部</button>
            <button class="flex-shrink-0 px-5 py-2 bg-white border border-neutral-100 rounded-full text-sm font-bold text-neutral-500">🍽️ 餐饮</button>
            <button class="flex-shrink-0 px-5 py-2 bg-white border border-neutral-100 rounded-full text-sm font-bold text-neutral-500">🛒 购物</button>
            <button class="flex-shrink-0 px-5 py-2 bg-white border border-neutral-100 rounded-full text-sm font-bold text-neutral-500">🚗 交通</button>
        </section>

        <!-- Section: Category Trend Chart -->
        <section class="bg-white rounded-3xl p-6 shadow-sm border border-neutral-100 space-y-6 relative overflow-hidden">
            <div class="flex justify-between items-center">
                <h3 class="text-md font-bold">餐饮趋势</h3>
                <span class="text-xs font-bold text-accent-orange bg-orange-50 px-2 py-1 rounded-lg">逐月上升 ↑28%</span>
            </div>
            <div class="h-40">
                <svg viewBox="0 0 300 100" class="w-full h-full">
                    <path d="M 0 90 L 100 70 L 200 40 L 300 20" fill="none" stroke="#F97316" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="chart-line"/>
                </svg>
            </div>
        </section>

        <!-- Section: Monthly Change -->
        <section class="space-y-4">
            <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-widest">本月变化</h3>
            <div class="bg-white rounded-3xl border border-neutral-100 shadow-sm divide-y divide-neutral-50 overflow-hidden">
                <!-- Rising -->
                <div class="p-5 flex items-start gap-4">
                    <div class="w-10 h-10 bg-orange-50 text-xl flex items-center justify-center rounded-xl">🍜</div>
                    <div class="flex-grow space-y-1">
                        <div class="flex justify-between">
                            <span class="font-bold text-sm">餐饮 <span class="text-accent-orange">↑ 12%</span></span>
                            <span class="font-bold text-sm">较上月多 ¥380</span>
                        </div>
                        <p class="text-[10px] text-neutral-400 font-medium">主因：外卖消费增加</p>
                    </div>
                </div>
                <!-- Falling -->
                <div class="p-5 flex items-start gap-4 opacity-70">
                    <div class="w-10 h-10 bg-purple-50 text-xl flex items-center justify-center rounded-xl">🛒</div>
                    <div class="flex-grow space-y-1">
                        <div class="flex justify-between">
                            <span class="font-bold text-sm">购物 <span class="text-accent-teal">↓ 5%</span></span>
                            <span class="font-bold text-sm">较上月少 ¥120</span>
                        </div>
                        <p class="text-[10px] text-neutral-400 font-medium">主因：服饰类开支减少</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section: Radar CTA -->
        <section onclick="window.location.href='03.4-spending-radar.html'" class="radar-gradient rounded-[2rem] p-8 text-white flex justify-between items-center shadow-xl shadow-brand-500/20 active:scale-[0.98] transition-all cursor-pointer relative overflow-hidden">
            <div class="absolute -right-4 -bottom-4 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
            <div class="space-y-1 relative z-10">
                <h3 class="text-xl font-bold">看看你的消费雷达</h3>
                <p class="text-white/80 text-sm">看看你是什么消费类型</p>
            </div>
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center relative z-10">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
            </div>
        </section>

    </main>

    <!-- Bottom Tab Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-neutral-100 px-6 pt-3 pb-8 flex justify-between items-center z-40">
        <div onclick="window.location.href='01.7-dashboard.html'" class="flex flex-col items-center gap-1 text-neutral-400">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span class="text-[10px] font-bold">首页</span>
        </div>
        <div onclick="window.location.href='03.1-transaction-list.html'" class="flex flex-col items-center gap-1 text-brand-500">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>
            <span class="text-[10px] font-bold">消费</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-neutral-400">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
            <span class="text-[10px] font-bold">AI</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-neutral-400">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="text-[10px] font-bold">我的</span>
        </div>
    </nav>

</body>
</html>
