<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>了然 - 消费详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#F0F9F6',
                            100: '#E1F2ED',
                            200: '#B2DFD4',
                            500: '#1A6B5A',
                            600: '#155648',
                        },
                        neutral: {
                            50: '#F9FAFB',
                            100: '#F3F4F6',
                            200: '#E5E7EB',
                            300: '#D1D5DB',
                            400: '#9CA3AF',
                            500: '#6B7280',
                            800: '#1F2937',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-neutral-50 font-sans text-neutral-800 antialiased h-screen overflow-y-auto pb-12">

    <!-- Header Bar -->
    <header class="p-6 flex items-center justify-between sticky top-0 bg-neutral-50/90 backdrop-blur-md z-40">
        <button onclick="window.history.back()" class="p-1"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
        <h1 class="text-lg font-bold">消费详情</h1>
        <div class="w-8"></div>
    </header>

    <!-- Transaction Hero -->
    <section class="flex flex-col items-center py-10 px-6 text-center space-y-4">
        <div class="w-20 h-20 bg-orange-50 text-4xl flex items-center justify-center rounded-3xl shadow-sm border border-orange-100">🍵</div>
        <div class="space-y-1">
            <h2 class="text-2xl font-bold">瑞幸咖啡</h2>
            <p class="text-5xl font-bold tracking-tight mt-4">-¥18.00</p>
            <p class="text-xs text-neutral-400 font-medium mt-4">2026年4月10日 周四 10:32</p>
        </div>
    </section>

    <!-- Transaction Info -->
    <section class="px-6 space-y-6 mb-12">
        <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-widest">消费信息</h3>
        <div class="bg-white rounded-3xl border border-neutral-100 shadow-sm overflow-hidden divide-y divide-neutral-50">
            <!-- Category Row -->
            <div class="flex justify-between items-center p-5 active:bg-neutral-50 transition-colors">
                <span class="text-sm font-medium text-neutral-500">分类</span>
                <div class="flex items-center gap-2">
                    <span class="text-sm font-bold">餐饮 · 饮品</span>
                    <svg class="text-neutral-300" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
                </div>
            </div>
            <!-- Channel Row -->
            <div class="flex justify-between items-center p-5">
                <span class="text-sm font-medium text-neutral-500">支付渠道</span>
                <span class="text-sm font-bold">支付宝</span>
            </div>
            <!-- Original Desc Row -->
            <div class="flex justify-between items-start p-5">
                <span class="text-sm font-medium text-neutral-500">原始描述</span>
                <span class="text-sm font-bold text-right max-w-[200px]">瑞幸咖啡门店-中关村店</span>
            </div>
            <!-- Source Row -->
            <div class="flex justify-between items-center p-5">
                <span class="text-sm font-medium text-neutral-500">数据来源</span>
                <span class="text-sm font-bold">账单导入</span>
            </div>
            <!-- Notes Row -->
            <div class="flex justify-between items-center p-5 active:bg-neutral-50 transition-colors">
                <span class="text-sm font-medium text-neutral-500">备注</span>
                <div class="flex items-center gap-2">
                    <span class="text-sm font-bold text-neutral-300">点击添加</span>
                    <svg class="text-neutral-300" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
                </div>
            </div>
        </div>
    </section>

    <!-- Spending Insights -->
    <section class="px-6 space-y-4 mb-12">
        <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-widest">消费洞察</h3>
        
        <!-- Brand Summary Card -->
        <div onclick="window.location.href='03.3-trend-chart.html'" class="bg-brand-50 border border-brand-100 rounded-3xl p-6 space-y-4 active:scale-[0.98] transition-all">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-xl shadow-sm">☕</div>
                <h4 class="font-bold">本月瑞幸消费</h4>
            </div>
            <div class="flex justify-between items-end">
                <p class="text-xl font-bold">12 笔  共 ¥216</p>
                <span class="text-xs font-bold text-brand-500 flex items-center gap-1">查看消费趋势 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg></span>
            </div>
        </div>

        <!-- Category Summary Card -->
        <div onclick="window.location.href='03.3-trend-chart.html'" class="bg-neutral-100/50 border border-neutral-100 rounded-3xl p-6 space-y-4 active:scale-[0.98] transition-all">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-xl shadow-sm">🍽️</div>
                <h4 class="font-bold">本月餐饮·饮品</h4>
            </div>
            <div class="flex justify-between items-end">
                <p class="text-xl font-bold">28 笔  共 ¥520</p>
                <span class="text-xs font-bold text-neutral-500 flex items-center gap-1">查看消费趋势 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg></span>
            </div>
        </div>
    </section>

    <!-- Delete Action -->
    <footer class="px-6 py-12 flex justify-center">
        <button onclick="showDeleteConfirm()" class="text-red-500 font-bold text-sm">删除这笔消费</button>
    </footer>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-8">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeDeleteConfirm()"></div>
        <div class="relative bg-white w-full max-w-sm rounded-[2rem] p-8 flex flex-col items-center text-center space-y-6 shadow-2xl">
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center text-2xl">🗑️</div>
            <div class="space-y-2">
                <h3 class="text-xl font-bold">确认删除</h3>
                <p class="text-neutral-500 text-sm leading-relaxed">删除后无法恢复，确定删除这笔 ¥18.00 的消费吗？</p>
            </div>
            <div class="w-full flex gap-3">
                <button onclick="closeDeleteConfirm()" class="flex-1 h-12 bg-neutral-100 text-neutral-800 font-bold rounded-xl active:scale-95 transition-all">取消</button>
                <button onclick="executeDelete()" class="flex-1 h-12 bg-red-500 text-white font-bold rounded-xl active:scale-95 transition-all">删除</button>
            </div>
        </div>
    </div>

    <script>
        function showDeleteConfirm() {
            document.getElementById('deleteModal').classList.remove('hidden');
        }
        function closeDeleteConfirm() {
            document.getElementById('deleteModal').classList.add('hidden');
        }
        function executeDelete() {
            // Simulated delete
            window.location.href = '03.1-transaction-list.html';
        }
    </script>
</body>
</html>
