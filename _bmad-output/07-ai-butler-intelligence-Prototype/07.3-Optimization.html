<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>07.3 Optimization - 了然</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'liaoran': {
                            50: '#E8F5F1', 100: '#D1EBE3', 200: '#A3D7C7',
                            300: '#75C3AB', 400: '#47AF8F', 500: '#1A6B5A',
                            600: '#165A4B', 700: '#0F4F42', 800: '#0A3A31', 900: '#052520',
                        }
                    },
                    fontFamily: { sans: ['-apple-system', 'PingFang SC', 'Noto Sans CJK SC', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        html, body { overscroll-behavior: none; }
        .accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease-out; }
        .accordion-body.open { max-height: 500px; }
        .progress-bar { transition: width 0.8s ease-out; }
    </style>
</head>
<body class="font-sans bg-gray-50">

    <div class="h-[100dvh] flex flex-col">

        <!-- TOP BAR -->
        <div class="bg-white sticky top-0 z-20 px-4 py-3 flex items-center gap-3 border-b border-gray-100">
            <button onclick="history.back()" class="w-8 h-8 flex items-center justify-center -ml-1">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <h1 class="text-lg font-semibold text-gray-900">优化建议</h1>
        </div>

        <!-- CONTENT -->
        <div class="flex-1 overflow-y-auto px-4 py-4 pb-12 space-y-4">

            <!-- Savings Potential Overview -->
            <div id="opt-savings-potential" class="bg-gradient-to-br from-green-50 to-white rounded-2xl p-5 border border-green-100">
                <p class="text-xs text-green-600 font-medium mb-1">省钱潜力</p>
                <div class="flex items-baseline gap-3">
                    <p id="opt-savings-monthly" class="text-3xl font-bold text-green-600">¥412</p>
                    <span class="text-sm text-gray-400">/月</span>
                </div>
                <p id="opt-savings-yearly" class="text-sm text-green-500 mt-1">年度约 ¥4,944</p>
                <p class="text-xs text-gray-400 mt-2">基于你过去 3 个月的消费数据，AI 发现了 3 个优化机会</p>
            </div>

            <!-- Suggestion 1: Pending -->
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                <button class="w-full p-4 flex items-center gap-3 active:bg-gray-50" onclick="toggleAccordion('opt-1')">
                    <span class="text-xl">🍜</span>
                    <div class="flex-1 text-left">
                        <h3 class="text-sm font-semibold text-gray-900">减少周中外卖</h3>
                        <p class="text-sm text-green-600 font-medium mt-0.5">每月可省 ¥340</p>
                    </div>
                    <svg id="opt-1-chevron" class="text-gray-300 transition-transform" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
                </button>
                <div id="opt-1-body" class="accordion-body">
                    <div class="px-4 pb-4 space-y-3">
                        <div class="bg-gray-50 rounded-xl p-3 space-y-2">
                            <div class="flex justify-between text-xs">
                                <span class="text-gray-500">当前</span>
                                <span class="text-gray-700 font-medium">周中外卖 8次/月，均价 ¥42</span>
                            </div>
                            <div class="flex justify-between text-xs">
                                <span class="text-gray-500">建议</span>
                                <span class="text-liaoran-600 font-medium">减至 4次/月</span>
                            </div>
                        </div>
                        <p class="text-xs text-gray-500 leading-relaxed">周三和周五外卖占总外卖的 58%，平均单价 ¥42，高于周末 ¥35。减少周中外卖是性价比最高的优化。</p>
                        <div class="flex gap-2">
                            <button class="flex-1 text-xs py-2.5 rounded-xl bg-liaoran-500 text-white font-medium active:bg-liaoran-600" onclick="adoptSuggestion(0)">采纳建议</button>
                            <button class="flex-1 text-xs py-2.5 rounded-xl border border-gray-200 text-gray-500 active:bg-gray-50" onclick="dismissSuggestion(0)">暂不考虑</button>
                        </div>
                        <button class="w-full text-xs py-2 text-liaoran-600 active:text-liaoran-700" onclick="navigateTo('07.4-Simulation.html')">在模拟器中查看效果 →</button>
                    </div>
                </div>
            </div>

            <!-- Suggestion 2: Adopted -->
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border-l-4 border-green-400">
                <button class="w-full p-4 flex items-center gap-3 active:bg-gray-50" onclick="toggleAccordion('opt-2')">
                    <span class="text-xl">📺</span>
                    <div class="flex-1 text-left">
                        <div class="flex items-center gap-2">
                            <h3 class="text-sm font-semibold text-gray-900">取消爱奇艺订阅</h3>
                            <span class="text-[10px] px-2 py-0.5 rounded-full bg-green-100 text-green-700 font-medium">已采纳</span>
                        </div>
                        <p class="text-sm text-green-600 font-medium mt-0.5">每月可省 ¥22</p>
                    </div>
                    <svg id="opt-2-chevron" class="text-gray-300 transition-transform" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
                </button>
                <div id="opt-2-body" class="accordion-body">
                    <div class="px-4 pb-4 space-y-3">
                        <p class="text-xs text-gray-500">过去 60 天使用次数为 0，腾讯视频已覆盖您的观看需求。</p>
                        <!-- Tracking -->
                        <div class="bg-green-50 rounded-xl p-3">
                            <div class="flex justify-between text-xs mb-2">
                                <span class="text-green-700 font-medium">执行进度</span>
                                <span class="text-green-600">已省 ¥22</span>
                            </div>
                            <div class="w-full h-2 bg-green-200 rounded-full overflow-hidden">
                                <div class="progress-bar h-full bg-green-500 rounded-full" style="width: 100%"></div>
                            </div>
                            <p class="text-[10px] text-green-600 mt-1">4月已取消订阅，本月节省 ¥22</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Suggestion 3: Dismissed -->
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden opacity-60">
                <div class="p-4 flex items-center gap-3">
                    <span class="text-xl">⛽</span>
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <h3 class="text-sm font-medium text-gray-500">油价低谷加油</h3>
                            <span class="text-[10px] px-2 py-0.5 rounded-full bg-gray-100 text-gray-400">暂不考虑</span>
                        </div>
                        <p class="text-sm text-gray-400 mt-0.5">每月可省 ¥50</p>
                    </div>
                </div>
            </div>

            <!-- Simulation CTA -->
            <button id="opt-simulation-cta" class="w-full py-4 bg-liaoran-500 text-white text-sm font-medium rounded-2xl shadow-sm active:bg-liaoran-600 flex items-center justify-center gap-2" onclick="navigateTo('07.4-Simulation.html')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                模拟省钱效果
            </button>

        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed top-16 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-4 py-2 rounded-full z-50 opacity-0 pointer-events-none transition-opacity duration-300"></div>

    <script>
        function toggleAccordion(id) {
            const body = document.getElementById(id + '-body');
            const chevron = document.getElementById(id + '-chevron');
            body.classList.toggle('open');
            chevron.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : '';
        }

        function adoptSuggestion(idx) {
            showToast('已采纳！将自动追踪执行进度');
        }

        function dismissSuggestion(idx) {
            showToast('已标记"暂不考虑"，本月不再显示');
        }

        function navigateTo(url) { window.location.href = url; }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }
    </script>

</body>
</html>
