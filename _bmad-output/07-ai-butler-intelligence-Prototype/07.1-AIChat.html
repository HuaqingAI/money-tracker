<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>07.1 AI Chat - 了然</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'liaoran': {
                            50: '#E8F5F1', 100: '#D1EBE3', 200: '#A3D7C7',
                            300: '#75C3AB', 400: '#47AF8F', 500: '#1A6B5A',
                            600: '#165A4B', 700: '#0F4F42', 800: '#0A3A31', 900: '#052520',
                        }
                    },
                    fontFamily: { sans: ['-apple-system', 'PingFang SC', 'Noto Sans CJK SC', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        html, body { overscroll-behavior: none; }
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom, 0px)); }
        .tab-bar { box-shadow: 0 -1px 0 rgba(0,0,0,0.06); }
        .tab-active { color: #1A6B5A; border-bottom: 2px solid #1A6B5A; font-weight: 600; }
        .tab-inactive { color: #9CA3AF; border-bottom: 2px solid transparent; }
        @keyframes dot-bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
        .dot-1 { animation: dot-bounce 1.2s infinite 0s; }
        .dot-2 { animation: dot-bounce 1.2s infinite 0.2s; }
        .dot-3 { animation: dot-bounce 1.2s infinite 0.4s; }
        .data-anchor { color: #1A6B5A; text-decoration: underline; text-underline-offset: 2px; cursor: pointer; }
    </style>
</head>
<body class="font-sans bg-gray-50">

    <div class="h-[100dvh] flex flex-col">

        <!-- ===== HEADER ===== -->
        <div id="ai-chat-header" class="bg-white z-20 border-b border-gray-100">
            <div class="px-4 py-3 flex items-center justify-between">
                <h1 class="text-lg font-semibold text-gray-900">AI 管家</h1>
                <div class="flex items-center gap-2">
                    <span id="ai-chat-header-trial" class="text-xs text-liaoran-600 bg-liaoran-50 px-2 py-0.5 rounded-full">剩余 1 次</span>
                    <button id="ai-chat-header-info" onclick="showToast('AI 管家说明')" class="w-8 h-8 flex items-center justify-center">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                    </button>
                </div>
            </div>
            <!-- Tab Switcher -->
            <div id="ai-tab-switcher" class="flex">
                <button class="flex-1 py-2.5 text-sm text-center tab-active" onclick="switchTab('chat')">对话</button>
                <button class="flex-1 py-2.5 text-sm text-center tab-inactive" onclick="navigateTo('07.2-InsightsFeed.html')">洞察</button>
            </div>
        </div>

        <!-- ===== CHAT MESSAGES ===== -->
        <div id="ai-chat-messages" class="flex-1 overflow-y-auto px-4 py-4 pb-36 space-y-4">

            <!-- Date Separator -->
            <div class="text-center"><span class="text-xs text-gray-400 bg-gray-100 px-3 py-1 rounded-full">今天</span></div>

            <!-- AI Welcome Message -->
            <div class="flex gap-2.5">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-liaoran-500 to-liaoran-400 flex items-center justify-center flex-shrink-0">
                    <span class="text-xs font-bold text-white">AI</span>
                </div>
                <div class="flex-1">
                    <p class="text-xs text-gray-400 mb-1">了然管家</p>
                    <div class="bg-white rounded-2xl rounded-tl-md p-4 shadow-sm max-w-[85%]">
                        <p class="text-sm text-gray-700 leading-relaxed">你好，大强！我是你的 AI 财务管家。我已经分析了你过去 3 个月的消费数据，随时可以回答你的问题。</p>
                        <p class="text-xs text-gray-400 mt-3 mb-2">试试问我：</p>
                        <div class="flex flex-wrap gap-2">
                            <button class="text-xs px-3 py-1.5 rounded-full border border-liaoran-200 text-liaoran-600 bg-liaoran-50/50 active:bg-liaoran-100" onclick="sendSuggestion('这个月花了多少？')">这个月花了多少？</button>
                            <button class="text-xs px-3 py-1.5 rounded-full border border-liaoran-200 text-liaoran-600 bg-liaoran-50/50 active:bg-liaoran-100" onclick="sendSuggestion('外卖花了多少？')">外卖花了多少？</button>
                            <button class="text-xs px-3 py-1.5 rounded-full border border-liaoran-200 text-liaoran-600 bg-liaoran-50/50 active:bg-liaoran-100" onclick="sendSuggestion('少吃外卖能省多少？')">少吃外卖能省多少？</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- User Message -->
            <div class="flex justify-end">
                <div class="bg-liaoran-500 text-white rounded-2xl rounded-tr-md px-4 py-3 max-w-[75%] shadow-sm">
                    <p class="text-sm">如果每月少吃4次外卖能省多少？</p>
                </div>
            </div>

            <!-- AI Response with Data Card -->
            <div class="flex gap-2.5">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-liaoran-500 to-liaoran-400 flex items-center justify-center flex-shrink-0">
                    <span class="text-xs font-bold text-white">AI</span>
                </div>
                <div class="flex-1">
                    <p class="text-xs text-gray-400 mb-1">了然管家</p>
                    <div class="bg-white rounded-2xl rounded-tl-md p-4 shadow-sm max-w-[90%]">
                        <p class="text-sm text-gray-700 leading-relaxed mb-3">根据你过去 3 个月的外卖数据，每月减少 4 次外卖预计可节省：</p>

                        <!-- Data Card -->
                        <div class="bg-liaoran-50 rounded-xl p-4 border border-liaoran-100">
                            <p class="text-xs font-semibold text-liaoran-700 mb-3">📊 外卖消费模拟</p>
                            <div class="space-y-2">
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-600">3月外卖总额</span>
                                    <span class="data-anchor font-medium" onclick="navigateTo('../03-lilys-spending-mirror-Prototype/03.1-TransactionList.html')">¥2,850</span>
                                </div>
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-600">平均单次外卖</span>
                                    <span class="data-anchor font-medium" onclick="navigateTo('../03-lilys-spending-mirror-Prototype/03.2-TransactionDetail.html')">¥170</span>
                                </div>
                                <div class="h-px bg-liaoran-200/50 my-1"></div>
                                <div class="flex justify-between text-sm font-semibold">
                                    <span class="text-liaoran-700">每月可省</span>
                                    <span class="text-green-600">¥680</span>
                                </div>
                                <div class="flex justify-between text-sm font-semibold">
                                    <span class="text-liaoran-700">年度可省</span>
                                    <span class="text-green-600">¥8,160</span>
                                </div>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="flex gap-2 mt-3">
                            <button class="flex-1 text-xs py-2 rounded-lg border border-liaoran-200 text-liaoran-600 active:bg-liaoran-50" onclick="navigateTo('../03-lilys-spending-mirror-Prototype/03.1-TransactionList.html')">查看外卖明细</button>
                            <button class="flex-1 text-xs py-2 rounded-lg bg-liaoran-500 text-white active:bg-liaoran-600" onclick="navigateTo('07.4-Simulation.html')">开始模拟</button>
                        </div>

                        <!-- Follow-up Suggestions -->
                        <div class="mt-3 flex flex-wrap gap-1.5">
                            <button class="text-[11px] px-2.5 py-1 rounded-full border border-gray-200 text-gray-500 active:bg-gray-50" onclick="sendSuggestion('如果改成自己做饭呢？')">如果改成自己做饭呢？</button>
                            <button class="text-[11px] px-2.5 py-1 rounded-full border border-gray-200 text-gray-500 active:bg-gray-50" onclick="sendSuggestion('外卖里哪家最贵？')">外卖里哪家最贵？</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Typing Indicator (hidden by default) -->
            <div id="ai-chat-typing" class="flex gap-2.5 hidden">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-liaoran-500 to-liaoran-400 flex items-center justify-center flex-shrink-0">
                    <span class="text-xs font-bold text-white">AI</span>
                </div>
                <div class="bg-white rounded-2xl rounded-tl-md px-4 py-3 shadow-sm">
                    <div class="flex gap-1.5 items-center">
                        <div class="w-2 h-2 rounded-full bg-liaoran-400 dot-1"></div>
                        <div class="w-2 h-2 rounded-full bg-liaoran-400 dot-2"></div>
                        <div class="w-2 h-2 rounded-full bg-liaoran-400 dot-3"></div>
                        <span class="text-xs text-gray-400 ml-2">正在分析你的数据...</span>
                    </div>
                </div>
            </div>

            <!-- Paywall Card (hidden) -->
            <div id="ai-chat-paywall" class="hidden mx-2">
                <div class="bg-gradient-to-br from-liaoran-50 to-white rounded-2xl p-5 border border-liaoran-200 text-center">
                    <p class="text-2xl mb-2">🔮</p>
                    <p class="text-sm font-semibold text-gray-900">免费体验已用完</p>
                    <p class="text-xs text-gray-500 mt-1 mb-4">升级会员，无限畅聊 AI 管家</p>
                    <button id="ai-chat-paywall-cta" class="w-full py-2.5 text-sm text-white font-medium bg-liaoran-500 rounded-xl active:bg-liaoran-600" onclick="navigateTo('../02-dannys-family-shared-ledger-Prototype/02.1-Subscription.html')">解锁无限对话</button>
                </div>
            </div>
        </div>

        <!-- ===== INPUT BAR (fixed) ===== -->
        <div id="ai-chat-input" class="fixed bottom-[56px] left-0 right-0 bg-white border-t border-gray-100 px-4 py-3 z-20">
            <div class="flex gap-2 items-end">
                <input id="ai-chat-input-field" type="text" placeholder="问问 AI 管家..." class="flex-1 px-4 py-2.5 bg-gray-100 rounded-full text-sm focus:outline-none focus:ring-1 focus:ring-liaoran-400" onkeypress="if(event.key==='Enter')sendMessage()">
                <button id="ai-chat-input-send" onclick="sendMessage()" class="w-9 h-9 rounded-full bg-liaoran-500 flex items-center justify-center flex-shrink-0 active:bg-liaoran-600">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>

        <!-- ===== BOTTOM TAB BAR ===== -->
        <div class="tab-bar bg-white fixed bottom-0 left-0 right-0 z-30 safe-bottom">
            <div class="flex justify-around py-2">
                <button class="flex flex-col items-center gap-0.5 px-4 py-1" onclick="navigateTo('../01-dannys-zero-input-first-experience-Prototype/01.7-Dashboard.html')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                    <span class="text-[10px] text-gray-400">首页</span>
                </button>
                <button class="flex flex-col items-center gap-0.5 px-4 py-1" onclick="navigateTo('../03-lilys-spending-mirror-Prototype/03.1-TransactionList.html')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
                    <span class="text-[10px] text-gray-400">交易</span>
                </button>
                <button class="flex flex-col items-center gap-0.5 px-4 py-1">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1A6B5A" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg>
                    <span class="text-[10px] text-liaoran-600 font-semibold">AI</span>
                </button>
                <button class="flex flex-col items-center gap-0.5 px-4 py-1" onclick="navigateTo('../08-account-and-settings-Prototype/08.0-MyHub.html')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span class="text-[10px] text-gray-400">我的</span>
                </button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed top-16 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-4 py-2 rounded-full z-50 opacity-0 pointer-events-none transition-opacity duration-300"></div>

    <script>
        let freeChats = 1;

        function sendSuggestion(text) {
            document.getElementById('ai-chat-input-field').value = text;
            sendMessage();
        }

        function sendMessage() {
            const input = document.getElementById('ai-chat-input-field');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';

            // Check paywall
            if (freeChats <= 0) {
                document.getElementById('ai-chat-paywall').classList.remove('hidden');
                scrollToBottom();
                return;
            }

            // Add user message
            const msgArea = document.getElementById('ai-chat-messages');
            const userBubble = document.createElement('div');
            userBubble.className = 'flex justify-end';
            userBubble.innerHTML = `<div class="bg-liaoran-500 text-white rounded-2xl rounded-tr-md px-4 py-3 max-w-[75%] shadow-sm"><p class="text-sm">${text}</p></div>`;
            msgArea.insertBefore(userBubble, document.getElementById('ai-chat-typing'));

            // Show typing
            document.getElementById('ai-chat-typing').classList.remove('hidden');
            scrollToBottom();

            // Simulate AI response
            setTimeout(() => {
                document.getElementById('ai-chat-typing').classList.add('hidden');
                freeChats--;
                updateTrialBadge();

                const aiBubble = document.createElement('div');
                aiBubble.className = 'flex gap-2.5';
                aiBubble.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-liaoran-500 to-liaoran-400 flex items-center justify-center flex-shrink-0">
                        <span class="text-xs font-bold text-white">AI</span>
                    </div>
                    <div class="flex-1">
                        <p class="text-xs text-gray-400 mb-1">了然管家</p>
                        <div class="bg-white rounded-2xl rounded-tl-md p-4 shadow-sm max-w-[90%]">
                            <p class="text-sm text-gray-700 leading-relaxed">根据你的消费数据分析，"${text}" 这个问题的答案需要更多数据维度。目前你的 3 个月数据已经能提供基本趋势分析。</p>
                            <div class="mt-3 flex flex-wrap gap-1.5">
                                <button class="text-[11px] px-2.5 py-1 rounded-full border border-gray-200 text-gray-500 active:bg-gray-50" onclick="sendSuggestion('能详细说说吗？')">能详细说说吗？</button>
                            </div>
                        </div>
                    </div>`;
                msgArea.insertBefore(aiBubble, document.getElementById('ai-chat-typing'));
                scrollToBottom();
            }, 2000);
        }

        function updateTrialBadge() {
            const badge = document.getElementById('ai-chat-header-trial');
            if (freeChats > 0) {
                badge.textContent = '剩余 ' + freeChats + ' 次';
            } else {
                badge.textContent = '已用完';
                badge.className = 'text-xs text-orange-600 bg-orange-50 px-2 py-0.5 rounded-full';
            }
        }

        function scrollToBottom() {
            const area = document.getElementById('ai-chat-messages');
            setTimeout(() => area.scrollTop = area.scrollHeight, 100);
        }

        function switchTab(tab) { /* Already on chat */ }
        function navigateTo(url) { window.location.href = url; }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }
    </script>

</body>
</html>
